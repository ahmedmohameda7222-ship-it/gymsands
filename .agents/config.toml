# Plaivra Ruflo / Codex project configuration
# Product and engineering authority lives in AGENTS.md and docs/product/PLAIVRA_PRODUCT_CONSTITUTION.md.
# Model selection is intentionally not hardcoded; choose the model and reasoning level for each task in Codex CLI.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["AGENTS.md"]

[features]
child_agents_md = true
shell_snapshot = true
request_rule = true
remote_compaction = true

[mcp_servers.ruflo]
command = "npx"
args = ["-y", "ruflo@latest", "mcp", "start"]
enabled = true
tool_timeout_sec = 120

# Keep the project skill surface deliberately small. Add a skill only when it has a recurring Plaivra use case.
[[skills.config]]
path = ".agents/skills/swarm-orchestration"
enabled = true

[[skills.config]]
path = ".agents/skills/memory-management"
enabled = true

[[skills.config]]
path = ".agents/skills/security-audit"
enabled = true

[[skills.config]]
path = ".agents/skills/performance-analysis"
enabled = true

[[skills.config]]
path = ".agents/skills/agent-coder"
enabled = true

[[skills.config]]
path = ".agents/skills/agent-reviewer"
enabled = true

[[skills.config]]
path = ".agents/skills/agent-tester"
enabled = true
