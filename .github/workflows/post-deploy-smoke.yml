name: Post-deploy release smoke

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Exact deployed URL to verify
        required: true
        type: string
      expected_commit:
        description: Exact 40-character reviewed commit SHA expected from /api/version
        required: true
        type: string
      expected_migration:
        description: Exact reviewed production migration version
        required: true
        type: string
      expected_environment:
        description: Environment reported by /api/version
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read

concurrency:
  group: post-deploy-smoke-${{ inputs.expected_environment }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.expected_environment }}
    env:
      PLAIVRA_DEPLOYMENT_URL: ${{ inputs.deployment_url }}
      PLAIVRA_EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit }}
      PLAIVRA_EXPECTED_DATABASE_MIGRATION_VERSION: ${{ inputs.expected_migration }}
      PLAIVRA_SMOKE_POPULATED_EMAIL: ${{ secrets.PLAIVRA_SMOKE_POPULATED_EMAIL }}
      PLAIVRA_SMOKE_POPULATED_PASSWORD: ${{ secrets.PLAIVRA_SMOKE_POPULATED_PASSWORD }}
      PLAIVRA_SMOKE_EMPTY_EMAIL: ${{ secrets.PLAIVRA_SMOKE_EMPTY_EMAIL }}
      PLAIVRA_SMOKE_EMPTY_PASSWORD: ${{ secrets.PLAIVRA_SMOKE_EMPTY_PASSWORD }}

    steps:
      - name: Validate exact workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.expected_commit }}" =~ ^[0-9a-fA-F]{40}$ ]]
          [[ "${{ inputs.expected_migration }}" =~ ^[0-9]{12,14}$ ]]

      - name: Checkout selected release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_commit }}
          fetch-depth: 0

      - name: Verify checkout and repository identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_commit }}"
          test "${GITHUB_REPOSITORY}" = "ahmedmohameda7222-ship-it/gymsands"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify anonymous release readiness
        run: >-
          npm run smoke:postdeploy --
          --url "${{ inputs.deployment_url }}"
          --expected-commit "${{ inputs.expected_commit }}"
          --expected-migration "${{ inputs.expected_migration }}"
          --expected-environment "${{ inputs.expected_environment }}"
          --output quality-reports/post-deploy-smoke.json

      - name: Verify populated synthetic account
        run: >-
          npm run smoke:authenticated --
          --url "${{ inputs.deployment_url }}"
          --mode "${{ inputs.expected_environment }}"
          --account populated
          --expected-commit "${{ inputs.expected_commit }}"
          --expected-migration "${{ inputs.expected_migration }}"
          --output quality-reports/authenticated-smoke-populated

      - name: Verify empty-state synthetic account
        run: >-
          npm run smoke:authenticated --
          --url "${{ inputs.deployment_url }}"
          --mode "${{ inputs.expected_environment }}"
          --account empty
          --expected-commit "${{ inputs.expected_commit }}"
          --expected-migration "${{ inputs.expected_migration }}"
          --output quality-reports/authenticated-smoke-empty

      - name: Upload immutable smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-smoke-${{ inputs.expected_commit }}
          path: quality-reports/
          if-no-files-found: error
          retention-days: 30
