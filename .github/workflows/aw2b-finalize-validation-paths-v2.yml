name: AW-2B Generate Validation Files

on:
  push:
    branches: [feat/active-workout-aw2b-command-authority]
    paths: [.github/workflows/aw2b-finalize-validation-paths-v2.yml]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2b-command-authority
          fetch-depth: 0
      - name: Generate permanent validation files for connector promotion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          output = Path('tmp-aw2b-generated')
          output.mkdir(exist_ok=True)

          q = Path('.github/workflows/quality.yml').read_text()
          anchor = '          PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-integration.sql;\n'
          addition = (
              anchor
              + '          PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2b-command-authority.sql;\n'
              + '          PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2b-integration.sql;\n'
          )
          if 'active-workout-aw2b-integration.sql' not in q:
              if anchor not in q:
                  raise SystemExit('missing Quality AW-2A anchor')
              q = q.replace(anchor, addition, 1)
          (output / 'quality.yml').write_text(q)

          e = Path('.github/workflows/exact-release-quality-validation.yml').read_text()
          anchor = '      - plaivra_aw2a_post_merge_release_closure_implementation_report.md\n'
          additions = anchor + '''      - plaivra_aw2b_command_authority_implementation_report.md
      - supabase/migration-ledger.json
      - supabase/migrations/*_active_workout_aw2b_command_authority.sql
      - supabase/verification/active-workout-aw2b-*.sql
      - lib/product/active-workout-aw2b-migration.test.ts
      - lib/workouts/workout-session-execution.ts
      - lib/workouts/workout-session-execution.test.ts
      - services/database/workout-session-execution.ts
      - services/database/workout-session-execution.test.ts
      - services/database/workout-session-execution-command.integration.test.ts
      - types/workout-session-execution-command.ts
      - package.json
      - package-lock.json
'''
          if 'plaivra_aw2b_command_authority_implementation_report.md' not in e:
              if anchor not in e:
                  raise SystemExit('missing Exact validation anchor')
              e = e.replace(anchor, additions, 1)
          (output / 'exact-release-quality-validation.yml').write_text(e)

          ledger = Path('supabase/migration-ledger.json')
          ledger.write_text(json.dumps(json.loads(ledger.read_text()), indent=2) + '\n')
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp-aw2b-generated supabase/migration-ledger.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(workouts): generate AW-2B validation files"
          git push origin HEAD:feat/active-workout-aw2b-command-authority
