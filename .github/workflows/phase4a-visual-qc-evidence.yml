name: Phase 4A Visual QC Evidence

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate deterministic visual atlas evidence
        run: npm run verify:muscle-atlas:geometry -- --evidence-dir phase4a-visual-qc-evidence

      - name: Record evidence identity
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "commit_sha=$(git rev-parse HEAD)"
            echo "generated_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            sha256sum phase4a-visual-qc-evidence/*
          } > phase4a-visual-qc-evidence/evidence-manifest.txt

      - name: Upload visual QC evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase4a-visual-qc-evidence-${{ github.event.pull_request.head.sha || github.sha }}
          path: phase4a-visual-qc-evidence/
          if-no-files-found: error
          retention-days: 7
