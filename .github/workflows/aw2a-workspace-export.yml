name: AW-2A Finalize Report and Ledger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Finalize AW-2A report, ledger, and migration documentation
        shell: bash
        env:
          AW2A_REPORT_GZ_B64: 
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, gzip, json, os
          from pathlib import Path

          report = gzip.decompress(base64.b64decode(os.environ['AW2A_REPORT_GZ_B64'])).decode()
          Path('plaivra_aw2a_persisted_execution_state_implementation_report.md').write_text(report)

          ledger_path = Path('supabase/migration-ledger.json')
          ledger = json.loads(ledger_path.read_text())
          ledger['capturedAt'] = '2026-07-21T00:05:44Z'
          ledger['auditedRepositoryCommit'] = '56d17feadc6e2af668455bbe5ed1aa61230890ff'
          ledger['productionMigrationCount'] = 63
          ledger['pendingCount'] = 0
          ledger['unresolvedCount'] = 0
          ledger['historyRepair'] = {
              'state': 'reconciled',
              'schemaAppliedUntrackedCount': 0,
              'pendingCount': 0,
              'unresolvedCount': 0,
              'note': 'Production migration history is reconciled through production record 20260721000544. The supported Supabase migration authority applied AW-2A exactly once and mapped it to repository file 20260720213000_active_workout_aw2a_execution_state.sql. Do not replay any applied migration.'
          }
          for entry in ledger['entries']:
              if entry.get('localFile') == '20260720213000_active_workout_aw2a_execution_state.sql':
                  entry.clear()
                  entry.update({
                      'localFile': '20260720213000_active_workout_aw2a_execution_state.sql',
                      'state': 'applied',
                      'note': 'Applied exactly once to Plaivra Database on 2026-07-21 through the supported Supabase migration authority. Production recorded version 20260721000544 under name active_workout_aw2a_execution_state. Local Git blob caa286b2ad287f042d2cf7691ec7774a9db7a50d and SHA-256 c8f21655226d51a2157fa1b8c272edc5fac1f84f0a2214376a16e225a1f04f2e. Production verification confirmed one legacy open-session backfill, complete open-session coverage, zero terminal rows, zero owner mismatch, hardened RLS/functions, and unchanged compatibility marker 20260717051011. Do not replay.',
                      'productionVersion': '20260721000544',
                      'productionName': 'active_workout_aw2a_execution_state'
                  })
                  break
          else:
              raise SystemExit('AW-2A ledger entry missing')
          ledger_path.write_text(json.dumps(ledger, indent=2) + '\n')

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          readme = readme.replace(
              '- Production migration history is reconciled through `20260719223300` with 62 migrations recorded exactly once. The deployed compatibility marker intentionally remains `20260717051011` until a separately authorized coordinated release.',
              '- Production migration history contains 63 records and is reconciled through the AW-2A production record `20260721000544_active_workout_aw2a_execution_state`, mapped to repository migration `20260720213000_active_workout_aw2a_execution_state.sql`. The deployed compatibility marker intentionally remains `20260717051011` until a separately authorized coordinated release.'
          )
          readme = readme.replace(
              'AW-2A pending forward migration: `20260720213000_active_workout_aw2a_execution_state.sql`. It must be applied once only after local replay and verification; do not replay applied migrations.',
              'AW-2A persisted execution state is applied exactly once to Plaivra Database as production record `20260721000544_active_workout_aw2a_execution_state`, mapped to immutable repository migration `20260720213000_active_workout_aw2a_execution_state.sql`. Do not replay or modify it.'
          )
          readme_path.write_text(readme)

          doc_path = Path('docs/architecture/migration-ledger-reconciliation.md')
          doc = doc_path.read_text()
          doc = doc.replace('**Verified production state:** 2026-07-19', '**Verified production state:** 2026-07-21')
          doc = doc.replace('**Status:** **Fully reconciled through `20260719223300`; no pending repository migration remains**', '**Status:** **Fully reconciled through production record `20260721000544`; no pending repository migration remains**')
          doc = doc.replace('- Applied production migrations: 62', '- Applied production migrations: 63')
          doc = doc.replace('- Latest production migration: `20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup`', '- Latest production migration: `20260721000544_active_workout_aw2a_execution_state` (repository file `20260720213000_active_workout_aw2a_execution_state.sql`)')
          doc = doc.replace('```text\n20260719094718\n```', '```text\n20260721000544\n```')
          doc = doc.replace(
              'AW-2A pending forward migration: `20260720213000_active_workout_aw2a_execution_state.sql`. It must be applied once only after local replay and verification; do not replay applied migrations.',
              '## Applied AW-2A execution-state migration\n\n- Repository file: `20260720213000_active_workout_aw2a_execution_state.sql`\n- Production record: `20260721000544_active_workout_aw2a_execution_state`\n- Applied exactly once to Plaivra Database through the supported migration authority.\n- Backfilled the one existing open workout session, left terminal sessions without execution state, and preserved compatibility marker `20260717051011`.\n- Do not replay or modify either immutable identity.'
          )
          doc_path.write_text(doc)
          PY
          git add README.md docs/architecture/migration-ledger-reconciliation.md supabase/migration-ledger.json plaivra_aw2a_persisted_execution_state_implementation_report.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs: finalize AW-2A production implementation report'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
