name: AW-2A Apply Trusted Set Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply reviewed trusted set fixture correction
        shell: bash
        env:
          AW2A_BLOCK_B64: 
        run: |
          set -euo pipefail
          python -c 'import base64,os; from pathlib import Path; p=Path("supabase/verification/active-workout-aw2a-integration.sql"); t=p.read_text(); a=t.index("-- Deterministic unfinished cursor:"); b=t.index("-- Revision is database-managed",a); p.write_text(t[:a]+base64.b64decode(os.environ["AW2A_BLOCK_B64"]).decode()+t[b:])'
          git add supabase/verification/active-workout-aw2a-integration.sql
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(database): run AW-2A set fixtures through trusted path'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
