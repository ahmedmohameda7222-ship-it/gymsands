name: AW-2A Workspace Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Record repository identity
        shell: bash
        run: |
          printf '%s\n' "${{ github.event.pull_request.head.sha }}" > /tmp/aw2a-head-sha.txt
          git rev-parse HEAD^{tree} > /tmp/aw2a-tree-sha.txt

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=node_modules --exclude=.next -czf /tmp/aw2a-workspace.tar.gz .

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: aw2a-workspace-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/aw2a-workspace.tar.gz
            /tmp/aw2a-head-sha.txt
            /tmp/aw2a-tree-sha.txt
          if-no-files-found: error
          retention-days: 1
