name: AW-2A Apply Integration Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply reviewed fixture correction and restore validation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/verification/active-workout-aw2a-integration.sql')
          text = path.read_text()
          old = """-- Disposable owner fixtures.
          insert into public.profiles (id, email, full_name, role, created_at, updated_at)
          values
            ('a2000000-0000-4000-8000-000000000001', 'aw2a-owner@example.test', 'AW2A Owner', 'member', now(), now()),
            ('a2000000-0000-4000-8000-000000000002', 'aw2a-other@example.test', 'AW2A Other', 'member', now(), now()),
            ('a2000000-0000-4000-8000-000000000003', 'aw2a-delete@example.test', 'AW2A Delete', 'member', now(), now());
          """
          new = """-- Disposable owner fixtures. Creating auth users exercises the real profile lifecycle.
          insert into auth.users (
            id, aud, role, email, encrypted_password,
            raw_app_meta_data, raw_user_meta_data, created_at, updated_at
          ) values
            ('a2000000-0000-4000-8000-000000000001', 'authenticated', 'authenticated', 'aw2a-owner@example.test', '',
             '{\"provider\":\"email\",\"providers\":[\"email\"]}'::jsonb, '{}'::jsonb, now(), now()),
            ('a2000000-0000-4000-8000-000000000002', 'authenticated', 'authenticated', 'aw2a-other@example.test', '',
             '{\"provider\":\"email\",\"providers\":[\"email\"]}'::jsonb, '{}'::jsonb, now(), now()),
            ('a2000000-0000-4000-8000-000000000003', 'authenticated', 'authenticated', 'aw2a-delete@example.test', '',
             '{\"provider\":\"email\",\"providers\":[\"email\"]}'::jsonb, '{}'::jsonb, now(), now());
          select pg_temp.assert_true(
            (select count(*) from public.profiles where id in (
              'a2000000-0000-4000-8000-000000000001'::uuid,
              'a2000000-0000-4000-8000-000000000002'::uuid,
              'a2000000-0000-4000-8000-000000000003'::uuid
            )) = 3,
            'Auth fixture creation did not create the expected profiles.'
          );
          """
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one AW-2A profile fixture block.')
          path.write_text(text.replace(old, new))
          PY
          git show d64271c4d4661e537ea9758d6ee4928b99c4e3e7:.github/workflows/aw2a-workspace-export.yml > .github/workflows/aw2a-workspace-export.yml
          git add supabase/verification/active-workout-aw2a-integration.sql .github/workflows/aw2a-workspace-export.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(database): create AW-2A integration users through auth lifecycle'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
