name: AW-2A Diagnose Reviewed Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Generate patch diagnostics
        shell: bash
        run: |
          set +e
          set -u
          cat .github/aw2a-rawpatch/00 \
              .github/aw2a-rawpatch/01 \
              .github/aw2a-rawpatch/02 \
              .github/aw2a-rawpatch/03 \
              .github/aw2a-rawpatch/04 > /tmp/aw2a-reviewed.patch
          {
            echo 'PATCH_SHA256:'
            sha256sum /tmp/aw2a-reviewed.patch
            echo 'APPLY_CHECK:'
            git apply --check --verbose --exclude=.github/workflows/aw2a-workspace-export.yml /tmp/aw2a-reviewed.patch
            echo "APPLY_STATUS:$?"
          } > /tmp/aw2a-apply-diagnostic.txt 2>&1
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: aw2a-patch-diagnostic-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/aw2a-apply-diagnostic.txt
            /tmp/aw2a-reviewed.patch
          if-no-files-found: error
          retention-days: 1
