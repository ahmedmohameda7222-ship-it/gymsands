name: AW-2A Restore Full Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  restore:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Restore reviewed full validation workflow
        shell: bash
        run: |
          set -euo pipefail
          git show 968836edf33d99248f02a57ed9f15519afc86104:.github/workflows/aw2a-workspace-export.yml > .github/workflows/aw2a-workspace-export.yml
          git add .github/workflows/aw2a-workspace-export.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'ci: restore AW-2A full validation after DB fix'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
