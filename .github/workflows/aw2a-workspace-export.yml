name: AW-2A Apply Integration Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply reviewed fixture correction
        shell: bash
        env:
          AW2A_REPLACEMENT_B64: 
        run: |
          set -euo pipefail
          python -c 'import base64,os; from pathlib import Path; p=Path("supabase/verification/active-workout-aw2a-integration.sql"); t=p.read_text(); m="-- Disposable owner fixtures. Creating auth users exercises the real profile lifecycle."; start=t.index("-- Disposable owner fixtures.") if m not in t else None; end=t.index("\\set owner_id",start) if start is not None else None; p.write_text(t[:start]+base64.b64decode(os.environ["AW2A_REPLACEMENT_B64"]).decode()+t[end:]) if start is not None else None'
          if git diff --quiet -- supabase/verification/active-workout-aw2a-integration.sql; then
            exit 0
          fi
          git add supabase/verification/active-workout-aw2a-integration.sql
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(database): create AW-2A integration users through auth lifecycle'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
