name: AW-2A Apply Plan Exercise Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply reviewed plan exercise fixture correction
        shell: bash
        run: |
          set -euo pipefail
          python -c 'from pathlib import Path; p=Path("supabase/verification/active-workout-aw2a-integration.sql"); t=p.read_text(); t=t.replace("(id,plan_day_id,exercise_name,sets,reps,rest_seconds,sort_order,order_index,created_at,updated_at)","(id,plan_day_id,exercise_name,sets,reps,rest_seconds,sort_order,order_index,created_at)"); t=t.replace("3,\x278\x27,60,1,1,now(),now()),","3,\x278\x27,60,1,1,now()),"); t=t.replace("2,\x2710\x27,90,2,2,now(),now());","2,\x2710\x27,90,2,2,now());"); p.write_text(t)'
          if git diff --quiet -- supabase/verification/active-workout-aw2a-integration.sql; then
            exit 0
          fi
          git add supabase/verification/active-workout-aw2a-integration.sql
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(database): align AW-2A plan exercise fixture columns'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
