name: AW-2A Apply Reviewed Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply reviewed AW-2A patch and restore full validation
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/aw2a-workspace-export.yml > /tmp/aw2a-full-validation.yml
          sed -i '/^[[:space:]]*continue-on-error: true$/d' /tmp/aw2a-full-validation.yml
          cat .github/aw2a-rawpatch/00 \
              .github/aw2a-rawpatch/01 \
              .github/aw2a-rawpatch/02 \
              .github/aw2a-rawpatch/03 \
              .github/aw2a-rawpatch/04 > /tmp/aw2a-reviewed.patch
          echo 'b36400477b4fe0e073b004827cd745c8b8eaa143553c110fe7ed5c7eeda28cf4  /tmp/aw2a-reviewed.patch' | sha256sum -c -
          git apply --index --exclude=.github/workflows/aw2a-workspace-export.yml /tmp/aw2a-reviewed.patch
          cp /tmp/aw2a-full-validation.yml .github/workflows/aw2a-workspace-export.yml
          rm -rf .github/aw2a-rawpatch \
                 .github/aw2a-codefix \
                 .github/aw2a-final-fix \
                 .github/aw2a-correction \
                 .github/aw2a-correction-small \
                 .github/aw2a-patch
          rm -f .github/workflows/aw2a-fix-migration.yml \
                .github/workflows/aw2a-apply-text-fixes.yml \
                .github/workflows/aw2a-source-export.yml \
                docs/.aw2a-pr-trigger
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(workouts): complete AW-2A validation corrections'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
