name: AW-2A DB Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aw2a-db-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact AW-2A PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}
      - name: Replay migration chain and capture diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/aw2a-db-diagnostic
          supabase db start > /tmp/aw2a-db-diagnostic/db-start.log 2>&1
          supabase db reset --local --no-seed > /tmp/aw2a-db-diagnostic/db-reset.log 2>&1
          supabase db lint --local --schema public --level error --fail-on error > /tmp/aw2a-db-diagnostic/db-lint.log 2>&1
      - name: Run verification commands and capture every result
        shell: bash
        run: |
          set +e
          database_url="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          PGPASSWORD=postgres psql "$database_url" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-execution-state.sql > /tmp/aw2a-db-diagnostic/verification.log 2>&1
          echo "$?" > /tmp/aw2a-db-diagnostic/verification.exit
          PLAIVRA_AW2A_TEST_DATABASE_URL="$database_url" npx vitest run --config vitest.integration.config.mjs services/database/workout-session-execution.integration.test.ts > /tmp/aw2a-db-diagnostic/integration.log 2>&1
          echo "$?" > /tmp/aw2a-db-diagnostic/integration.exit
          PGPASSWORD=postgres psql "$database_url" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql > /tmp/aw2a-db-diagnostic/train-security.log 2>&1
          echo "$?" > /tmp/aw2a-db-diagnostic/train-security.exit
          PLAIVRA_PREFLIGHT_TEST_DATABASE_URL="$database_url" node scripts/test-database-preflight-control.mjs > /tmp/aw2a-db-diagnostic/preflight-control.log 2>&1
          echo "$?" > /tmp/aw2a-db-diagnostic/preflight-control.exit
          PGPASSWORD=postgres psql "$database_url" -X -v ON_ERROR_STOP=1 -f supabase/verification/production-release-migration-preflight.sql > /tmp/aw2a-db-diagnostic/release-preflight.log 2>&1
          echo "$?" > /tmp/aw2a-db-diagnostic/release-preflight.exit
          set -e
      - name: Upload database diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw2a-db-diagnostic-${{ github.event.pull_request.head.sha }}
          path: /tmp/aw2a-db-diagnostic
          if-no-files-found: error
          retention-days: 2
