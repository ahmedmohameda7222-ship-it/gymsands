name: AW-2A Reviewed Source Import

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: aw2a-import-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  import:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct reviewed AW-2A source patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA256: b0bcfc1171a3e1001ecbc1f920e1667f77ba3c42881ec5b154228641983a490d
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GH_TOKEN"]
          selected = {}
          page = 1
          while True:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/pulls/{pr_number}/reviews?per_page=100&page={page}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  reviews = json.load(response)
              if not reviews:
                  break
              for review in reviews:
                  body = review.get("body") or ""
                  match = re.match(r"^AW2A_IMPORT_(\d{2})\n", body)
                  if not match:
                      continue
                  index = int(match.group(1))
                  if index not in selected or int(review["id"]) > selected[index][0]:
                      selected[index] = (int(review["id"]), body.split("\n", 1)[1])
              if len(reviews) < 100:
                  break
              page += 1

          expected = set(range(14))
          if set(selected) != expected:
              raise SystemExit(f"Expected reviewed chunks 00-13, found {sorted(selected)}")

          text = "".join(selected[index][1] for index in range(14))
          corrected = []
          fixing_types = False
          metadata_prefixes = (
              "+diff --git ", "+new file mode ", "+deleted file mode ",
              "+index ", "+--- a/", "+--- /dev/null", "++++ b/", "+@@ ",
          )
          for line in text.splitlines(keepends=True):
              if line.startswith("+diff --git a/types/database.ts"):
                  fixing_types = True
              if fixing_types and line.startswith("+"):
                  line = line[1:]
              elif line.startswith(metadata_prefixes):
                  line = line[1:]
              corrected.append(line)
          payload = "".join(corrected).encode()
          digest = hashlib.sha256(payload).hexdigest()
          if digest != os.environ["EXPECTED_SHA256"]:
              raise SystemExit(f"Reviewed source patch checksum mismatch: {digest}")
          with open("/tmp/aw2a-app.patch", "wb") as output:
              output.write(payload)
          print(f"Verified {len(payload)} bytes with SHA-256 {digest}")
          PY
          git apply --check /tmp/aw2a-app.patch
          git apply /tmp/aw2a-app.patch
          git diff --check

      - name: Commit imported implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(workouts): persist active session execution state"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
