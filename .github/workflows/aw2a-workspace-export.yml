name: AW-2A Apply Deterministic Log Fixture Fix

on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply reviewed deterministic log fixtures
        shell: bash
        env:
          AW2A_BLOCK_ONE_B64: 
          AW2A_BLOCK_TWO_B64: 
        run: |
          set -euo pipefail
          python -c 'import base64,os; from pathlib import Path; p=Path("supabase/verification/active-workout-aw2a-integration.sql"); t=p.read_text(); a=t.index("-- Deterministic unfinished cursor:"); b=t.index("-- Revision is database-managed",a); t=t[:a]+base64.b64decode(os.environ["AW2A_BLOCK_ONE_B64"]).decode()+t[b:]; c=t.index("-- Complete all work"); d=t.index("-- Terminal cleanup",c); t=t[:c]+base64.b64decode(os.environ["AW2A_BLOCK_TWO_B64"]).decode()+t[d:]; p.write_text(t)'
          git add supabase/verification/active-workout-aw2a-integration.sql
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(database): make AW-2A set fixtures authoritative'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
