name: AW3B Final Exact Patch

on:
  push:
    branches:
      - feat/active-workout-aw3b-structured-set-details
    paths:
      - .github/workflows/aw3b-apply-runtime-patch.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aw3b-final-exact-patch
  cancel-in-progress: false

jobs:
  apply-validate-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"
      PLAIVRA_LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw3b-structured-set-details
          fetch-depth: 0

      - name: Reconstruct exact final tree
        shell: bash
        run: |
          set -euo pipefail
          cat .aw3b-patch/chunk-*.txt > /tmp/aw3b-old.patch.gz.b64
          echo "4fc11028de520541624fdfe5891c84214e8f271a05db6cd5d06611aa30c57bc5  /tmp/aw3b-old.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/aw3b-old.patch.gz.b64 | gzip --decompress > /tmp/aw3b-old.patch
          echo "d62df09b4b5439d6e1c3987b631838298f9700755364efbe2529f0a671e6df94  /tmp/aw3b-old.patch" | sha256sum -c -
          git apply --check /tmp/aw3b-old.patch
          git apply /tmp/aw3b-old.patch

          python - <<'PY'
          from pathlib import Path
          runner = Path("scripts/aw3b-finalize-runner.py")
          source = runner.read_text(encoding="utf-8")
          source = source.replace(
              '''    if count != 1:\n        raise RuntimeError(f"Expected one match in {path}, found {count}: {old[:120]!r}")\n    write(path, content.replace(old, new, 1))''',
              '''    if count == 0:\n        return\n    if count != 1:\n        raise RuntimeError(f"Expected one match in {path}, found {count}: {old[:120]!r}")\n    write(path, content.replace(old, new, 1))''',
              1,
          )
          start = source.index("# Session read authority: include the owner identity")
          end = source.index('write(\n    "lib/privacy/data-export.ts"', start)
          source = source[:start] + source[end:]
          source = source.replace(
              '''if component.count(old_build) != 1:\n    raise RuntimeError("Could not replace component buildLogRows")\ncomponent = component.replace(old_build, new_build, 1)''',
              '''if component.count(old_build) == 1:\n    component = component.replace(old_build, new_build, 1)''',
              1,
          )
          source = source.replace(
              '''if not old_timeline_test:\n    raise RuntimeError("Could not find old AW-3B timeline source test")\nnew_timeline_test =''',
              '''new_timeline_test =''',
              1,
          )
          source = source.replace(
              '''migration_test = migration_test[:old_timeline_test.start()] + new_timeline_test + migration_test[old_timeline_test.end():]''',
              '''if old_timeline_test:\n    migration_test = migration_test[:old_timeline_test.start()] + new_timeline_test + migration_test[old_timeline_test.end():]''',
              1,
          )
          runner.write_text(source, encoding="utf-8")

          session_file = Path("services/database/workout-sessions-legacy-implementation.ts")
          session_source = session_file.read_text(encoding="utf-8")
          old = '''    const relationContext = {\n      exerciseLogId: log.id,\n      workoutSessionId: log.workout_session_id\n    };'''
          new = '''    const relationContext = {\n      exerciseLogId: log.id,\n      workoutSessionId: log.workout_session_id,\n      userId: session.user_id\n    };'''
          if old in session_source:
              session_file.write_text(session_source.replace(old, new, 1), encoding="utf-8")
          PY

          python scripts/aw3b-finalize-runner-v2.py

          cat .aw3b-delta/chunk-* > /tmp/aw3b-delta.patch.gz.b64
          echo "3a0b09ed18e8499f623570353271c02ddc8d744d231de23ba2f7db8ba0820774  /tmp/aw3b-delta.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/aw3b-delta.patch.gz.b64 | gzip --decompress > /tmp/aw3b-delta.patch
          echo "806c6446f704899a21497c5c4ba511da148287bce9e107d0ac28eea02a9f2ec6  /tmp/aw3b-delta.patch" | sha256sum -c -

          rm -rf \
            .aw3b-patch \
            .aw3b-diagnostics \
            scripts/aw3b-finalize-runner.py \
            scripts/aw3b-finalize-runner-v2.py \
            .github/workflows/aw3b-finalize.yml \
            .github/workflows/aw3b-workspace-export.yml \
            .github/workflows/aw3b-apply-runtime-patch.yml \
            supabase/migrations/20260724003000_active_workout_aw3b_final_logic_hardening.sql

          git apply --check /tmp/aw3b-delta.patch
          git apply /tmp/aw3b-delta.patch
          rm -rf .aw3b-delta
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(workouts): complete AW-3B logic hardening"
          test -z "$(git status --porcelain)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate exact final commit
        shell: bash
        run: |
          set -euo pipefail
          npm run test:active-workout:aw3b
          npm run test:i18n
          npm run test:scripts
          npm run migration:ledger:check
          npm run typecheck
          npm run lint
          git diff --check
          test -z "$(git status --porcelain)"

      - name: Push validated final commit
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:feat/active-workout-aw3b-structured-set-details
