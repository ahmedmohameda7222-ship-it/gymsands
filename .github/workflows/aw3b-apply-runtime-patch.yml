name: AW3B Apply Runtime Patch

on:
  push:
    branches:
      - feat/active-workout-aw3b-structured-set-details
    paths:
      - .github/workflows/aw3b-apply-runtime-patch.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aw3b-runtime-patch
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"
      PLAIVRA_LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw3b-structured-set-details
          fetch-depth: 0

      - name: Reconstruct final AW-3B correction tree
        shell: bash
        run: |
          set -euo pipefail
          cat .aw3b-patch/chunk-*.txt > /tmp/aw3b-runtime.patch.gz.b64
          echo "4fc11028de520541624fdfe5891c84214e8f271a05db6cd5d06611aa30c57bc5  /tmp/aw3b-runtime.patch.gz.b64" | sha256sum -c -
          base64 --decode /tmp/aw3b-runtime.patch.gz.b64 | gzip --decompress > /tmp/aw3b-runtime.patch
          echo "d62df09b4b5439d6e1c3987b631838298f9700755364efbe2529f0a671e6df94  /tmp/aw3b-runtime.patch" | sha256sum -c -
          git apply --check /tmp/aw3b-runtime.patch
          git apply /tmp/aw3b-runtime.patch

          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          from pathlib import Path

          root = Path.cwd()
          candidate_path = root / "supabase/migrations/20260724003000_active_workout_aw3b_final_logic_hardening.sql"
          correction_path = root / "supabase/migrations/20260724023000_active_workout_aw3b_post_apply_logic_corrections.sql"
          candidate = candidate_path.read_text(encoding="utf-8")

          baseline_start = candidate.index("CREATE TEMPORARY TABLE aw3b_final_baseline")
          append_start = candidate.index("CREATE OR REPLACE FUNCTION private.append_workout_session_timeline_event")
          graph_start = candidate.index("CREATE FUNCTION private.aw3b_graph_revision")
          wrapper_start = candidate.index("CREATE OR REPLACE FUNCTION public.upsert_workout_set_logs_atomic")
          post_start = candidate.index("DO $aw3b_final_postflight$")

          baseline = candidate[baseline_start:append_start].replace(
              "aw3b_final_baseline", "aw3b_post_apply_baseline"
          )
          graph = candidate[graph_start:wrapper_start].replace(
              "REVOKE ALL ON FUNCTION private.aw3b_safe_structured_summary(uuid) FROM public, anon, authenticated, service_role;\n",
              "",
          )
          wrapper = candidate[wrapper_start:post_start].replace(
              "private.aw3b_safe_structured_summary",
              "private.aw3b_timeline_structured_summary",
          )
          old_deferral = (
              "  PERFORM set_config('plaivra.aw3b_defer_set_timeline', 'on', true);\n"
              "  v_result := private.aw3b_structured_upsert_workout_set_logs_atomic(p_user_id, p_session_id, v_canonical_logs);\n"
              "  PERFORM set_config('plaivra.aw3b_defer_set_timeline', 'off', true);\n"
          )
          safe_deferral = (
              "  BEGIN\n"
              "    PERFORM set_config('plaivra.aw3b_defer_set_timeline', 'on', true);\n"
              "    v_result := private.aw3b_structured_upsert_workout_set_logs_atomic(p_user_id, p_session_id, v_canonical_logs);\n"
              "    PERFORM set_config('plaivra.aw3b_defer_set_timeline', 'off', true);\n"
              "  EXCEPTION WHEN OTHERS THEN\n"
              "    PERFORM set_config('plaivra.aw3b_defer_set_timeline', 'off', true);\n"
              "    RAISE;\n"
              "  END;\n"
          )
          if old_deferral in wrapper:
              wrapper = wrapper.replace(old_deferral, safe_deferral, 1)
