name: Phase 4C2 Responsive Correction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  correct:
    if: github.event.pull_request.head.ref == 'phase4c2-responsive-runner' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4c2-active-workout-muscle-load
          fetch-depth: 0
      - name: Reserve tiny-screen controller clearance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          page_path = Path('app/(private)/workouts/[id]/page.tsx')
          page = page_path.read_text()
          old = '<TrainPageContainer className="space-y-6" dir={dir}>'
          new = '<TrainPageContainer className="space-y-6 max-[340px]:pb-[var(--active-workout-controller-height,0px)]" data-exercise-detail-page dir={dir}>'
          if old not in page:
              raise SystemExit('Exercise detail container anchor not found')
          page_path.write_text(page.replace(old, new, 1))

          test_path = Path('lib/product/muscle-intelligence-phase4c2.test.ts')
          test = test_path.read_text()
          anchor = '''  it("includes EN DE AR copy and safe failure messaging", () => { const copy=text("lib/train/muscle-intelligence/active-session-muscle-load-copy.ts"); expect(copy).toContain("Muscle Load So Far"); expect(copy).toContain("Muskelbelastung bisher"); expect(copy).toContain("حمل العضلات حتى الآن"); expect(copy).toContain("Your workout and saved sets are unaffected"); });
'''
          addition = '''  it("keeps tiny-screen exercise actions clear of the active workout controller", () => { const detail=text("app/(private)/workouts/[id]/page.tsx"); expect(detail).toContain("data-exercise-detail-page"); expect(detail).toContain("max-[340px]:pb-[var(--active-workout-controller-height,0px)]"); });
'''
          if anchor not in test:
              raise SystemExit('Phase 4C.2 responsive test anchor not found')
          test_path.write_text(test.replace(anchor, anchor + addition, 1))
          PY
          git rm .github/workflows/phase4c2-responsive-correction.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix(train): clear active controller on tiny screens'
          git push origin HEAD:phase4c2-active-workout-muscle-load
