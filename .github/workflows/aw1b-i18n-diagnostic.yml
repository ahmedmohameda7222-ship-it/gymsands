name: AW-1B i18n Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feat/active-workout-aw1b-messages-locale-qa'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture i18n output
        shell: bash
        run: |
          set +e
          npm run test:i18n > i18n-diagnostic.log 2>&1
          status=$?
          cat i18n-diagnostic.log
          echo "$status" > i18n-diagnostic.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: aw1b-i18n-diagnostic-${{ github.event.pull_request.head.sha }}
          path: |
            i18n-diagnostic.log
            i18n-diagnostic.status
          if-no-files-found: error
          retention-days: 1
