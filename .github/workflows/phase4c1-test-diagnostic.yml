name: Phase 4C1 Test Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase4c1-test-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run changed tests and prepare diagnostic
        id: tests
        shell: bash
        run: |
          set +e
          mkdir -p quality-reports
          report=quality-reports/phase4c1-test-report.txt
          npx vitest run --config vitest.unit.config.mjs \
            lib/product/muscle-intelligence-phase4c1-set-type.test.ts \
            lib/product/muscle-intelligence-phase4c1.test.ts \
            lib/train/muscle-intelligence/advanced-session-analysis.test.ts \
            > "$report" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            npx vitest related \
              lib/train/muscle-intelligence/session-analysis.ts \
              lib/train/muscle-intelligence/advanced-session-analysis.ts \
              lib/train/muscle-intelligence/session-analysis-error.ts \
              --run --config vitest.unit.config.mjs --passWithNoTests \
              >> "$report" 2>&1
            status=$?
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload concise test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4c1-test-diagnostic-${{ github.run_id }}
          path: quality-reports/phase4c1-test-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail when tests failed
        if: steps.tests.outputs.status != '0'
        run: |
          tail -n 160 quality-reports/phase4c1-test-report.txt
          exit 1
