name: PR53 Final Visual Corrections

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pr53-final-corrections-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  implement-and-verify:
    if: github.event.pull_request.head.ref == 'codex/train-visual-refinement'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://127.0.0.1:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/train-visual-refinement
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply focused corrections
        run: python .github/pr53-final-corrections.py

      - name: Apply responsive desktop stacking
        run: python .github/pr53-desktop-corrections.py

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run focused Train tests
        run: npm test -- lib/workouts/train-visual.test.ts lib/product/train-final-visual-corrections.test.ts lib/product/train-post-merge-visual-refinement.test.ts

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run full tests
        run: npm test

      - name: Run production build
        run: NEXT_PUBLIC_USE_MOCK_AUTH=false npm run build

      - name: Run dependency audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Check migration ledger
        run: npm run migration:ledger:check

      - name: Create release manifest
        run: npm run release:manifest -- --output /tmp/pr53-release-manifest.json --build-timestamp "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Check diff whitespace
        run: git diff --check

      - name: Start mock-auth server
        run: |
          npm run dev -- --hostname 127.0.0.1 > /tmp/pr53-next.log 2>&1 &
          echo $! > /tmp/pr53-next.pid
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/my-workout/plans >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/pr53-next.log
          exit 1

      - name: Run measured Train layout QA
        run: node scripts/run-train-layout-qa.mjs

      - name: Upload rendered QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr53-final-visual-qa-${{ github.run_id }}
          path: qa-artifacts/pr53-final/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit verified corrections
        run: |
          if [ -f /tmp/pr53-next.pid ]; then kill "$(cat /tmp/pr53-next.pid)" || true; fi
          rm -rf qa-artifacts .next
          rm .github/pr53-final-corrections.py
          rm .github/pr53-desktop-corrections.py
          rm .github/workflows/pr53-final-corrections-pr.yml
          git add -A
          git diff --cached --check
          git commit -m "fix(train-ui): complete final visual corrections [pr53-corrections-applied]"
          git push origin HEAD:codex/train-visual-refinement
