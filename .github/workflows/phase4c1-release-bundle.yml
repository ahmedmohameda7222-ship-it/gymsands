name: Phase 4C1 Split Ledger Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 74 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 4C.1 branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Classify split migration chain and update docs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          ledger_path = Path('supabase/migration-ledger.json')
          ledger = json.loads(ledger_path.read_text())
          new_files = [
              '20260719223010_muscle_intelligence_phase4c1_snapshot_support.sql',
              '20260719223020_muscle_intelligence_phase4c1_v2_snapshot_freeze.sql',
              '20260719223030_muscle_intelligence_phase4c1_direct_session_v2.sql',
              '20260719223040_muscle_intelligence_phase4c1_replacement_v2.sql',
              '20260719223050_muscle_intelligence_phase4c1_terminal_reconcile_v2.sql',
          ]
          existing = {entry['localFile'] for entry in ledger['entries']}
          for filename in new_files:
              if filename not in existing:
                  ledger['entries'].append({
                      'localFile': filename,
                      'state': 'pending',
                      'note': 'Phase 4C.1 split runtime authority migration. Not applied to production; explicit coordinated authorization is required before apply.'
                  })
          ledger['entries'].sort(key=lambda entry: entry['localFile'])
          ledger['capturedAt'] = '2026-07-19T22:05:00Z'
          ledger['pendingCount'] = 9
          ledger['unresolvedCount'] = 9
          ledger['historyRepair']['state'] = 'pending'
          ledger['historyRepair']['pendingCount'] = 9
          ledger['historyRepair']['unresolvedCount'] = 9
          ledger['historyRepair']['note'] = 'Production migration history remains reconciled through 20260719094718 with all 53 applied migrations recorded exactly once. Nine Phase 4C.1 repository migrations are pending and have not been applied. Do not replay any applied migration or apply pending files without explicit coordinated authorization.'
          assert sum(entry['state'] == 'pending' for entry in ledger['entries']) == 9
          ledger_path.write_text(json.dumps(ledger, indent=2) + '\n')

          pending_plain = '''20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql
          20260719223010_muscle_intelligence_phase4c1_snapshot_support.sql
          20260719223020_muscle_intelligence_phase4c1_v2_snapshot_freeze.sql
          20260719223030_muscle_intelligence_phase4c1_direct_session_v2.sql
          20260719223040_muscle_intelligence_phase4c1_replacement_v2.sql
          20260719223050_muscle_intelligence_phase4c1_terminal_reconcile_v2.sql
          20260719223100_muscle_intelligence_phase4c1_terminal_history_guard.sql
          20260719223200_muscle_intelligence_phase4c1_set_type_refresh.sql
          20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup.sql'''.replace('          ', '')

          doc_path = Path('docs/architecture/migration-ledger-reconciliation.md')
          doc = doc_path.read_text()
          doc = doc.replace('four Phase 4C.1 repository migrations are pending and unapplied', 'nine Phase 4C.1 repository migrations are pending and unapplied')
          doc = doc.replace('`pendingCount = 4`', '`pendingCount = 9`')
          doc = doc.replace('`unresolvedCount = 4`', '`unresolvedCount = 9`')
          old_plain = '''20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql
          20260719223100_muscle_intelligence_phase4c1_terminal_history_guard.sql
          20260719223200_muscle_intelligence_phase4c1_set_type_refresh.sql
          20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup.sql'''.replace('          ', '')
          doc = doc.replace(old_plain, pending_plain)
          doc = doc.replace('The pending chain is designed to:', 'The split, ordered pending chain is designed to:')
          doc_path.write_text(doc)

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          readme = readme.replace('four Phase 4C.1 repository migrations are pending', 'nine Phase 4C.1 repository migrations are pending')
          start = readme.index('## Pending Phase 4C.1 migrations')
          end = readme.index('\n\nThese files are classified as pending.', start)
          bullets = '\n'.join(f'- `{line}`' for line in pending_plain.splitlines())
          section = '## Pending Phase 4C.1 migrations\n\n' + bullets
          readme = readme[:start] + section + readme[end:]
          readme = readme.replace('These files are classified as pending.', 'These nine files are classified as pending and form one ordered Phase 4C.1 runtime cutover chain.')
          readme_path.write_text(readme)
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/migration-ledger.json README.md docs/architecture/migration-ledger-reconciliation.md
          if git diff --cached --quiet; then
            echo 'Split ledger and docs already current.'
          else
            git commit -m 'chore(db): classify split Phase 4C.1 migration chain'
            git push origin HEAD:phase4c1-runtime-v2-cutover
          fi
