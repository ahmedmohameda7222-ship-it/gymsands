name: Phase 4B Lint Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run exact changed-file lint
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          mapfile -d '' files < <(git diff --diff-filter=ACMRT --name-only -z "${base_sha}...HEAD" | grep -zE '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          printf 'Linting %s files\n' "${#files[@]}"
          npx eslint -- "${files[@]}"
