name: AW-2A Apply Final Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply reviewed AW-2A correction
        shell: bash
        run: |
          set -euo pipefail
          cat .github/aw2a-final-fix/00 .github/aw2a-final-fix/01 | base64 -d | gzip -d > /tmp/aw2a-fix.patch
          echo 'bb76041300803c787efe1d32f976556c4e88172f7b02c14bb2fbf122ab3a1f9d  /tmp/aw2a-fix.patch' | sha256sum -c -
          git apply --index /tmp/aw2a-fix.patch
          rm -rf .github/aw2a-final-fix
          rm -f .github/workflows/aw2a-apply-final-fix.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(workouts): complete AW-2A validation corrections'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
