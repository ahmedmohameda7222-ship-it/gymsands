name: AW-1A Materialize Dependencies

on:
  push:
    branches:
      - feat/active-workout-aw1a-language-foundation

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Materialize compatibility patches and lockfile
        shell: bash
        run: |
          set -euo pipefail
          node scripts/aw1a-patch.mjs
          npm install next-intl@4.13.2 --save
          rm -f .github/workflows/aw1a-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore(i18n): materialize AW-1A dependency state"
          git push origin HEAD:feat/active-workout-aw1a-language-foundation
