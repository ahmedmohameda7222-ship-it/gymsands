name: Phase 4B Final Cleanup Runner

on:
  push:
    branches:
      - fix/phase4b-exercise-display
    paths:
      - .github/workflows/phase4b-final-cleanup-runner.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase4b-exercise-display
          fetch-depth: 0
      - name: Apply final Phase 4B cleanup
        run: python scripts/apply-phase4b-final-cleanup.py
      - name: Commit final cleanup
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name github-actions-bot
          git config user.email github-actions-bot@users.noreply.github.com
          git add -- "app/(private)/workouts/[id]/page.tsx" "components/workouts/workout-browser.tsx" "components/workouts/todays-workout.tsx" "lib/i18n/train.ts" "lib/train/exercise-display.test.ts"
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(train): finalize member-facing exercise metadata"
          git push origin HEAD:fix/phase4b-exercise-display
