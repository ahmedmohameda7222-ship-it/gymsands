name: AW-1B Apply QA Corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw1b-messages-locale-qa'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply exact non-workflow QA corrections
        id: apply
        shell: bash
        run: |
          set -uo pipefail
          status=0
          {
            set -x
            cat .github/aw1b-patch-chunks/chunk-* > /tmp/aw1b-qa.patch
            sed -i 's/@@ -925,,7 /@@ -925,7 /' /tmp/aw1b-qa.patch
            sha256sum /tmp/aw1b-qa.patch | tee /tmp/patch-sha256.txt
            git apply --check --exclude='.github/workflows/*' /tmp/aw1b-qa.patch
            git apply --exclude='.github/workflows/*' /tmp/aw1b-qa.patch
            rm -f .github/aw1b-correction.tar.gz.b64
            rm -rf .github/aw1b-patch-chunks .github/aw1b-correction-chunks
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "fix(i18n): apply AW-1B QA source corrections"
            git push origin HEAD:feat/active-workout-aw1b-messages-locale-qa
          } > /tmp/commands.log 2>&1 || status=$?
          cat /tmp/commands.log
          exit "$status"
      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw1b-patch-diagnostic-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/aw1b-qa.patch
            /tmp/commands.log
            /tmp/patch-sha256.txt
          if-no-files-found: warn
          retention-days: 1
