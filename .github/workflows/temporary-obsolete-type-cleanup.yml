name: Temporary Obsolete Type Cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: repo-constitution-cleanup
          fetch-depth: 0

      - name: Prove obsolete types have no application references
        shell: bash
        run: |
          set -euo pipefail
          if git grep -n -E '\b(AiActionRequestStatus|AiActionRequest|SafetyRiskLevel|UserSafetyProfile)\b' -- app components lib services types ':!types/database.ts'; then
            echo "Obsolete types still have application references." >&2
            exit 1
          fi

      - name: Remove obsolete type blocks and compatibility alias
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path("types/database.ts")
          text = path.read_text()
          patterns = [
              r'\nexport type AiActionRequestStatus = .*?;\n',
              r'\nexport type AiActionRequest = \{.*?\n\};\n',
              r'\nexport type SafetyRiskLevel = .*?;\n',
              r'\nexport type UserSafetyProfile = \{.*?\n\};\n',
          ]
          for pattern in patterns:
              text, count = re.subn(pattern, '\n', text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"Expected one match for {pattern}, found {count}")
          path.write_text(text)

          component = Path("components/profile/execution-profiles.tsx")
          content = component.read_text()
          alias = '\n/** Temporary export alias for routes not yet renamed during this cleanup branch. */\nexport const SafetyProfileCard = FitnessConstraintsCard;\n'
          if content.count(alias) != 1:
              raise SystemExit("Expected exactly one temporary SafetyProfileCard alias")
          component.write_text(content.replace(alias, '\n', 1))
          PY

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git add types/database.ts components/profile/execution-profiles.tsx
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: remove obsolete request and safety types"
          git push origin HEAD:repo-constitution-cleanup
