name: AW-1B Implementation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aw1b-implementation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'feat/active-workout-aw1b-messages-locale-qa'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply AW-1B implementation
        shell: bash
        run: |
          set -o pipefail
          node scripts/aw1b-apply.mjs 2>&1 | tee aw1b-apply.log

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee aw1b-typecheck.log

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee aw1b-lint.log

      - name: I18n contract
        shell: bash
        run: |
          set -o pipefail
          npm run test:i18n 2>&1 | tee aw1b-i18n.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee aw1b-build.log

      - name: Export validated implementation
        if: success()
        run: |
          tar -czf aw1b-validated-files.tar.gz \
            messages/en.json messages/de.json messages/ar.json \
            lib/i18n/active-workout.ts \
            lib/i18n/active-workout-formatters.ts \
            lib/i18n/active-workout-message-contract.test.ts \
            lib/i18n/active-workout-formatters.test.ts \
            lib/i18n/message-shape.test.ts \
            lib/train/muscle-intelligence/active-session-muscle-load-copy.ts \
            components/workouts/active-workout-indicator.tsx \
            components/workouts/session-muscle-load-panel.tsx \
            components/workouts/workout-day-focus-session.tsx \
            package.json .github/workflows/quality.yml
          git diff --binary > aw1b-validated.patch

      - name: Commit validated implementation except Quality workflow
        if: github.event_name == 'pull_request' && success()
        run: |
          rm -f scripts/.aw1b-apply-expanded.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            messages/en.json messages/de.json messages/ar.json \
            lib/i18n/active-workout.ts \
            lib/i18n/active-workout-formatters.ts \
            lib/i18n/active-workout-message-contract.test.ts \
            lib/i18n/active-workout-formatters.test.ts \
            lib/i18n/message-shape.test.ts \
            lib/train/muscle-intelligence/active-session-muscle-load-copy.ts \
            components/workouts/active-workout-indicator.tsx \
            components/workouts/session-muscle-load-panel.tsx \
            components/workouts/workout-day-focus-session.tsx \
            package.json
          git diff --cached --check
          git commit -m "feat(i18n): add active workout messages and locale QA"
          git push origin HEAD:feat/active-workout-aw1b-messages-locale-qa

      - name: Upload validated implementation and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw1b-implementation-${{ github.run_id }}
          path: |
            aw1b-*.log
            aw1b-validated-files.tar.gz
            aw1b-validated.patch
          if-no-files-found: warn
          retention-days: 14
