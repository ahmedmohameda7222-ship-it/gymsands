name: AW-1B Final Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aw1b-final-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw1b-messages-locale-qa'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      AW1B_STARTING_SHA: 1b7411604dcf3d9bdfcd0a2f4d70a172d677310e
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "false"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          mkdir -p quality-reports/aw1b-final
          npm ci 2>&1 | tee quality-reports/aw1b-final/npm-ci.log

      - name: Typecheck
        shell: bash
        run: npm run typecheck 2>&1 | tee quality-reports/aw1b-final/typecheck.log

      - name: Lint
        shell: bash
        run: npm run lint 2>&1 | tee quality-reports/aw1b-final/lint.log

      - name: Permanent i18n contract
        shell: bash
        run: npm run test:i18n 2>&1 | tee quality-reports/aw1b-final/test-i18n.log

      - name: Exact targeted i18n tests
        shell: bash
        run: |
          npx vitest run --config vitest.unit.config.mjs \
            lib/i18n/message-shape.test.ts \
            lib/i18n/active-workout-message-contract.test.ts \
            lib/i18n/active-workout-formatters.test.ts \
            2>&1 | tee quality-reports/aw1b-final/targeted-i18n.log

      - name: Full unit tests with starting-main parity
        id: unit
        shell: bash
        run: |
          set -euo pipefail
          set +e
          npm run test:unit > quality-reports/aw1b-final/branch-unit.log 2>&1
          branch_status=$?
          set -e

          git worktree add --detach /tmp/aw1b-main "$AW1B_STARTING_SHA"
          ln -s "$GITHUB_WORKSPACE/node_modules" /tmp/aw1b-main/node_modules
          set +e
          (cd /tmp/aw1b-main && npm run test:unit) > quality-reports/aw1b-final/main-unit.log 2>&1
          main_status=$?
          set -e

          sed -E 's/\x1B\[[0-9;]*[mK]//g' quality-reports/aw1b-final/branch-unit.log \
            | grep -E '^ FAIL ' | sed -E 's/^[[:space:]]+//' | sort -u > quality-reports/aw1b-final/branch-unit-failures.txt || true
          sed -E 's/\x1B\[[0-9;]*[mK]//g' quality-reports/aw1b-final/main-unit.log \
            | grep -E '^ FAIL ' | sed -E 's/^[[:space:]]+//' | sort -u > quality-reports/aw1b-final/main-unit-failures.txt || true
          diff -u quality-reports/aw1b-final/main-unit-failures.txt quality-reports/aw1b-final/branch-unit-failures.txt \
            | tee quality-reports/aw1b-final/unit-failure-identity-diff.txt

          echo "branch_status=$branch_status" | tee quality-reports/aw1b-final/unit-status.txt
          echo "main_status=$main_status" | tee -a quality-reports/aw1b-final/unit-status.txt
          if [ "$branch_status" -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            test "$main_status" -ne 0
            echo "result=baseline-parity" >> "$GITHUB_OUTPUT"
          fi

      - name: Script tests
        shell: bash
        run: npm run test:scripts 2>&1 | tee quality-reports/aw1b-final/script-tests.log

      - name: Production dependency audit
        shell: bash
        run: npm audit --omit=dev --audit-level=moderate 2>&1 | tee quality-reports/aw1b-final/npm-audit.log

      - name: Production build
        shell: bash
        run: |
          export PLAIVRA_BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          npm run build 2>&1 | tee quality-reports/aw1b-final/build.log

      - name: Record summary
        shell: bash
        run: |
          {
            echo "head_sha=${{ github.event.pull_request.head.sha }}"
            echo "starting_sha=$AW1B_STARTING_SHA"
            echo "unit_result=${{ steps.unit.outputs.result }}"
          } > quality-reports/aw1b-final/summary.txt

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw1b-final-validation-${{ github.run_id }}
          path: quality-reports/aw1b-final/
          if-no-files-found: error
          retention-days: 14
