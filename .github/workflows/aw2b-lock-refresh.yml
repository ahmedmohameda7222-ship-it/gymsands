name: AW-2B Lock Refresh

on:
  push:
    branches:
      - feat/active-workout-aw2b-command-authority
    paths:
      - .github/workflows/aw2b-lock-refresh.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2b-command-authority
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Refresh the audited sharp lock identity
        run: |
          set -euo pipefail
          npm pkg set devDependencies.sharp=0.35.3
          npm pkg set overrides.sharp=0.35.3
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev --audit-level=moderate
          git diff --check
      - name: Commit generated package metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(deps): update sharp security baseline"
          git push origin HEAD:feat/active-workout-aw2b-command-authority
