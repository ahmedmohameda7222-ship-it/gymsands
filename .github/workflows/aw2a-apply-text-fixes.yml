name: AW-2A Apply Text Fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply reviewed AW-2A fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'missing expected source in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          replace('components/workouts/workout-day-focus-session.tsx',
                  'import { useEffect, useMemo, useRef, useState } from "react";',
                  'import { useCallback, useEffect, useMemo, useRef, useState } from "react";')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '  function mirrorExecutionState(next: WorkoutSessionExecutionState) {',
                  '  const mirrorExecutionState = useCallback((next: WorkoutSessionExecutionState) => {')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '  }\n\n  function queueExecutionWrite(\n    write: () => Promise<WorkoutSessionExecutionState>,\n    rollback?: () => void\n  ) {',
                  '  }, [day.day_name, day.id, restTimerKey, user, workoutTimerKey]);\n\n  const queueExecutionWrite = useCallback((\n    write: () => Promise<WorkoutSessionExecutionState>,\n    rollback?: () => void\n  ) => {')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '    return operation;\n  }\n\n  useEffect(() => {',
                  '    return operation;\n  }, [mirrorExecutionState, toast, tr]);\n\n  useEffect(() => {')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '        } else if (controllerDeviceIdRef.current && persistedState.controller_device_id !== controllerDeviceIdRef.current) {\n          authoritativeState = await queueExecutionWrite(() => persistWorkoutSessionCursor(\n            user.id,\n            nextSession.id,\n            {\n              snapshotItemId: persistedState.active_snapshot_item_id,\n              itemOrder: persistedState.active_item_order,\n              setNumber: persistedState.active_set_number,\n              controllerDeviceId: controllerDeviceIdRef.current\n            }\n          ));\n        }',
                  '        }\n\n        if (controllerDeviceIdRef.current && authoritativeState.controller_device_id !== controllerDeviceIdRef.current) {\n          authoritativeState = await queueExecutionWrite(() => persistWorkoutSessionCursor(\n            user.id,\n            nextSession.id,\n            {\n              snapshotItemId: authoritativeState.active_snapshot_item_id,\n              itemOrder: authoritativeState.active_item_order,\n              setNumber: authoritativeState.active_set_number,\n              controllerDeviceId: controllerDeviceIdRef.current\n            }\n          ));\n        }')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '  }, [day, restTimerKey, toast, tr, user?.id, workoutTimerKey]);',
                  '  }, [day, mirrorExecutionState, queueExecutionWrite, restTimerKey, toast, tr, user?.id, workoutTimerKey]);')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '  }, [restTimerKey, session?.id, timerEndsAtMs, toast, tr, user?.id]);',
                  '  }, [queueExecutionWrite, restTimerKey, session?.id, timerEndsAtMs, toast, tr, user?.id]);')
          replace('components/workouts/workout-day-focus-session.tsx',
                  '  }, [activeExerciseIndex, activeSetIndex, day.exercises, executionCursorItems, executionState, session?.id, user?.id]);',
                  '  }, [activeExerciseIndex, activeSetIndex, day.exercises, executionCursorItems, executionState, queueExecutionWrite, session?.id, user?.id]);')

          replace('components/workouts/workout-session-form.tsx',
                  'import { useEffect, useMemo, useRef, useState } from "react";',
                  'import { useCallback, useEffect, useMemo, useRef, useState } from "react";')
          replace('components/workouts/workout-session-form.tsx',
                  '  function mirrorExecutionState(next: WorkoutSessionExecutionState) {',
                  '  const mirrorExecutionState = useCallback((next: WorkoutSessionExecutionState) => {')
          replace('components/workouts/workout-session-form.tsx',
                  '  }\n\n  function queueExecutionWrite(write: () => Promise<WorkoutSessionExecutionState>, rollback?: () => void) {',
                  '  }, [restTimerKey, timerKey, user, workout.id, workout.name]);\n\n  const queueExecutionWrite = useCallback((write: () => Promise<WorkoutSessionExecutionState>, rollback?: () => void) => {')
          replace('components/workouts/workout-session-form.tsx',
                  '    return operation;\n  }\n\n  useEffect(() => {',
                  '    return operation;\n  }, [mirrorExecutionState, toast, tr]);\n\n  useEffect(() => {')
          replace('components/workouts/workout-session-form.tsx',
                  '        if (authoritativeState.view_state === "rest" && executionRestSecondsLeft(authoritativeState) <= 0) {',
                  '        if (controllerDeviceIdRef.current && authoritativeState.controller_device_id !== controllerDeviceIdRef.current) {\n          authoritativeState = await persistWorkoutSessionCursor(user.id, nextSession.id, {\n            snapshotItemId: authoritativeState.active_snapshot_item_id,\n            itemOrder: authoritativeState.active_item_order,\n            setNumber: authoritativeState.active_set_number,\n            controllerDeviceId: controllerDeviceIdRef.current\n          });\n        }\n        if (authoritativeState.view_state === "rest" && executionRestSecondsLeft(authoritativeState) <= 0) {')
          replace('components/workouts/workout-session-form.tsx',
                  '  }, [restTimerKey, timerKey, toast, tr, user?.id, workout]);',
                  '  }, [mirrorExecutionState, restTimerKey, timerKey, toast, tr, user?.id, workout]);')
          replace('components/workouts/workout-session-form.tsx',
                  '  }, [restTimerKey, session?.id, timerEndsAtMs, toast, tr, user?.id]);',
                  '  }, [queueExecutionWrite, restTimerKey, session?.id, timerEndsAtMs, toast, tr, user?.id]);')

          replace('lib/product/active-workout-aw2a-migration.test.ts',
                  '      "new.revision := old.revision + 1",\n      "log.completed_at is not null",',
                  '      "new.revision := old.revision + 1",\n      "old.bootstrap_source = \'legacy_backfill\' and new.bootstrap_source = \'client_cache_import\'",\n      "log.completed_at is not null",')

          replace('services/database/workout-session-execution.ts',
                  '    active_set_number: Math.max(1, Math.floor(input.setNumber)),\n    controller_device_id: input.controllerDeviceId ?? null\n  };',
                  '    active_set_number: Math.max(1, Math.floor(input.setNumber))\n  };\n  if (input.controllerDeviceId !== undefined) {\n    patch.controller_device_id = input.controllerDeviceId;\n  }')
          replace('services/database/workout-session-execution.ts',
                  '  controllerDeviceId: string | null = null\n) {\n  const patch: WorkoutSessionExecutionStatePatch = {\n    view_state: viewState,\n    rest_started_at: null,\n    rest_duration_seconds: null,\n    rest_ends_at: null,\n    controller_device_id: controllerDeviceId\n  };',
                  '  controllerDeviceId?: string | null\n) {\n  const patch: WorkoutSessionExecutionStatePatch = {\n    view_state: viewState,\n    rest_started_at: null,\n    rest_duration_seconds: null,\n    rest_ends_at: null\n  };\n  if (controllerDeviceId !== undefined) patch.controller_device_id = controllerDeviceId;')

          replace('services/database/workout-session-execution.test.ts',
                  '  importLegacyWorkoutExecutionCache,\n  persistWorkoutSessionPause,',
                  '  importLegacyWorkoutExecutionCache,\n  persistWorkoutSessionCursor,\n  persistWorkoutSessionPause,')
          replace('services/database/workout-session-execution.test.ts',
                  '    expect(result.revision).toBe(1);\n  });',
                  '    expect(result.revision).toBe(1);\n\n    await persistWorkoutSessionCursor(userId, sessionId, {\n      snapshotItemId: null,\n      itemOrder: 1,\n      setNumber: 2\n    });\n    expect(mocks.state.update).toEqual({\n      active_snapshot_item_id: null,\n      active_item_order: 1,\n      active_set_number: 2\n    });\n  });',)
          replace('services/database/workout-session-execution.test.ts',
                  '    expect(mocks.state.update).toMatchObject({ view_state: "set_entry", rest_started_at: null, rest_duration_seconds: null, rest_ends_at: null });',
                  '    expect(mocks.state.update).toEqual({ view_state: "set_entry", rest_started_at: null, rest_duration_seconds: null, rest_ends_at: null });')

          replace('supabase/migrations/20260720213000_active_workout_aw2a_execution_state.sql',
                  "    if new.created_at is distinct from old.created_at then\n      raise exception 'Execution-state creation time is immutable.' using errcode = '23514';\n    end if;\n    if new.revision is distinct from old.revision then",
                  "    if new.created_at is distinct from old.created_at then\n      raise exception 'Execution-state creation time is immutable.' using errcode = '23514';\n    end if;\n    if new.bootstrap_source is distinct from old.bootstrap_source\n       and not (old.bootstrap_source = 'legacy_backfill' and new.bootstrap_source = 'client_cache_import') then\n      raise exception 'Execution-state bootstrap source may change only for one validated legacy cache import.' using errcode = '23514';\n    end if;\n    if new.revision is distinct from old.revision then")
          replace('supabase/migrations/20260720213000_active_workout_aw2a_execution_state.sql',
                  "  if coalesce((select array_to_string(proconfig, ',') from pg_proc where oid = v_integrity), '') not like '%search_path=%'",
                  "  if (select pg_get_userbyid(proowner) from pg_proc where oid = v_integrity) not in ('postgres', 'supabase_admin')\n     or (select pg_get_userbyid(proowner) from pg_proc where oid = v_initializer) not in ('postgres', 'supabase_admin')\n     or (select pg_get_userbyid(proowner) from pg_proc where oid = v_cleanup) not in ('postgres', 'supabase_admin') then\n    raise exception 'AW-2A trusted lifecycle functions are not owned by a trusted database role.';\n  end if;\n  if coalesce((select array_to_string(proconfig, ',') from pg_proc where oid = v_integrity), '') not like '%search_path=%'")
          replace('supabase/migrations/20260720213000_active_workout_aw2a_execution_state.sql',
                  "  select migration_version into strict v_marker\n  from public.release_schema_compatibility",
                  "  if exists (\n    select 1\n    from pg_class relation\n    cross join lateral aclexplode(coalesce(relation.relacl, acldefault('r', relation.relowner))) grant_acl\n    where relation.oid = 'public.workout_session_execution_states'::regclass\n      and grant_acl.grantee = 0\n  ) then\n    raise exception 'PUBLIC retains privileges on the AW-2A execution-state table.';\n  end if;\n\n  select migration_version into strict v_marker\n  from public.release_schema_compatibility")

          replace('.github/workflows/aw2a-workspace-export.yml',
                  '      - name: Prove no new unit failure identity\n        continue-on-error: true\n        shell: bash',
                  '      - name: Prove no new unit failure identity\n        shell: bash')
          PY

          rm -rf .github/aw2a-codefix .github/aw2a-final-fix .github/aw2a-correction .github/aw2a-correction-small .github/aw2a-patch
          rm -f .github/workflows/aw2a-source-export.yml .github/workflows/aw2a-apply-text-fixes.yml docs/.aw2a-pr-trigger
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(workouts): complete AW-2A validation corrections'
          git push origin HEAD:feat/active-workout-aw2a-persisted-execution-state
