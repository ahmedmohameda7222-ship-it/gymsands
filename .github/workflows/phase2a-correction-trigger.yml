name: Diagnose Phase 2A correction payload

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'chatgpt/train-phase2a-architecture-foundation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/train-phase2a-architecture-foundation
          fetch-depth: 0
      - name: Diagnose and record payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import json
          import re

          payload_path = Path('.github/workflows/phase2a-correction-apply.yml')
          lines = payload_path.read_text(encoding='utf-8').splitlines()
          result = {
              'file_bytes': payload_path.stat().st_size,
              'line_count': len(lines),
              'blocks': [],
          }
          for index, line in enumerate(lines):
              match = re.search(r"cat <<'PAYLOAD' \| base64 -d \| gzip -d > (.+)$", line.strip())
              if not match:
                  continue
              item = {'target': match.group(1).strip(), 'line': index + 1}
              try:
                  encoded = lines[index + 1].strip()
                  compressed = base64.b64decode(encoded, validate=True)
                  restored = gzip.decompress(compressed)
                  item.update({
                      'encoded_chars': len(encoded),
                      'compressed_bytes': len(compressed),
                      'restored_bytes': len(restored),
                      'sha256': hashlib.sha256(restored).hexdigest(),
                      'status': 'ok',
                  })
              except Exception as exc:
                  item.update({'status': 'error', 'error': f'{type(exc).__name__}: {exc}'})
              result['blocks'].append(item)
          Path('.phase2a-payload-diagnostic.json').write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .phase2a-payload-diagnostic.json
          git commit -m "chore: record Phase 2A payload diagnostics"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
