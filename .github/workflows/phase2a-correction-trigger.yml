name: Apply Phase 2A corrections

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'chatgpt/train-phase2a-architecture-foundation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/train-phase2a-architecture-foundation
          fetch-depth: 0
      - name: Restore and verify locally validated corrections
        shell: bash
        run: |
          set -euo pipefail
          base64 -d < .phase2a-payload/integration.b64 | gzip -d > services/database/train-program-v2-rpc.integration.test.ts
          base64 -d < .phase2a-payload/migration.b64 | gzip -d > supabase/migrations/20260715190000_train_phase2a_program_architecture.sql
          base64 -d < .phase2a-payload/verification.b64 | gzip -d > supabase/verification/train-phase2a-program-architecture.sql
          echo "9751f91b095f5de3d323162192c31d7f0d40d770f23897725ab1c8e9f060663a  services/database/train-program-v2-rpc.integration.test.ts" | sha256sum -c -
          echo "6d9121741099f2ba1a8e8536072e4411d64c7a42c1667799a29d1dc00881d9f7  supabase/migrations/20260715190000_train_phase2a_program_architecture.sql" | sha256sum -c -
          echo "b5b3dda968f37e0141a8b05d135404516c4263f1303fc58ff13fe026552a8c0e  supabase/verification/train-phase2a-program-architecture.sql" | sha256sum -c -
      - name: Commit and push final correction
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .phase2a-payload
          rm -f .phase2a-payload-diagnostic.json
          rm -f .tmp-tree-probe
          rm -f .github/workflows/phase2a-correction-apply.yml
          rm -f .github/workflows/phase2a-correction-trigger.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(train): correct Phase 2A migration security and integrity"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
