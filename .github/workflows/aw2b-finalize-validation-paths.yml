name: AW-2B Finalize Validation Paths

on:
  push:
    branches:
      - feat/active-workout-aw2b-command-authority
    paths:
      - .github/workflows/aw2b-finalize-validation-paths.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2b-command-authority
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Bind permanent AW-2B SQL and exact validation paths
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          quality_path = Path('.github/workflows/quality.yml')
          quality = quality_path.read_text()
          needle = """          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-integration.sql;\n          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql;"""
          replacement = """          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-integration.sql;\n          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2b-command-authority.sql;\n          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2b-integration.sql;\n          PGPASSWORD=postgres psql \"$PLAIVRA_LOCAL_DATABASE_URL\" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql;"""
          if quality.count(needle) != 1:
              raise SystemExit('Quality verification insertion point is not exact.')
          quality_path.write_text(quality.replace(needle, replacement))

          exact_path = Path('.github/workflows/exact-release-quality-validation.yml')
          exact = exact_path.read_text()
          exact_needle = "      - plaivra_aw2a_post_merge_release_closure_implementation_report.md\n"
          exact_paths = """      - plaivra_aw2a_post_merge_release_closure_implementation_report.md
      - plaivra_aw2b_command_authority_implementation_report.md
      - supabase/migration-ledger.json
      - supabase/migrations/*_active_workout_aw2b_command_authority.sql
      - supabase/verification/active-workout-aw2b-*.sql
      - lib/product/active-workout-aw2b-migration.test.ts
      - lib/workouts/workout-session-execution.ts
      - lib/workouts/workout-session-execution.test.ts
      - services/database/workout-session-execution.ts
      - services/database/workout-session-execution.test.ts
      - services/database/workout-session-execution-command.integration.test.ts
      - types/workout-session-execution-command.ts
      - package.json
      - package-lock.json
"""
          if exact.count(exact_needle) != 1:
              raise SystemExit('Exact validation path insertion point is not exact.')
          exact_path.write_text(exact.replace(exact_needle, exact_paths))
          PY
          node --input-type=module - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'supabase/migration-ledger.json';
          writeFileSync(path, `${JSON.stringify(JSON.parse(readFileSync(path, 'utf8')), null, 2)}\n`);
          NODE
          git diff --check
      - name: Commit permanent validation binding
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/quality.yml .github/workflows/exact-release-quality-validation.yml supabase/migration-ledger.json
          git diff --cached --quiet && exit 0
          git commit -m "ci(workouts): bind AW-2B release-quality validation"
          git push origin HEAD:feat/active-workout-aw2b-command-authority
