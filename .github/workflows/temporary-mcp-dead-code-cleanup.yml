name: Temporary MCP Dead Code Cleanup

on:
  push:
    branches:
      - repo-constitution-cleanup

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: repo-constitution-cleanup
          fetch-depth: 0

      - name: Remove retired MCP paths
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one literal match, found {count}")
              return text.replace(old, new, 1)

          def sub_once(text: str, pattern: str, replacement: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one regex match, found {count}")
              return updated

          original_path = Path("lib/mcp/tool-executor.ts")
          original = original_path.read_text()
          original = replace_once(
              original,
              'import { configuredProviders } from "@/lib/integrations/env";\n',
              '',
              'remove provider import'
          )
          original = sub_once(
              original,
              r'\nfunction assertAdmin\(ctx: McpContext\) \{.*?\n\}\n',
              '\n',
              'remove admin assertion'
          )
          original = replace_once(
              original,
              '      case "get_fitlife_status":',
              '      case "get_plaivra_status":',
              'rename connection status tool'
          )
          original = replace_once(
              original,
              '      case "create_custom_workout_plan":\n      case "save_chatgpt_workout_plan":\n      case "generate_workout_plan":\n',
              '      case "create_custom_workout_plan":\n',
              'remove workout aliases'
          )
          original = sub_once(
              original,
              r'\n      case "get_active_workout_plan": \{.*?\n      \}\n',
              '\n',
              'remove retired active-plan case'
          )
          original = sub_once(
              original,
              r'\n      case "add_cardio_to_plan": \{.*?\n      \}\n',
              '\n',
              'remove retired add-cardio case'
          )
          original = sub_once(
              original,
              r'\n      case "search_exercises":\n        return .*?;\n',
              '\n',
              'remove retired exercise search'
          )
          original = sub_once(
              original,
              r'\n      case "replace_exercise": \{.*?\n      \}\n',
              '\n',
              'remove retired replace-exercise case'
          )
          original = sub_once(
              original,
              r'\n      case "admin_api_status":[\s\S]*?\n      default:',
              '\n      default:',
              'remove admin executor cases'
          )
          original = replace_once(
              original,
              '    if (message === "not_admin") return fail("not_admin", "Admin access is required.");\n',
              '',
              'remove retired admin error mapping'
          )
          original_path.write_text(original)

          safe_path = Path("lib/mcp/tool-executor-safe.ts")
          safe = safe_path.read_text()
          safe = sub_once(
              safe,
              r'\nconst aiActionTypes = new Set\(\[.*?\]\);\nconst aiActionStatuses = new Set\(\[.*?\]\);',
              '',
              'remove AI request constants'
          )
          for function_name in [
              'getAiActionRequests',
              'createAiActionRequest',
              'updateAiActionStatus',
              'updateSafetyProfile',
          ]:
              safe = sub_once(
                  safe,
                  rf'\nasync function {function_name}\(.*?\n\}}\n',
                  '\n',
                  f'remove {function_name}'
              )
          for line in [
              '  if (toolName === "get_ai_action_requests") return getAiActionRequests(ctx, input);\n',
              '  if (toolName === "create_ai_action_request") return createAiActionRequest(ctx, input);\n',
              '  if (toolName === "update_ai_action_request_status") return updateAiActionStatus(ctx, input);\n',
              '  if (toolName === "get_safety_profile") return getSingleUserRow(ctx, "user_safety_profiles", "safety_profile");\n',
              '  if (toolName === "update_safety_profile") return updateSafetyProfile(ctx, input);\n',
          ]:
              safe = replace_once(safe, line, '', f'remove dispatch {line.strip()}')
          safe = replace_once(
              safe,
              '  if (toolName === "update_meal_plan_item" || toolName === "replace_meal_plan_item") return updateMealPlanItem(ctx, input);',
              '  if (toolName === "update_meal_plan_item") return updateMealPlanItem(ctx, input);',
              'remove meal-plan alias'
          )
          safe = sub_once(
              safe,
              r'\n  if \(toolName === "get_active_workout_plan"\) \{.*?\n  \}\n',
              '\n',
              'remove safe active-plan dispatch'
          )
          safe_path.write_text(safe)

          for path_string in ["lib/mcp/tools.ts", "lib/mcp/server.ts"]:
              path = Path(path_string)
              text = path.read_text()
              if 'get_fitlife_status' not in text:
                  raise SystemExit(f"{path_string}: legacy status name not found")
              path.write_text(text.replace('get_fitlife_status', 'get_plaivra_status'))
          PY

      - name: Verify retired names are absent from active MCP source
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E 'get_ai_action_requests|create_ai_action_request|update_ai_action_request_status|get_safety_profile|update_safety_profile|save_chatgpt_workout_plan|generate_workout_plan|replace_meal_plan_item|admin_api_status|admin_search_users|get_admin_user_summary|get_fitlife_status' lib/mcp; then
            echo "Retired MCP source remains." >&2
            exit 1
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git add lib/mcp
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: remove retired MCP execution paths"
          git push origin HEAD:repo-constitution-cleanup
