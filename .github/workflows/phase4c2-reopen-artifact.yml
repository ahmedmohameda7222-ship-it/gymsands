name: Phase 4C2 Reopen Artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    if: github.event.pull_request.head.ref == 'phase4c2-active-workout-muscle-load'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4c2-active-workout-muscle-load
          fetch-depth: 0
      - name: Build corrected files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          component_path = Path('components/workouts/workout-day-focus-session.tsx')
          component = component_path.read_text()
          old = '''  async function restartSet(exerciseIndex: number, setIndex: number) {
    if (isSaving) return;
    const previousStates = exerciseStates;
    setIsSaving(true);
    const nextStates = statesWithSetPatch(exerciseIndex, setIndex, { completedAt: null });
    setExerciseStates(nextStates);
    try {
      await persistProgress(nextStates);
      setMuscleLoadRevision((current) => current + 1);
      setSetFeedbackVariant("info");
      setSetFeedback(tr("setReopened"));
'''
          new = '''  async function restartSet(exerciseIndex: number, setIndex: number) {
    if (isSaving || !session) return;
    const previousStates = exerciseStates;
    setIsSaving(true);
    const nextStates = statesWithSetPatch(exerciseIndex, setIndex, { completedAt: null });
    setExerciseStates(nextStates);
    try {
      const item = nextStates[exerciseIndex];
      const reopenedSet = item?.sets[setIndex];
      if (!item || !reopenedSet) throw new Error("Workout set is unavailable.");
      await saveWorkoutSetLogs(session.id, [{
        planExerciseId: item.exercise.id,
        exerciseOrder: exerciseIndex + 1,
        exerciseName: item.exercise.exercise_name,
        exerciseCategory: item.exercise.category || item.exercise.target_muscle || item.exercise.equipment || "Workout",
        plannedSets: item.exercise.sets ?? item.sets.length,
        plannedReps: item.exercise.reps,
        plannedRestSeconds: item.exercise.rest_seconds,
        setNumber: reopenedSet.setNumber,
        reps: toNumberOrNull(reopenedSet.reps),
        weightKg: toNumberOrNull(reopenedSet.weightKg),
        notes: setNote(reopenedSet),
        completedAt: null
      }]);
      await updateWorkoutSessionDuration(session.id, Math.max(1, Math.ceil(elapsedSeconds / 60)));
      setMuscleLoadRevision((current) => current + 1);
      setSetFeedbackVariant("info");
      setSetFeedback(tr("setReopened"));
'''
          if old not in component:
              raise SystemExit('restartSet anchor not found')
          component_path.write_text(component.replace(old, new, 1))

          test_path = Path('lib/product/muscle-intelligence-phase4c2.test.ts')
          test = test_path.read_text()
          old_test = 'expect(day).toContain("muscleLoadRevision"); expect(panel).toContain("data-phase4c2-active-muscle-load");'
          new_test = 'expect(day).toContain("muscleLoadRevision"); expect(day).toContain("completedAt: null"); expect(day).toContain("await saveWorkoutSetLogs(session.id, [{"); expect(panel).toContain("data-phase4c2-active-muscle-load");'
          if old_test not in test:
              raise SystemExit('Phase 4C.2 test anchor not found')
          test_path.write_text(test.replace(old_test, new_test, 1))
          PY
          mkdir -p phase4c2-patch/components/workouts phase4c2-patch/lib/product
          cp components/workouts/workout-day-focus-session.tsx phase4c2-patch/components/workouts/
          cp lib/product/muscle-intelligence-phase4c2.test.ts phase4c2-patch/lib/product/
          git rev-parse HEAD > phase4c2-patch/parent-sha.txt
          git rev-parse 'HEAD^{tree}' > phase4c2-patch/base-tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: phase4c2-reopen-patch
          path: phase4c2-patch
