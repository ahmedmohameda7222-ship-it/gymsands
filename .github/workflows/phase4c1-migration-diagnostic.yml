name: Phase 4C1 Migration Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: phase4c1-migration-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Replay migrations and post concise diagnostic
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          status=0
          report=/tmp/phase4c1-report.md
          : > "$report"

          supabase db start > /tmp/phase4c1-start.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "<!-- phase4c1-migration-diagnostic -->"
              echo "### Phase 4C.1 migration diagnostic"
              echo '```text'
              tail -n 140 /tmp/phase4c1-start.log
              echo '```'
            } > "$report"
          else
            supabase db reset --local --no-seed > /tmp/phase4c1-reset.log 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              {
                echo "<!-- phase4c1-migration-diagnostic -->"
                echo "### Phase 4C.1 migration diagnostic"
                echo '```text'
                grep -nEi 'error|failed|fatal|panic|syntax|exception|migration' /tmp/phase4c1-reset.log | tail -n 70 || true
                echo "--- final tail ---"
                tail -n 120 /tmp/phase4c1-reset.log
                echo '```'
              } > "$report"
            else
              supabase db lint --local --schema public --level error --fail-on error > /tmp/phase4c1-lint.log 2>&1
              status=$?
              {
                echo "<!-- phase4c1-migration-diagnostic -->"
                echo "### Phase 4C.1 migration diagnostic"
                echo '```text'
                if [ "$status" -eq 0 ]; then
                  echo "Migration replay and database lint passed."
                else
                  cat /tmp/phase4c1-lint.log
                fi
                echo '```'
              } > "$report"
            fi
          fi

          gh pr comment "${{ github.event.pull_request.number }}" --body-file "$report"
          exit "$status"
