name: AW-2C Authority Correction Dispatch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/aw2c-authority-correction-dispatch.yml

permissions:
  contents: write

concurrency:
  group: aw2c-authority-correction-dispatch-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  correct:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2c-timeline-events
          fetch-depth: 0

      - name: Execute reviewed patch from branch workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/aw2c-authority-correction.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          source = dedent(workflow[start:end])
          exec(compile(source, 'aw2c-authority-correction.py', 'exec'))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Validate correction
        run: |
          set -euo pipefail
          npm run lint
          npm run typecheck
          npx vitest run \
            services/database/workout-session-resume.test.ts \
            services/database/workout-rpc-convergence.test.ts \
            lib/product/train-phase1-approved-semantics.test.ts \
            services/database/direct-workout-sessions.test.ts

      - name: Commit correction to existing branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/aw2c-authority-correction.yml
          rm .github/workflows/aw2c-authority-correction-dispatch.yml
          git config user.name "plaivra-release-owner"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(workouts): close AW-2C direct start authority"
          git push origin HEAD:feat/active-workout-aw2c-timeline-events
