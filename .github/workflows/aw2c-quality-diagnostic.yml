name: AW-2C Quality Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/aw2c-quality-diagnostic.yml

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_HEAD: ${{ github.event.pull_request.head.sha }}
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2c-timeline-events
          fetch-depth: 0

      - name: Capture exact failed Quality diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p quality-reports
          gh run list --repo "$GITHUB_REPOSITORY" --workflow quality.yml --branch "$TARGET_BRANCH" --event workflow_dispatch --limit 50 --json databaseId,headSha,displayTitle,status,conclusion,createdAt > /tmp/runs.json
          jq --arg head "$TARGET_HEAD" '[.[] | select(.headSha == $head)]' /tmp/runs.json > quality-reports/aw2c-final-quality-runs.json
          run_id="$(jq -r '[.[] | select(.conclusion == "failure")][0].databaseId // empty' quality-reports/aw2c-final-quality-runs.json)"
          if [[ "$run_id" =~ ^[0-9]+$ ]]; then
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > quality-reports/aw2c-final-quality-failure.log 2>&1 || true
          else
            printf 'No failed workflow_dispatch Quality run found for %s\n' "$TARGET_HEAD" > quality-reports/aw2c-final-quality-failure.log
          fi

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/aw2c-quality-diagnostic.yml
          git config user.name "plaivra-release-owner"
          git config user.email "actions@users.noreply.github.com"
          git add quality-reports/aw2c-final-quality-runs.json quality-reports/aw2c-final-quality-failure.log .github/workflows/aw2c-quality-diagnostic.yml
          git commit -m "chore(aw2c): capture final quality diagnostics"
          git push origin HEAD:feat/active-workout-aw2c-timeline-events
