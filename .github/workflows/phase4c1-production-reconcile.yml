name: Phase 4C1 Production Reconcile

on:
  push:
    branches:
      - phase4c1-runtime-v2-cutover
    paths:
      - .github/workflows/phase4c1-production-reconcile.yml

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 4C.1 branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Reconcile repository with applied production identities
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json

          mapping = {
              '20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql': ('20260719221012', 'muscle_intelligence_phase4c1_runtime_v2_cutover'),
              '20260719223010_muscle_intelligence_phase4c1_snapshot_support.sql': ('20260719221100', 'muscle_intelligence_phase4c1_snapshot_support'),
              '20260719223020_muscle_intelligence_phase4c1_v2_snapshot_freeze.sql': ('20260719221152', 'muscle_intelligence_phase4c1_v2_snapshot_freeze'),
              '20260719223030_muscle_intelligence_phase4c1_direct_session_v2.sql': ('20260719221248', 'muscle_intelligence_phase4c1_direct_session_v2'),
              '20260719223040_muscle_intelligence_phase4c1_replacement_v2.sql': ('20260719221331', 'muscle_intelligence_phase4c1_replacement_v2'),
              '20260719223050_muscle_intelligence_phase4c1_terminal_reconcile_v2.sql': ('20260719221407', 'muscle_intelligence_phase4c1_terminal_reconcile_v2'),
              '20260719223100_muscle_intelligence_phase4c1_terminal_history_guard.sql': ('20260719221450', 'muscle_intelligence_phase4c1_terminal_history_guard'),
              '20260719223200_muscle_intelligence_phase4c1_set_type_refresh.sql': ('20260719221508', 'muscle_intelligence_phase4c1_set_type_refresh'),
              '20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup.sql': ('20260719221530', 'muscle_intelligence_phase4c1_trusted_log_cleanup'),
          }

          filename_replacements = {}
          migrations = Path('supabase/migrations')
          for old_name, (version, name) in mapping.items():
              new_name = f'{version}_{name}.sql'
              old_path = migrations / old_name
              new_path = migrations / new_name
              if old_path.exists():
                  if new_path.exists():
                      raise SystemExit(f'Duplicate migration target exists: {new_name}')
                  old_path.rename(new_path)
              elif not new_path.exists():
                  raise SystemExit(f'Migration source missing: {old_name}')
              filename_replacements[old_name] = new_name

          for relative in [
              'README.md',
              'docs/architecture/migration-ledger-reconciliation.md',
              'lib/product/muscle-intelligence-phase4c1.test.ts',
              'lib/product/muscle-intelligence-phase4c1-set-type.test.ts',
          ]:
              path = Path(relative)
              text = path.read_text()
              for old_name, new_name in filename_replacements.items():
                  text = text.replace(old_name, new_name)
              path.write_text(text)

          ledger_path = Path('supabase/migration-ledger.json')
          ledger = json.loads(ledger_path.read_text())
          entries = {entry['localFile']: entry for entry in ledger['entries']}
          for old_name, (version, name) in mapping.items():
              entry = entries.get(old_name)
              new_name = filename_replacements[old_name]
              if entry is None:
                  entry = entries.get(new_name)
              if entry is None:
                  raise SystemExit(f'Ledger entry missing: {old_name}')
              entry['localFile'] = new_name
              entry['productionVersion'] = version
              entry['productionName'] = name
              entry['state'] = 'applied'
              entry['note'] = (
                  'Applied exactly once to production on 2026-07-19 through the supported Supabase migration authority. '
                  'Post-apply verification confirmed the Phase 4C.1 V2 runtime cutover, terminal integrity guards, '
                  'unchanged historical V1 snapshots, and unchanged compatibility marker 20260717051011. Do not replay.'
              )

          ledger['entries'].sort(key=lambda entry: entry['localFile'])
          ledger['capturedAt'] = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          ledger['auditedRepositoryCommit'] = 'd1485062b09a83c4202c1d4154e78b3512cfd621'
          ledger['productionMigrationCount'] = 62
          ledger['pendingCount'] = 0
          ledger['unresolvedCount'] = 0
          ledger['historyRepair']['state'] = 'reconciled'
          ledger['historyRepair']['pendingCount'] = 0
          ledger['historyRepair']['unresolvedCount'] = 0
          ledger['historyRepair']['note'] = (
              'Production migration history is reconciled through 20260719221530 with all 62 repository migrations '
              'recorded exactly once. Do not replay any applied migration.'
          )
          ledger_path.write_text(json.dumps(ledger, indent=2) + '\n')

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          readme = readme.replace(
              'Phase 4C.1 is implemented on its Draft PR as a pending runtime cutover: existing V1 snapshots stay unchanged, new sessions use V2 after the migration is explicitly applied, and completed V2 workload is frozen independently from mutable set logs.',
              'Phase 4C.1 runtime cutover is applied in production: existing V1 snapshots remain unchanged, new sessions use V2, and completed V2 workload is frozen independently from mutable set logs.'
          )
          readme = readme.replace(
              'Production migration history remains reconciled through `20260719094718`; nine Phase 4C.1 repository migrations are pending and have not been applied. The deployed compatibility marker intentionally remains `20260717051011` until a separately authorized coordinated release.',
              'Production migration history is reconciled through `20260719221530` with 62 migrations recorded exactly once. The deployed compatibility marker intentionally remains `20260717051011` until a separately authorized coordinated release.'
          )
          readme = readme.replace('## Pending Phase 4C.1 migrations', '## Applied Phase 4C.1 migrations')
          readme = readme.replace(
              'These nine files are classified as pending and form one ordered Phase 4C.1 runtime cutover chain. They must not be applied, repaired as applied, merged, or deployed without explicit coordinated authorization. Do not replay any already-applied migration.',
              'These nine files match the production migration identities and were applied exactly once in order. Do not replay or modify them.'
          )
          readme_path.write_text(readme)

          doc_path = Path('docs/architecture/migration-ledger-reconciliation.md')
          doc = doc_path.read_text()
          doc = doc.replace(
              '**Status:** **Production is reconciled through `20260719094718`; nine Phase 4C.1 repository migrations are pending and unapplied**',
              '**Status:** **Fully reconciled through `20260719221530`; no pending repository migration remains**'
          )
          doc = doc.replace(
              'This document records verified production migration history and pending repository migrations. It is not authorization to replay migrations, apply pending migrations, deploy, promote, change compatibility markers, or merge.',
              'This document records verified production migration history. It is not authorization to replay migrations, deploy, promote, change compatibility markers, or merge.'
          )
          doc = doc.replace('- Applied production migrations: 53', '- Applied production migrations: 62')
          doc = doc.replace('- Latest production migration: `20260719094718_muscle_intelligence_phase4b_advanced_mappings_part_06`', '- Latest production migration: `20260719221530_muscle_intelligence_phase4c1_trusted_log_cleanup`')
          doc = doc.replace('- `pendingCount = 9`', '- `pendingCount = 0`')
          doc = doc.replace('- `unresolvedCount = 9`', '- `unresolvedCount = 0`')
          doc = doc.replace('- `historyRepair.state = pending`', '- `historyRepair.state = reconciled`')
          doc = doc.replace('- Ledger-level migration-history release readiness: false until the pending Phase 4C.1 chain is explicitly handled', '- Ledger-level migration-history release readiness: true')
          doc = doc.replace('Production itself remains unchanged. The pending state describes repository files that have not been applied.\n\n', '')
          doc = doc.replace('## Pending Muscle Intelligence Phase 4C.1 chain', '## Applied Muscle Intelligence Phase 4C.1 chain')
          doc = doc.replace(
              'These migrations are classified as `pending` because they exist in the Draft Phase 4C.1 implementation but are absent from production migration history. They must not be applied, repaired as applied, merged, or deployed without explicit coordinated authorization. Do not replay any already-applied migration.',
              'These migrations were applied exactly once through the supported Supabase migration authority. Their local filenames now match production migration history. Do not replay or modify them.'
          )
          doc = doc.replace('The split, ordered pending chain is designed to:', 'The applied, ordered chain:')
          doc_path.write_text(doc)

          check = json.loads(ledger_path.read_text())
          assert check['productionMigrationCount'] == 62
          assert check['pendingCount'] == 0 and check['unresolvedCount'] == 0
          assert check['historyRepair']['state'] == 'reconciled'
          assert sum(entry['state'] == 'applied' for entry in check['entries']) == 62
          assert all((Path('supabase/migrations') / entry['localFile']).exists() for entry in check['entries'])
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/architecture/migration-ledger-reconciliation.md \
            lib/product/muscle-intelligence-phase4c1.test.ts \
            lib/product/muscle-intelligence-phase4c1-set-type.test.ts \
            supabase/migration-ledger.json supabase/migrations
          git commit -m 'chore(db): reconcile applied Phase 4C.1 migration identities'
          git push origin HEAD:phase4c1-runtime-v2-cutover
