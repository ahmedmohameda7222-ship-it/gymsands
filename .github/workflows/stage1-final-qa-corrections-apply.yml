name: Stage 1 Final QA Corrections Apply

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/stage1-final-qa-corrections-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/aw2a-post-merge-release-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/aw2a-post-merge-release-closure
          fetch-depth: 0

      - name: Apply and validate final Planner corrections
        id: validation
        shell: bash
        run: |
          set -uo pipefail
          cat .stage1-correction/part* \
            | base64 -d \
            | python -c 'import pathlib,sys,zlib; pathlib.Path("/tmp/apply-stage1-final-qa.py").write_bytes(zlib.decompress(sys.stdin.buffer.read()))'

          set +e
          python /tmp/apply-stage1-final-qa.py > /tmp/stage1-apply.log 2>&1
          apply_status=$?
          if [ "$apply_status" -eq 0 ]; then
            python - <<'PY' > /tmp/stage1-postfix.log 2>&1
          from pathlib import Path

          quality = Path('.github/workflows/quality.yml')
          text = quality.read_text(encoding='utf-8')
          old = '--expected-migration 20260721012814'
          new = '--expected-migration "$PLAIVRA_EXPECTED_DATABASE_MIGRATION_VERSION"'
          if old not in text:
              raise SystemExit('remaining Quality migration literal not found')
          quality.write_text(text.replace(old, new, 1), encoding='utf-8')

          focused = Path('scripts/release-closure-final-qa.test.mjs')
          text = focused.read_text(encoding='utf-8')
          old = 'sourceText.indexOf("productionAdapter(databaseUrl, targetIdentity)")'
          new = 'sourceText.indexOf("adapter: productionAdapter(databaseUrl, targetIdentity)")'
          if old not in text:
              raise SystemExit('promotion-order assertion not found')
          focused.write_text(text.replace(old, new, 1), encoding='utf-8')

          stage1 = Path('scripts/release-closure-stage1.test.mjs')
          text = stage1.read_text(encoding='utf-8')
          old = '  assert.match(workflow, /productionPromotionAuthorized !== false/);'
          new = '''  assert.match(workflow, /type: choice/);
          assert.match(workflow, /stage1-infrastructure-validation/);
          assert.match(workflow, /production-marker-promotion-authorization/);
          assert.match(workflow, /production_authorization_token/);'''
          if old not in text:
              raise SystemExit('obsolete Stage-1 assertion not found')
          stage1.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
            postfix_status=$?
          else
            postfix_status=1
          fi

          validation_status=1
          if [ "$apply_status" -eq 0 ] && [ "$postfix_status" -eq 0 ]; then
            node --test \
              scripts/release-preflight.test.mjs \
              scripts/promote-release-schema-compatibility.test.mjs \
              scripts/release-closure-stage1.test.mjs \
              scripts/release-closure-final-qa.test.mjs \
              scripts/run-quality-gate.test.mjs \
              scripts/permanent-quality-replay.test.mjs \
              > /tmp/stage1-validation.log 2>&1
            validation_status=$?
          fi

          mkdir -p .stage1-correction
          cp /tmp/stage1-apply.log .stage1-correction/apply.log
          test ! -f /tmp/stage1-postfix.log || cp /tmp/stage1-postfix.log .stage1-correction/postfix.log
          test ! -f /tmp/stage1-validation.log || cp /tmp/stage1-validation.log .stage1-correction/validation.log
          git status --porcelain > .stage1-correction/worktree-status.txt
          git diff --binary > .stage1-correction/worktree.patch
          printf 'apply_status=%s\npostfix_status=%s\nvalidation_status=%s\n' "$apply_status" "$postfix_status" "$validation_status" > .stage1-correction/status.txt
          echo "apply_status=$apply_status" >> "$GITHUB_OUTPUT"
          echo "postfix_status=$postfix_status" >> "$GITHUB_OUTPUT"
          echo "validation_status=$validation_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failed correction diagnostics
        if: steps.validation.outputs.apply_status != '0' || steps.validation.outputs.postfix_status != '0' || steps.validation.outputs.validation_status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: stage1-final-qa-correction-diagnostics-${{ github.run_id }}
          path: .stage1-correction
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

      - name: Fail when correction validation failed
        if: steps.validation.outputs.apply_status != '0' || steps.validation.outputs.postfix_status != '0' || steps.validation.outputs.validation_status != '0'
        shell: bash
        run: exit 1

      - name: Commit corrected Stage 1 implementation
        if: steps.validation.outputs.apply_status == '0' && steps.validation.outputs.postfix_status == '0' && steps.validation.outputs.validation_status == '0'
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain | grep -E 'supabase/migrations/|^(.. )?(app|components|lib|services)/' || true)"
          rm -rf .stage1-correction
          rm -f .github/workflows/stage1-final-qa-corrections-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(release): bind Stage 1 release identities"
          git push origin HEAD:fix/aw2a-post-merge-release-closure
