name: Temporary AW-2B lockfile refresh

on:
  push:
    branches:
      - feat/active-workout-aw2b-command-authority
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/temporary-aw2b-lockfile-refresh.yml

permissions:
  contents: write

concurrency:
  group: temporary-aw2b-lockfile-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2b-command-authority
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Refresh lockfile only
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Verify package manifest is unchanged
        run: git diff --exit-code -- package.json
      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(deps): refresh patched sharp lockfile"
          git push origin HEAD:feat/active-workout-aw2b-command-authority
