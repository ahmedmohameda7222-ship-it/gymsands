name: Phase 4C1 Ledger Finalize

on:
  push:
    branches:
      - phase4c1-runtime-v2-cutover

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 4C.1 branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Record verified production reconciliation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json

          production = [
            ('20260719223000', 'muscle_intelligence_phase4c1_runtime_v2_cutover'),
            ('20260719223010', 'muscle_intelligence_phase4c1_snapshot_support'),
            ('20260719223020', 'muscle_intelligence_phase4c1_v2_snapshot_freeze'),
            ('20260719223030', 'muscle_intelligence_phase4c1_direct_session_v2'),
            ('20260719223040', 'muscle_intelligence_phase4c1_replacement_v2'),
            ('20260719223050', 'muscle_intelligence_phase4c1_terminal_reconcile_v2'),
            ('20260719223100', 'muscle_intelligence_phase4c1_terminal_history_guard'),
            ('20260719223200', 'muscle_intelligence_phase4c1_set_type_refresh'),
            ('20260719223300', 'muscle_intelligence_phase4c1_trusted_log_cleanup'),
          ]
          by_file = {f'{version}_{name}.sql': (version, name) for version, name in production}

          ledger_path = Path('supabase/migration-ledger.json')
          ledger = json.loads(ledger_path.read_text())
          found = 0
          for entry in ledger['entries']:
            identity = by_file.get(entry.get('localFile'))
            if not identity:
              continue
            version, name = identity
            entry.clear()
            entry.update({
              'productionVersion': version,
              'productionName': name,
              'localFile': f'{version}_{name}.sql',
              'state': 'applied',
              'note': 'Applied exactly once through Supabase apply_migration on 2026-07-19. The generated Management API versions were reconciled one-to-one to these reviewed repository identities without replaying SQL. Read-only verification preserved every historical V1 snapshot, created no migration-time V2 snapshot, kept compatibility marker 20260717051011, and passed ACL and immutability contracts. Do not replay.'
            })
            found += 1
          if found != 9:
            raise SystemExit(f'Expected nine Phase 4C.1 ledger entries, found {found}.')
          ledger['entries'].sort(key=lambda entry: entry['localFile'])
          ledger['capturedAt'] = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          ledger['auditedRepositoryCommit'] = 'd1485062b09a83c4202c1d4154e78b3512cfd621'
          ledger['productionMigrationCount'] = 62
          ledger['schemaVerifiedUntrackedCount'] = 0
          ledger['pendingCount'] = 0
          ledger['unresolvedCount'] = 0
          ledger['historyRepair'] = {
            'state': 'reconciled',
            'schemaAppliedUntrackedCount': 0,
            'pendingCount': 0,
            'unresolvedCount': 0,
            'note': 'Production migration history is reconciled through 20260719223300 with all 62 repository migrations recorded exactly once. Do not replay any applied migration.'
          }
          assert len(ledger['entries']) == 62
          assert sum(entry['state'] == 'applied' for entry in ledger['entries']) == 62
          ledger_path.write_text(json.dumps(ledger, indent=2) + '\n')

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          readme = readme.replace(
            '- Phase 4C.1 is implemented on its Draft PR as a pending runtime cutover: existing V1 snapshots stay unchanged, new sessions use V2 after the migration is explicitly applied, and completed V2 workload is frozen independently from mutable set logs.',
            '- Muscle Intelligence Phase 4C.1 is applied to production: existing V1 snapshots remain unchanged, newly started sessions use the V2 snapshot contract, and completed V2 workload is frozen independently from mutable set logs.'
          )
          readme = readme.replace(
            '- Production migration history remains reconciled through `20260719094718`; nine Phase 4C.1 repository migrations are pending and have not been applied. The deployed compatibility marker intentionally remains `20260717051011` until a separately authorized coordinated release.',
            '- Production migration history is reconciled through `20260719223300`; all 62 repository migrations are recorded exactly once. The compatibility marker intentionally remains `20260717051011`.'
          )
          readme = readme.replace('## Pending Phase 4C.1 migrations', '## Applied Phase 4C.1 migrations')
          readme = readme.replace(
            'These nine files are classified as pending and form one ordered Phase 4C.1 runtime cutover chain. They must not be applied, repaired as applied, merged, or deployed without explicit coordinated authorization. Do not replay any already-applied migration.',
            'These nine migrations were applied exactly once, reconciled to the reviewed repository identities, and independently verified. PR #74 remains Draft and unmerged; do not replay or modify applied migration files.'
          )
          readme_path.write_text(readme)

          doc_path = Path('docs/architecture/migration-ledger-reconciliation.md')
          old_doc = doc_path.read_text()
          tail_marker = '## Applied Muscle Intelligence Phase 4B chain'
          tail = old_doc.split(tail_marker, 1)[1]
          chain = '\n'.join(f'{version}_{name}' for version, name in production)
          prefix = f'''# Production migration ledger reconciliation

**Project:** `bkwezjxvapaeasfvlhvv`

**Verified production state:** 2026-07-19

**Machine-readable authority:** [`supabase/migration-ledger.json`](../../supabase/migration-ledger.json)

**Status:** **Fully reconciled through `20260719223300`; no pending repository migration remains**

This document records verified production migration history. It is not authorization to replay migrations, deploy, promote, change compatibility markers, or merge. Applied migration files and production identities are immutable.

## Current production and ledger state

- Applied production migrations: 62
- Latest production migration: `20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup`
- `pendingCount = 0`
- `schemaAppliedUntrackedCount = 0`
- `unresolvedCount = 0`
- `historyRepair.state = reconciled`
- Compatibility marker: `20260717051011`
- Ledger-level migration-history release readiness: true

## Applied Muscle Intelligence Phase 4C.1 chain

```text
{chain}
```

The nine migrations were applied exactly once through the supported Supabase migration operation. The Management API-generated versions were reconciled one-to-one to the reviewed repository identities without replaying SQL. Exact local filenames now match production history. Do not replay or modify them.

Read-only verification after the complete chain confirmed:

```text
production migrations = 62
latest migration = 20260719223300
workout sessions = 10
session snapshots = 10
snapshot items = 34
V1 snapshots = 10
V2 snapshots created by migration = 0
missing snapshots = 0
ownership mismatches = 0
invalid structured set types = 0
historical rows with frozen V2 workload = 0
compatibility marker = 20260717051011
terminal log guard = enabled
terminal session deletion guard = enabled
runtime RPC ACL and search-path contracts = valid
```

The cutover preserves historical V1 envelopes. The V2 contract applies only when a new workout session is started after this production migration boundary.

'''
          doc_path.write_text(prefix + tail_marker + tail)
          PY

          git rm .github/workflows/phase4c1-ledger-finalize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore(db): finalize applied Phase 4C.1 migration ledger'
          git push origin HEAD:phase4c1-runtime-v2-cutover
