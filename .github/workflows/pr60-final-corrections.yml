name: PR60 Final Corrections

on:
  push:
    branches:
      - chatgpt/train-phase2a-architecture-foundation
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

concurrency:
  group: pr60-final-corrections
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'chatgpt/train-phase2a-architecture-foundation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: chatgpt/train-phase2a-architecture-foundation

      - name: Apply focused corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          migration_path = Path("supabase/migrations/20260715190000_train_phase2a_program_architecture.sql")
          migration = migration_path.read_text(encoding="utf-8")
          old_timestamp = "coalesce(exercise.updated_at, exercise.created_at)"
          if migration.count(old_timestamp) != 1:
              raise SystemExit(f"Expected one legacy updated_at reference, found {migration.count(old_timestamp)}")
          migration_path.write_text(migration.replace(old_timestamp, "exercise.created_at"), encoding="utf-8")

          integration_path = Path("services/database/train-program-v2-rpc.integration.test.ts")
          integration = integration_path.read_text(encoding="utf-8")

          table_start = integration.index("    create table public.user_workout_plan_exercises (")
          table_end = integration.index("    create table public.user_workout_sessions (", table_start)
          table_block = integration[table_start:table_end]
          fixture_timestamp_pair = "      created_at timestamptz not null default now(),\n      updated_at timestamptz not null default now()"
          if table_block.count(fixture_timestamp_pair) != 1:
              raise SystemExit(f"Expected one fixture timestamp pair, found {table_block.count(fixture_timestamp_pair)}")
          table_block = table_block.replace(fixture_timestamp_pair, "      created_at timestamptz not null default now()")
          integration = integration[:table_start] + table_block + integration[table_end:]

          old_session_assertion = "expect(sql(`update public.user_workout_plan_sessions set week_template_id=week_template_id where id='${ownerSession}' returning id`)).toBe(ownerSession);"
          new_session_assertion = "expect(sql(`with updated as (update public.user_workout_plan_sessions set week_template_id=week_template_id where id='${ownerSession}' returning id) select id from updated`)).toBe(ownerSession);"
          if integration.count(old_session_assertion) != 1:
              raise SystemExit(f"Expected one session assertion, found {integration.count(old_session_assertion)}")
          integration = integration.replace(old_session_assertion, new_session_assertion)

          old_activity_assertion = "expect(sql(`update public.user_workout_plan_activities set plan_phase_id=plan_phase_id where id='${ownerActivity}' returning id`)).toBe(ownerActivity);"
          new_activity_assertion = "expect(sql(`with updated as (update public.user_workout_plan_activities set plan_phase_id=plan_phase_id where id='${ownerActivity}' returning id) select id from updated`)).toBe(ownerActivity);"
          if integration.count(old_activity_assertion) != 1:
              raise SystemExit(f"Expected one activity assertion, found {integration.count(old_activity_assertion)}")
          integration = integration.replace(old_activity_assertion, new_activity_assertion)

          integration_path.write_text(integration, encoding="utf-8")

          qa_path = Path("scripts/run-train-layout-qa.mjs")
          qa = qa_path.read_text(encoding="utf-8")
          mobile_start = qa.index("  let mobileKeyboardState = { checked: false, focused: false, visualViewport: null };")
          mobile_end = qa.index("  await page.evaluate(() => window.scrollTo", mobile_start)
          new_mobile = '''  let mobileKeyboardState = { checked: false, focused: false, visualViewport: null, diagnostic: null };
          if (mobileKeyboard) {
            const editableSelector = 'input:not([type="hidden"]):not([disabled]):not([readonly]), textarea:not([disabled]):not([readonly])';
            const input = page.locator(editableSelector).filter({ visible: true }).first();
            try {
              await input.waitFor({ state: "visible", timeout: 20_000 });
              const keyboardViewport = { width: renderedViewport.width, height: Math.max(280, Math.floor(renderedViewport.height * 0.55)) };
              await page.setViewportSize(keyboardViewport);
              await input.focus();
              await page.waitForTimeout(100);
              const focused = await input.evaluate((element) => element === document.activeElement);
              mobileKeyboardState = {
                checked: true,
                focused,
                visualViewport: `${keyboardViewport.width}x${keyboardViewport.height}`,
                diagnostic: focused ? null : "Editable control rendered but did not retain focus after keyboard viewport resize."
              };
            } catch (error) {
              const editableCount = await page.locator(editableSelector).count();
              mobileKeyboardState = {
                checked: true,
                focused: false,
                visualViewport: null,
                diagnostic: `Editable control did not become focusable: ${error instanceof Error ? error.message : String(error)}; matching controls: ${editableCount}`
              };
            }
          }
'''
          qa = qa[:mobile_start] + new_mobile + qa[mobile_end:]
          qa_path.write_text(qa, encoding="utf-8")

          corrected_migration = migration_path.read_text(encoding="utf-8")
          corrected_integration = integration_path.read_text(encoding="utf-8")
          corrected_qa = qa_path.read_text(encoding="utf-8")
          if "exercise.updated_at" in corrected_migration:
              raise SystemExit("Legacy nonexistent updated_at reference remains")
          corrected_table = corrected_integration[corrected_integration.index("    create table public.user_workout_plan_exercises ("):corrected_integration.index("    create table public.user_workout_sessions (")]
          if "updated_at timestamptz" in corrected_table:
              raise SystemExit("Fixture-only exercise updated_at column remains")
          if "with updated as (update public.user_workout_plan_sessions" not in corrected_integration:
              raise SystemExit("Session CTE assertion correction missing")
          if "with updated as (update public.user_workout_plan_activities" not in corrected_integration:
              raise SystemExit("Activity CTE assertion correction missing")
          if "await input.waitFor({ state: \"visible\", timeout: 20_000 })" not in corrected_qa:
              raise SystemExit("Mobile keyboard synchronization correction missing")
          PY

      - name: Validate focused diff
        shell: bash
        run: |
          git diff --check
          git diff --stat
          git diff -- \
            supabase/migrations/20260715190000_train_phase2a_program_architecture.sql \
            services/database/train-program-v2-rpc.integration.test.ts \
            scripts/run-train-layout-qa.mjs

      - name: Remove temporary workflow and push correction
        shell: bash
        run: |
          rm .github/workflows/pr60-final-corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            supabase/migrations/20260715190000_train_phase2a_program_architecture.sql \
            services/database/train-program-v2-rpc.integration.test.ts \
            scripts/run-train-layout-qa.mjs \
            .github/workflows/pr60-final-corrections.yml
          git commit -m "fix(train): complete Phase 2A migration and QA validation"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
