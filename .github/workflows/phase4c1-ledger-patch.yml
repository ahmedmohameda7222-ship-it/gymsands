name: Phase 4C1 Ledger Patch

on:
  push:
    branches:
      - phase4c1-runtime-v2-cutover
    paths:
      - .github/workflows/phase4c1-ledger-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Classify Phase 4C.1 migrations as pending
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path('supabase/migration-ledger.json')
          ledger = json.loads(path.read_text())
          pending = [
              '20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql',
              '20260719223100_muscle_intelligence_phase4c1_terminal_history_guard.sql',
              '20260719223200_muscle_intelligence_phase4c1_set_type_refresh.sql',
              '20260719223300_muscle_intelligence_phase4c1_trusted_log_cleanup.sql',
          ]
          by_file = {entry['localFile']: entry for entry in ledger['entries']}
          for local_file in pending:
              entry = by_file.get(local_file)
              if entry is None:
                  ledger['entries'].append({
                      'localFile': local_file,
                      'state': 'pending',
                      'note': 'Phase 4C.1 implementation migration. Not applied to production; explicit coordinated authorization is required before apply.'
                  })
              elif entry.get('state') != 'pending':
                  raise SystemExit(f'{local_file} already has unexpected state {entry.get("state")}')

          ledger['entries'].sort(key=lambda entry: entry['localFile'])
          ledger['capturedAt'] = '2026-07-19T21:20:00Z'
          ledger['pendingCount'] = 4
          ledger['unresolvedCount'] = 4
          ledger['historyRepair']['state'] = 'pending'
          ledger['historyRepair']['pendingCount'] = 4
          ledger['historyRepair']['unresolvedCount'] = 4
          ledger['historyRepair']['note'] = (
              'Production migration history remains reconciled through 20260719094718 with all 53 applied migrations recorded exactly once. '
              'Four Phase 4C.1 repository migrations are pending and have not been applied. '
              'Do not replay any applied migration or apply pending files without explicit coordinated authorization.'
          )
          path.write_text(json.dumps(ledger, indent=2) + '\n')
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/migration-ledger.json
          git commit -m "chore(db): classify Phase 4C.1 migrations as pending"
          git push origin HEAD:phase4c1-runtime-v2-cutover
