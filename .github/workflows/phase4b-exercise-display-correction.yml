name: Phase 4B Exercise Display Correction

on:
  push:
    branches:
      - fix/phase4b-exercise-display
    paths:
      - .github/workflows/phase4b-exercise-display-correction.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/phase4b-exercise-display-correction.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'fix/phase4b-exercise-display'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase4b-exercise-display
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Apply member-facing terminology correction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_one(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}: {old[:100]!r}")
              file.write_text(text.replace(old, new, 1))

          path = "app/(private)/workouts/[id]/page.tsx"
          replace_one(path,
              'import { useTrainTranslation } from "@/lib/i18n/train";\n',
              'import { useTrainTranslation } from "@/lib/i18n/train";\nimport { formatExerciseDisplayList, formatExerciseDisplayValue } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '  const { dir, locale, tr } = useTrainTranslation();',
              '  const { language, dir, locale, tr } = useTrainTranslation();')
          replace_one(path,
              '  const secondaryMuscles = workout.secondary_muscles ?? video?.secondary_muscles ?? [];\n  const favorite = favoriteIds.includes(workout.id);',
              '  const secondaryMuscles = workout.secondary_muscles ?? video?.secondary_muscles ?? [];\n  const displayTarget = formatExerciseDisplayList(workout.muscle_category || workout.target_muscle, language, "muscle");\n  const displayEquipment = formatExerciseDisplayList(workout.equipment_required || workout.equipment, language, "equipment");\n  const displayDifficulty = formatExerciseDisplayValue(workout.experience_level || workout.difficulty, language, "difficulty");\n  const displayMovement = formatExerciseDisplayValue(workout.movement_pattern || workout.mechanics || workout.category, language, "movement");\n  const displayForce = formatExerciseDisplayValue(workout.force_type, language, "force");\n  const displaySecondary = formatExerciseDisplayList(secondaryMuscles, language, "muscle");\n  const favorite = favoriteIds.includes(workout.id);')
          replace_one(path,
              '        description={metadataLine(workout.target_muscle, workout.equipment, workout.difficulty)}',
              '        description={metadataLine(displayTarget, displayEquipment, displayDifficulty)}')
          replace_one(path,
              '''              <div className="flex flex-wrap gap-2">
                <Badge>{workout.muscle_category || workout.target_muscle}</Badge>
                <Badge variant="outline">{workout.equipment_required || workout.equipment}</Badge>
                <Badge variant="outline">{workout.experience_level || workout.difficulty}</Badge>
                {!workout.is_global ? <Badge variant="success">{tr("custom")}</Badge> : null}
                {workout.mechanics ? <Badge variant="outline">{workout.mechanics}</Badge> : null}
                {workout.force_type ? <Badge variant="outline">{workout.force_type}</Badge> : null}
              </div>''',
              '''              <div className="flex flex-wrap gap-2">
                {displayTarget ? <Badge>{displayTarget}</Badge> : null}
                {displayEquipment ? <Badge variant="outline">{displayEquipment}</Badge> : null}
                {displayDifficulty ? <Badge variant="outline">{displayDifficulty}</Badge> : null}
                {!workout.is_global ? <Badge variant="success">{tr("custom")}</Badge> : null}
              </div>''')
          replace_one(path,
              '''              <div className="grid gap-3 sm:grid-cols-2">
                <Detail label={tr("exerciseName")} value={workout.name} />
                <Detail label={tr("target")} value={workout.muscle_category || workout.target_muscle} />
                <Detail label={tr("secondaryMuscle")} value={secondaryMuscles.length ? secondaryMuscles.join(", ") : tr("noneSaved")} />
                <Detail label={tr("equipment")} value={workout.equipment_required || workout.equipment} />
                <Detail label={tr("mechanics")} value={workout.mechanics || workout.category} />
                <Detail label={tr("forceType")} value={workout.force_type || tr("noneSaved")} />
                <Detail label={tr("difficulty")} value={workout.experience_level || workout.difficulty} />
              </div>''',
              '''              <div className="grid gap-3 sm:grid-cols-2">
                <Detail label={tr("primaryMuscle")} value={displayTarget || tr("noneSaved")} />
                <Detail label={tr("secondaryMuscle")} value={displaySecondary || tr("noneSaved")} />
                <Detail label={tr("equipment")} value={displayEquipment || tr("noneSaved")} />
                <Detail label={tr("mechanics")} value={displayMovement || tr("noneSaved")} />
                <Detail label={tr("forceType")} value={displayForce || tr("noneSaved")} />
                <Detail label={tr("difficulty")} value={displayDifficulty || tr("noneSaved")} />
              </div>''')
          replace_one(path,
              '                const metadata = metadataLine(item.target_muscle, item.equipment);',
              '                const metadata = metadataLine(formatExerciseDisplayList(item.target_muscle, language, "muscle"), formatExerciseDisplayList(item.equipment, language, "equipment"));')

          path = "components/workouts/workout-browser.tsx"
          replace_one(path,
              'import { useTrainTranslation } from "@/lib/i18n/train";\n',
              'import { useTrainTranslation } from "@/lib/i18n/train";\nimport { formatExerciseDisplayList, formatExerciseDisplayValue } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '  const { dir, locale, tr } = useTrainTranslation();',
              '  const { language, dir, locale, tr } = useTrainTranslation();')
          replace_one(path,
              '{workout.muscle_category || workout.target_muscle}',
              '{formatExerciseDisplayList(workout.muscle_category || workout.target_muscle, language, "muscle")}')
          replace_one(path,
              '{workout.experience_level || workout.difficulty}',
              '{formatExerciseDisplayValue(workout.experience_level || workout.difficulty, language, "difficulty")}')
          replace_one(path,
              '{workout.equipment_required || workout.equipment}',
              '{formatExerciseDisplayList(workout.equipment_required || workout.equipment, language, "equipment")}')
          replace_one(path,
              '{workout.mechanics}',
              '{formatExerciseDisplayValue(workout.movement_pattern || workout.mechanics, language, "movement")}')
          replace_one(path,
              '{workout.force_type}',
              '{formatExerciseDisplayValue(workout.force_type, language, "force")}')
          replace_one(path,
              'tr("secondaryMusclesNamed", { names: workout.secondary_muscles.join(", ") })',
              'tr("secondaryMusclesNamed", { names: formatExerciseDisplayList(workout.secondary_muscles, language, "muscle") })')

          path = "components/workouts/exercise-picker-dialog.tsx"
          replace_one(path,
              'import { useTrainTranslation } from "@/lib/i18n/train";\n',
              'import { useTrainTranslation } from "@/lib/i18n/train";\nimport { formatExerciseDisplayList, formatExerciseDisplayValue, type ExerciseDisplayDomain } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '''function optionLabel(options: WorkoutFilterOption[], value: string) {
  return options.find((option) => option.value === value)?.label ?? value;
}''',
              '''function optionLabel(options: WorkoutFilterOption[], value: string, language: "en" | "de" | "ar", domain: ExerciseDisplayDomain) {
  return options.find((option) => option.value === value)?.label ?? formatExerciseDisplayValue(value, language, domain);
}''')
          replace_one(path,
              '''    muscle ? { id: "muscle", label: optionLabel(muscleOptions, muscle), clear: () => setMuscle("") } : null,
    equipment ? { id: "equipment", label: optionLabel(equipmentOptions, equipment), clear: () => setEquipment("") } : null,
    difficulty ? { id: "difficulty", label: optionLabel(difficultyOptions, difficulty), clear: () => setDifficulty("") } : null,
    muscleCategory ? { id: "muscle-category", label: optionLabel(muscleCategoryOptions, muscleCategory), clear: () => setMuscleCategory("") } : null,
    secondaryMuscle ? { id: "secondary-muscle", label: optionLabel(secondaryMuscleOptions, secondaryMuscle), clear: () => setSecondaryMuscle("") } : null,
    forceType ? { id: "force-type", label: optionLabel(forceTypeOptions, forceType), clear: () => setForceType("") } : null,
    exerciseType ? { id: "exercise-type", label: optionLabel(exerciseTypeOptions, exerciseType), clear: () => setExerciseType("") } : null,
    mechanics ? { id: "mechanics", label: optionLabel(mechanicsOptions, mechanics), clear: () => setMechanics("") } : null''',
              '''    muscle ? { id: "muscle", label: optionLabel(muscleOptions, muscle, language, "muscle"), clear: () => setMuscle("") } : null,
    equipment ? { id: "equipment", label: optionLabel(equipmentOptions, equipment, language, "equipment"), clear: () => setEquipment("") } : null,
    difficulty ? { id: "difficulty", label: optionLabel(difficultyOptions, difficulty, language, "difficulty"), clear: () => setDifficulty("") } : null,
    muscleCategory ? { id: "muscle-category", label: optionLabel(muscleCategoryOptions, muscleCategory, language, "muscle"), clear: () => setMuscleCategory("") } : null,
    secondaryMuscle ? { id: "secondary-muscle", label: optionLabel(secondaryMuscleOptions, secondaryMuscle, language, "muscle"), clear: () => setSecondaryMuscle("") } : null,
    forceType ? { id: "force-type", label: optionLabel(forceTypeOptions, forceType, language, "force"), clear: () => setForceType("") } : null,
    exerciseType ? { id: "exercise-type", label: optionLabel(exerciseTypeOptions, exerciseType, language, "category"), clear: () => setExerciseType("") } : null,
    mechanics ? { id: "mechanics", label: optionLabel(mechanicsOptions, mechanics, language, "movement"), clear: () => setMechanics("") } : null''')
          replace_one(path,
              '{exercise.target_muscle} · {exercise.equipment}',
              '{formatExerciseDisplayList(exercise.target_muscle, language, "muscle")} · {formatExerciseDisplayList(exercise.equipment, language, "equipment")}')
          replace_one(path,
              '{exercise.difficulty}</Badge>',
              '{formatExerciseDisplayValue(exercise.difficulty, language, "difficulty")}</Badge>')

          path = "components/workouts/workout-plan-builder.tsx"
          replace_one(path,
              'import { useTrainTranslation, type TrainKey } from "@/lib/i18n/train";\n',
              'import { useTrainTranslation, type TrainKey } from "@/lib/i18n/train";\nimport { formatExerciseDisplayList } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '{exercise.target_muscle} · {exercise.equipment}',
              '{formatExerciseDisplayList(exercise.target_muscle, language, "muscle")} · {formatExerciseDisplayList(exercise.equipment, language, "equipment")}')

          path = "app/(private)/my-workout/exercises/[exerciseId]/page.tsx"
          replace_one(path,
              'import { userSafeError } from "@/lib/error-formatting";\n',
              'import { userSafeError } from "@/lib/error-formatting";\nimport { useTrainTranslation } from "@/lib/i18n/train";\nimport { formatExerciseDisplayList } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '  const { user } = useAuth();\n',
              '  const { user } = useAuth();\n  const { language, dir } = useTrainTranslation();\n')
          replace_one(path,
              '    <div className="space-y-5">',
              '    <div className="space-y-5" dir={dir}>')
          replace_one(path,
              '              <Badge variant="outline">{exercise.target_muscle}</Badge>\n              <Badge variant="outline">{exercise.equipment}</Badge>',
              '              <Badge variant="outline">{formatExerciseDisplayList(exercise.target_muscle, language, "muscle")}</Badge>\n              <Badge variant="outline">{formatExerciseDisplayList(exercise.equipment, language, "equipment")}</Badge>')

          path = "components/workouts/my-workout-plans.tsx"
          replace_one(path,
              'import { useTrainTranslation } from "@/lib/i18n/train";\n',
              'import { useTrainTranslation } from "@/lib/i18n/train";\nimport { formatExerciseDisplayValue } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '  const { locale, tr } = useTrainTranslation();\n  const preview = day?.exercises.slice(0, 3) ?? [];',
              '  const { language, locale, tr } = useTrainTranslation();\n  const preview = day?.exercises.slice(0, 3) ?? [];')
          replace_one(path,
              '{exercise.target_muscle ? ` · ${exercise.target_muscle}` : ""}',
              '{exercise.target_muscle ? ` · ${formatExerciseDisplayValue(exercise.target_muscle, language, "muscle")}` : ""}')

          path = "components/workouts/todays-workout.tsx"
          replace_one(path,
              'import { useTranslation } from "@/lib/i18n/use-translation";\n',
              'import { useTranslation } from "@/lib/i18n/use-translation";\nimport { formatExerciseDisplayList } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '  const { t, dir } = useTranslation();',
              '  const { language, t, dir } = useTranslation();')
          replace_one(path,
              '{exercise.muscle_category || exercise.target_muscle} | {exercise.equipment_required || exercise.equipment}',
              '{formatExerciseDisplayList(exercise.muscle_category || exercise.target_muscle, language, "muscle")} · {formatExerciseDisplayList(exercise.equipment_required || exercise.equipment, language, "equipment")}')

          path = "services/database/workout-library.ts"
          replace_one(path,
              'import type { ExerciseVideo, UserExerciseVideo, Workout } from "@/types";\n',
              'import type { ExerciseVideo, UserExerciseVideo, Workout } from "@/types";\nimport { formatExerciseDisplayValue, resolveExerciseDisplayLanguage, type ExerciseDisplayDomain } from "@/lib/train/exercise-display";\n')
          replace_one(path,
              '''function activityFilterOptions(activities: TrainingActivity[]): CanonicalWorkoutFilterOptions {
  const options = emptyCanonicalWorkoutFilterOptions();
  const add = (key: keyof CanonicalWorkoutFilterOptions, option: WorkoutFilterOption | null) => { if (option) options[key].push(option); };
  activities.forEach((activity) => {
    add("exerciseTypes", filterOption(activity.activityType?.slug, activity.activityType?.name));
    add("experienceLevels", filterOption(activity.difficulty ? normalizeCatalogSlug(activity.difficulty) : null, activity.difficulty));
    add("mechanics", filterOption(activity.movementPattern ? normalizeCatalogSlug(activity.movementPattern) : null, activity.movementPattern));
    add("forceTypes", filterOption(activity.forceType ? normalizeCatalogSlug(activity.forceType) : null, activity.forceType));
    activity.equipment.forEach((item) => add("equipmentRequired", filterOption(item.slug, item.name)));
    activity.muscles.forEach((muscle) => {
      add("muscleCategories", filterOption(muscle.bodyRegion ? normalizeCatalogSlug(muscle.bodyRegion) : null, muscle.bodyRegion));
      add(muscle.role === "primary" ? "primaryMuscles" : "secondaryMuscles", filterOption(muscle.slug, muscle.name));
    });
  });
  return mergeCanonicalWorkoutFilterOptions(emptyCanonicalWorkoutFilterOptions(), options);
}''',
              '''function activityFilterOptions(activities: TrainingActivity[], locale?: string): CanonicalWorkoutFilterOptions {
  const options = emptyCanonicalWorkoutFilterOptions();
  const language = resolveExerciseDisplayLanguage(locale);
  const add = (key: keyof CanonicalWorkoutFilterOptions, option: WorkoutFilterOption | null) => { if (option) options[key].push(option); };
  const presented = (value: string | null | undefined, domain: ExerciseDisplayDomain) => value ? formatExerciseDisplayValue(value, language, domain) : value;
  activities.forEach((activity) => {
    add("exerciseTypes", filterOption(activity.activityType?.slug, presented(activity.activityType?.name ?? activity.activityType?.slug, "category")));
    add("experienceLevels", filterOption(activity.difficulty ? normalizeCatalogSlug(activity.difficulty) : null, presented(activity.difficulty, "difficulty")));
    add("mechanics", filterOption(activity.movementPattern ? normalizeCatalogSlug(activity.movementPattern) : null, presented(activity.movementPattern, "movement")));
    add("forceTypes", filterOption(activity.forceType ? normalizeCatalogSlug(activity.forceType) : null, presented(activity.forceType, "force")));
    activity.equipment.forEach((item) => add("equipmentRequired", filterOption(item.slug, presented(item.name || item.slug, "equipment"))));
    activity.muscles.forEach((muscle) => {
      add("muscleCategories", filterOption(muscle.bodyRegion ? normalizeCatalogSlug(muscle.bodyRegion) : null, presented(muscle.bodyRegion, "muscle")));
      add(muscle.role === "primary" ? "primaryMuscles" : "secondaryMuscles", filterOption(muscle.slug, presented(muscle.name || muscle.slug, "muscle")));
    });
  });
  return mergeCanonicalWorkoutFilterOptions(emptyCanonicalWorkoutFilterOptions(), options);
}''')
          replace_one(path,
              '''  const mapTaxonomy = (items: Array<{ slug: string; name: string }> = []) => items
    .map((item) => filterOption(item.slug, item.name))
    .filter((item): item is WorkoutFilterOption => Boolean(item));
  data.equipmentRequired = mapTaxonomy(filters.data.equipment);
  data.exerciseTypes = mapTaxonomy(filters.data.activityTypes);
  data.experienceLevels = filters.data.difficulties
    .map((item) => filterOption(normalizeCatalogSlug(item), item))
    .filter((option): option is WorkoutFilterOption => Boolean(option));
  data.primaryMuscles = mapTaxonomy(filters.data.primaryMuscles);
  data.secondaryMuscles = mapTaxonomy(filters.data.secondaryMuscles);
  data.muscleCategories = mapTaxonomy(filters.data.muscleCategories);
  data.mechanics = mapTaxonomy(filters.data.movementPatterns);
  data.forceTypes = mapTaxonomy(filters.data.forceTypes);''',
              '''  const language = resolveExerciseDisplayLanguage(locale);
  const mapTaxonomy = (items: Array<{ slug: string; name: string }> = [], domain: ExerciseDisplayDomain) => items
    .map((item) => filterOption(item.slug, formatExerciseDisplayValue(item.name || item.slug, language, domain)))
    .filter((item): item is WorkoutFilterOption => Boolean(item));
  data.equipmentRequired = mapTaxonomy(filters.data.equipment, "equipment");
  data.exerciseTypes = mapTaxonomy(filters.data.activityTypes, "category");
  data.experienceLevels = filters.data.difficulties
    .map((item) => filterOption(normalizeCatalogSlug(item), formatExerciseDisplayValue(item, language, "difficulty")))
    .filter((option): option is WorkoutFilterOption => Boolean(option));
  data.primaryMuscles = mapTaxonomy(filters.data.primaryMuscles, "muscle");
  data.secondaryMuscles = mapTaxonomy(filters.data.secondaryMuscles, "muscle");
  data.muscleCategories = mapTaxonomy(filters.data.muscleCategories, "muscle");
  data.mechanics = mapTaxonomy(filters.data.movementPatterns, "movement");
  data.forceTypes = mapTaxonomy(filters.data.forceTypes, "force");''')
          replace_one(path,
              '    ? activityFilterOptions(response.data)',
              '    ? activityFilterOptions(response.data, locale)')

          replace_one("data/muscle-intelligence/v1/registry.json",
              '  "status": "approved_planning_input_not_implemented",',
              '  "status": "implemented_and_published",')

          replace_one("package.json",
              '"test:muscle-intelligence:phase4b": "vitest run --config vitest.unit.config.mjs lib/train/muscle-intelligence/advanced-mapping-registry.test.ts lib/train/muscle-intelligence/plan-advanced-analysis.test.ts lib/product/muscle-intelligence-phase4b.test.ts"',
              '"test:muscle-intelligence:phase4b": "vitest run --config vitest.unit.config.mjs lib/train/exercise-display.test.ts lib/train/muscle-intelligence/advanced-mapping-registry.test.ts lib/train/muscle-intelligence/plan-advanced-analysis.test.ts lib/product/muscle-intelligence-phase4b.test.ts"')

          Path(".github/workflows/phase4b-exercise-display-correction.yml").unlink()
          PY
      - run: npm ci
      - name: Focused validation
        run: |
          npm run test:muscle-intelligence:phase4b
          npx eslint lib/train/exercise-display.ts lib/train/exercise-display.test.ts 'app/(private)/workouts/[id]/page.tsx' 'app/(private)/my-workout/exercises/[exerciseId]/page.tsx' components/workouts/exercise-picker-dialog.tsx components/workouts/my-workout-plans.tsx components/workouts/todays-workout.tsx components/workouts/workout-browser.tsx components/workouts/workout-plan-builder.tsx services/database/workout-library.ts
          npm run typecheck
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(train): present exercise metadata in member language"
          git push origin HEAD:fix/phase4b-exercise-display
