name: Temporary Agent Skill Cleanup

on:
  push:
    branches:
      - repo-constitution-cleanup

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: repo-constitution-cleanup
          fetch-depth: 0

      - name: Remove unused local Ruflo skills
        shell: bash
        run: |
          set -euo pipefail
          keep='^(swarm-orchestration|memory-management|security-audit|performance-analysis|agent-coder|agent-reviewer|agent-tester)$'
          if [ -d .agents/skills ]; then
            for directory in .agents/skills/*; do
              [ -d "$directory" ] || continue
              name="$(basename "$directory")"
              if [[ ! "$name" =~ $keep ]]; then
                git rm -r -- "$directory"
              fi
            done
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove unused local agent skills"
          git push origin HEAD:repo-constitution-cleanup
