name: Onboarding branch autofix

on:
  push:
    branches:
      - codex/adaptive-onboarding-v2

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/adaptive-onboarding-v2
          fetch-depth: 0
      - name: Apply validated CI corrections
        shell: python
        run: |
          from pathlib import Path

          component = Path("components/onboarding/adaptive-onboarding-form.tsx")
          component_source = component.read_text(encoding="utf-8")
          old_dependencies = '  }, [editMode, ot, router, user?.id]);'
          new_dependencies = '  }, [editMode, ot, router, user]);'
          if old_dependencies not in component_source:
              raise SystemExit("Expected onboarding callback dependency line was not found")
          component.write_text(component_source.replace(old_dependencies, new_dependencies, 1), encoding="utf-8")

          translations = Path("lib/i18n/onboarding.ts")
          translation_source = translations.read_text(encoding="utf-8")
          old_locale = '  const locale = language === "de" || language === "ar" ? language : "en";'
          new_locale = '  const locale: "en" | "de" | "ar" = language === "de" || language === "ar" ? language : "en";'
          if old_locale not in translation_source:
              raise SystemExit("Expected onboarding locale line was not found")
          translations.write_text(translation_source.replace(old_locale, new_locale, 1), encoding="utf-8")

          Path(".github/workflows/onboarding-branch-autofix.yml").unlink()
      - name: Commit branch corrections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/onboarding/adaptive-onboarding-form.tsx lib/i18n/onboarding.ts .github/workflows/onboarding-branch-autofix.yml
          git commit -m "fix(onboarding): resolve quality-gate findings"
          git push origin HEAD:codex/adaptive-onboarding-v2
