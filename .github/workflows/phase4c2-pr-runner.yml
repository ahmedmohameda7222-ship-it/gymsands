name: Phase 4C2 PR Runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  implement:
    if: github.event.pull_request.head.ref == 'phase4c2-active-workout-muscle-load' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4c2-active-workout-muscle-load
          fetch-depth: 0
      - name: Execute reviewed implementation script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/phase4c2-implementation.yml').read_text()
          marker = '        run: |\n'
          if marker not in source:
              raise SystemExit('Implementation run block is missing.')
          block = source.split(marker, 1)[1]
          lines = block.splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/phase4c2-implementation.sh').write_text(script)
          PY
          bash /tmp/phase4c2-implementation.sh
