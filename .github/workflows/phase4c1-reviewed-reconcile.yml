name: Phase 4C1 Reviewed Identity Reconcile

on:
  push:
    branches:
      - phase4c1-runtime-v2-cutover

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 4C.1 branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Align verified production history to reviewed identities
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json

          mapping = {
            '20260719221012': '20260719223000',
            '20260719221100': '20260719223010',
            '20260719221152': '20260719223020',
            '20260719221248': '20260719223030',
            '20260719221331': '20260719223040',
            '20260719221407': '20260719223050',
            '20260719221450': '20260719223100',
            '20260719221508': '20260719223200',
            '20260719221530': '20260719223300',
          }

          ledger_path = Path('supabase/migration-ledger.json')
          ledger = json.loads(ledger_path.read_text())
          updated = 0
          for entry in ledger['entries']:
            name = entry.get('productionName', '')
            if not name.startswith('muscle_intelligence_phase4c1_'):
              continue
            old_version = entry.get('productionVersion')
            new_version = mapping.get(old_version)
            if new_version is None:
              if old_version in mapping.values():
                continue
              raise SystemExit(f'Unexpected Phase 4C.1 production version: {old_version}')
            entry['productionVersion'] = new_version
            entry['localFile'] = f'{new_version}_{name}.sql'
            entry['state'] = 'applied'
            entry['note'] = (
              'Applied exactly once through Supabase apply_migration on 2026-07-19. '
              'Management API-generated history versions were reconciled one-to-one to these reviewed repository identities without replaying SQL. '
              'Read-only verification preserved all historical V1 snapshots, created no migration-time V2 snapshot, kept compatibility marker 20260717051011, '
              'and passed runtime ACL and immutability contracts. Do not replay.'
            )
            updated += 1
          if updated != 9:
            raise SystemExit(f'Expected nine generated Phase 4C.1 identities to reconcile, updated {updated}.')

          ledger['entries'].sort(key=lambda entry: entry['localFile'])
          ledger['capturedAt'] = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          ledger['productionMigrationCount'] = 62
          ledger['schemaVerifiedUntrackedCount'] = 0
          ledger['pendingCount'] = 0
          ledger['unresolvedCount'] = 0
          ledger['historyRepair'] = {
            'state': 'reconciled',
            'schemaAppliedUntrackedCount': 0,
            'pendingCount': 0,
            'unresolvedCount': 0,
            'note': 'Production migration history is reconciled through 20260719223300 with all 62 repository migrations recorded exactly once. Do not replay any applied migration.'
          }
          assert len(ledger['entries']) == 62
          assert sum(entry['state'] == 'applied' for entry in ledger['entries']) == 62
          ledger_path.write_text(json.dumps(ledger, indent=2) + '\n')

          for path in [Path('README.md'), Path('docs/architecture/migration-ledger-reconciliation.md')]:
            content = path.read_text()
            for old, new in mapping.items():
              content = content.replace(old, new)
            content = content.replace(
              'These nine files match the production migration identities and were applied exactly once in order. Do not replay or modify them.',
              'These nine files match the reviewed repository identities and the reconciled production migration history. They were applied exactly once in order; no SQL was replayed during history reconciliation. Do not replay or modify them.'
            )
            content = content.replace(
              'Exact local filenames now match production history. Do not replay or modify them.',
              'Exact reviewed local filenames now match reconciled production history. Do not replay or modify them.'
            )
            path.write_text(content)
          PY

          rm -f .github/phase4c1-finalize-trigger.txt
          git rm .github/workflows/phase4c1-reviewed-reconcile.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore(db): align Phase 4C.1 reviewed migration identities'
          git push origin HEAD:phase4c1-runtime-v2-cutover
