name: Phase 4C2 Typecheck Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'phase4c2-active-workout-muscle-load'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4c2-active-workout-muscle-load
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Capture compiler output
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/typecheck.log 2>&1
          status=$?
          tail -n 120 /tmp/typecheck.log > phase4c2-typecheck.txt
          echo "$status" > phase4c2-typecheck-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase4c2-typecheck
          path: |
            phase4c2-typecheck.txt
            phase4c2-typecheck-status.txt
