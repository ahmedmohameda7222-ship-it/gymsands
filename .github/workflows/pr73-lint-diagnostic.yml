name: PR73 Lint Diagnostic

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture ESLint output
        shell: bash
        run: |
          set +e
          npx eslint -- \
            'app/(private)/my-workout/muscle-load/page.tsx' \
            'app/(private)/my-workout/plans/page.tsx' \
            'app/(private)/workouts/[id]/layout.tsx' \
            'components/workouts/exercise-detail-muscle-preview.tsx' \
            'components/workouts/plan-muscle-load-panel.tsx' \
            'components/workouts/train-muscle-load-entry.tsx' \
            'components/workouts/train-muscle-load-overview.tsx' \
            'lib/product/muscle-intelligence-visibility.test.ts' \
            'lib/train/muscle-intelligence/muscle-load-visibility-copy.ts' \
            > pr73-eslint-output.txt 2>&1
          status=$?
          printf '\nESLINT_EXIT=%s\n' "$status" >> pr73-eslint-output.txt
          cat pr73-eslint-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr73-eslint-output
          path: pr73-eslint-output.txt
          if-no-files-found: error
