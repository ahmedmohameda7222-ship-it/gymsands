name: AW-2C Sequence Contract Correction

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/aw2c-sequence-contract-correction.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2c-timeline-events
          fetch-depth: 0

      - name: Correct global sequence assertion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          integration = Path('supabase/verification/active-workout-aw2c-integration.sql')
          text = integration.read_text(encoding='utf-8')
          replacements = {
            "and source='runtime' and sequence_number=1)": "and source='runtime' and sequence_number>0)",
            "and (select min(sequence_number)=1 and max(sequence_number)=1\n     from public.workout_session_timeline_events where workout_session_id=:'direct_session_id'::uuid),": "and (select min(sequence_number)=max(sequence_number) and min(sequence_number)>0\n     from public.workout_session_timeline_events where workout_session_id=:'direct_session_id'::uuid),",
          }
          for old, new in replacements.items():
            if text.count(old) != 1:
              raise SystemExit(f'Expected one sequence assertion, found {text.count(old)} for {old!r}')
            text = text.replace(old, new, 1)
          integration.write_text(text, encoding='utf-8')

          report = Path('plaivra_aw2c_final_planner_qaqc_correction_report.md')
          text = report.read_text(encoding='utf-8')
          old = '- sequence number `1` for the initial event;'
          new = '- one positive database-allocated global sequence token for the initial event;'
          if text.count(old) != 1:
            raise SystemExit(f'Report sequence statement drifted: {text.count(old)}')
          report.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit correction and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/aw2c-sequence-contract-correction.yml
          git config user.name "plaivra-release-owner"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "test(workouts): align AW-2C global sequence proof"
          git push origin HEAD:feat/active-workout-aw2c-timeline-events
