name: PR60 Final Corrections V2

on:
  push:
    branches:
      - chatgpt/train-phase2a-architecture-foundation

permissions:
  contents: write

concurrency:
  group: pr60-final-corrections-v2
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: chatgpt/train-phase2a-architecture-foundation

      - name: Apply final focused corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          migration_path = Path("supabase/migrations/20260715190000_train_phase2a_program_architecture.sql")
          migration = migration_path.read_text(encoding="utf-8")
          old_timestamp = "coalesce(exercise.updated_at, exercise.created_at)"
          assert migration.count(old_timestamp) == 1, migration.count(old_timestamp)
          migration_path.write_text(migration.replace(old_timestamp, "exercise.created_at"), encoding="utf-8")

          integration_path = Path("services/database/train-program-v2-rpc.integration.test.ts")
          integration = integration_path.read_text(encoding="utf-8")
          table_start = integration.index("    create table public.user_workout_plan_exercises (")
          table_end = integration.index("    create table public.user_workout_sessions (", table_start)
          table_block = integration[table_start:table_end]
          old_pair = "      created_at timestamptz not null default now(),\n      updated_at timestamptz not null default now()"
          assert table_block.count(old_pair) == 1, table_block
          table_block = table_block.replace(old_pair, "      created_at timestamptz not null default now()")
          integration = integration[:table_start] + table_block + integration[table_end:]

          old_session = "expect(sql(`update public.user_workout_plan_sessions set week_template_id=week_template_id where id='${ownerSession}' returning id`)).toBe(ownerSession);"
          new_session = "expect(sql(`with updated as (update public.user_workout_plan_sessions set week_template_id=week_template_id where id='${ownerSession}' returning id) select id from updated`)).toBe(ownerSession);"
          assert integration.count(old_session) == 1, integration.count(old_session)
          integration = integration.replace(old_session, new_session)

          old_activity = "expect(sql(`update public.user_workout_plan_activities set plan_phase_id=plan_phase_id where id='${ownerActivity}' returning id`)).toBe(ownerActivity);"
          new_activity = "expect(sql(`with updated as (update public.user_workout_plan_activities set plan_phase_id=plan_phase_id where id='${ownerActivity}' returning id) select id from updated`)).toBe(ownerActivity);"
          assert integration.count(old_activity) == 1, integration.count(old_activity)
          integration = integration.replace(old_activity, new_activity)
          integration_path.write_text(integration, encoding="utf-8")

          qa_path = Path("scripts/run-train-layout-qa.mjs")
          qa = qa_path.read_text(encoding="utf-8")
          mobile_start = qa.index("  let mobileKeyboardState = { checked: false, focused: false, visualViewport: null };")
          mobile_end = qa.index("  await page.evaluate(() => window.scrollTo", mobile_start)
          new_mobile = '''  let mobileKeyboardState = { checked: false, focused: false, visualViewport: null, diagnostic: null };
          if (mobileKeyboard) {
            const editableSelector = 'input:not([type="hidden"]):not([disabled]):not([readonly]), textarea:not([disabled]):not([readonly])';
            const input = page.locator(editableSelector).filter({ visible: true }).first();
            try {
              await input.waitFor({ state: "visible", timeout: 20_000 });
              const keyboardViewport = { width: renderedViewport.width, height: Math.max(280, Math.floor(renderedViewport.height * 0.55)) };
              await page.setViewportSize(keyboardViewport);
              await input.focus();
              await page.waitForTimeout(100);
              const focused = await input.evaluate((element) => element === document.activeElement);
              mobileKeyboardState = {
                checked: true,
                focused,
                visualViewport: `${keyboardViewport.width}x${keyboardViewport.height}`,
                diagnostic: focused ? null : "Editable control rendered but did not retain focus after keyboard viewport resize."
              };
            } catch (error) {
              const editableCount = await page.locator(editableSelector).count();
              mobileKeyboardState = {
                checked: true,
                focused: false,
                visualViewport: null,
                diagnostic: `Editable control did not become focusable: ${error instanceof Error ? error.message : String(error)}; matching controls: ${editableCount}`
              };
            }
          }
'''
          qa_path.write_text(qa[:mobile_start] + new_mobile + qa[mobile_end:], encoding="utf-8")
          PY

      - name: Validate corrections
        shell: bash
        run: |
          ! grep -n "exercise.updated_at" supabase/migrations/20260715190000_train_phase2a_program_architecture.sql
          grep -n "with updated as (update public.user_workout_plan_sessions" services/database/train-program-v2-rpc.integration.test.ts
          grep -n "with updated as (update public.user_workout_plan_activities" services/database/train-program-v2-rpc.integration.test.ts
          grep -n "await input.waitFor({ state: \"visible\", timeout: 20_000 })" scripts/run-train-layout-qa.mjs
          git diff --check
          git diff --stat

      - name: Commit and push final correction
        shell: bash
        run: |
          rm -f \
            .github/workflows/pr60-final-corrections.yml \
            .github/workflows/pr60-final-corrections-v2.yml \
            .pr60-final-correction-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(train): complete Phase 2A migration and QA validation"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
