name: Phase 4C2 Implementation

# One-shot branch implementation workflow.
on:
  push:
    branches:
      - phase4c2-active-workout-muscle-load
    paths:
      - .github/workflows/phase4c2-implementation.yml

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase4c2-active-workout-muscle-load
          fetch-depth: 0

      - name: Implement active workout muscle load
        shell: bash
