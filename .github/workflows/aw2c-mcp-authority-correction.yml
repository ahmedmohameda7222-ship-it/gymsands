name: AW-2C MCP Authority Correction

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/aw2c-mcp-authority-correction.yml

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: feat/active-workout-aw2c-timeline-events
          fetch-depth: 0

      - name: Apply staged MCP authority correction
        run: python scripts/aw2c-mcp-authority-correction.py

      - name: Verify effective mutation authority statically
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          executor = Path('lib/mcp/tool-executor.ts').read_text(encoding='utf-8')
          if re.search(r'\.from\(\s*["\']workout_sessions["\']\s*\)\s*\.(?:insert|upsert|update|delete)\s*\(', executor, re.S):
              raise SystemExit('Unsafe MCP workout_sessions mutation remains')
          for authority in ('start_or_resume_workout_session_atomic', 'skip_workout_day_atomic'):
              if authority not in executor:
                  raise SystemExit(f'Missing MCP authority: {authority}')
          if 'scheduled_session_id or plan_day_id is required.' not in executor:
              raise SystemExit('Unbound MCP start does not fail closed')
          PY

      - name: Commit correction and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/aw2c-mcp-authority-correction.yml
          rm scripts/aw2c-mcp-authority-correction.py
          git config user.name "plaivra-release-owner"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(mcp): enforce AW-2C workout authorities"
          git push origin HEAD:feat/active-workout-aw2c-timeline-events
