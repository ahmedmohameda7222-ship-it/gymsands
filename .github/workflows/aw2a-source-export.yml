name: AW-2A Source Export

on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  export:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - run: |
          git rev-parse HEAD > /tmp/head.txt
          tar --exclude=.git --exclude=node_modules --exclude=.next -czf /tmp/source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: aw2a-source-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/source.tar.gz
            /tmp/head.txt
          retention-days: 1
