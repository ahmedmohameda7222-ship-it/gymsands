name: AW-2A Source Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Archive exact source
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > /tmp/aw2a-source-head.txt
          tar --exclude=.git --exclude=node_modules --exclude=.next -czf /tmp/aw2a-current-source.tar.gz .
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: aw2a-current-source-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/aw2a-current-source.tar.gz
            /tmp/aw2a-source-head.txt
          if-no-files-found: error
          retention-days: 1
