name: Stage 1 Finalize Implementation Report

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - .github/workflows/stage1-report-finalize.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'fix/aw2a-post-merge-release-closure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aw2a-post-merge-release-closure
          fetch-depth: 0
      - name: Append validated correction evidence
        shell: bash
        run: |
          set -euo pipefail
          report=plaivra_aw2a_post_merge_release_closure_implementation_report.md
          cat >> "$report" <<'REPORT'

---

