## Final corrected contracts

- Stage-1 preflight remains read-only and cannot authorize promotion.
- Production marker-promotion authorization remains read-only but requires the exact deliberate token `AUTHORIZE_PRODUCTION_MARKER_PROMOTION_<reviewed_commit>_<quality_run_id>_<expected_migration>`.
- The token, reviewed commit, comparison base, Quality run, validation request, preflight request, and expected migration are bound end-to-end.
- Quality and preflight derive the expected migration from the exact reconciled ledger; no generic permanent hardcoded AW-2A target remains.
- Manifest generation rejects requested-target and ledger-head mismatch.
- Synthetic future-ledger coverage proves a later reconciled migration advances the target without source edits.
- Direct Production URL acceptance requires `db.bkwezjxvapaeasfvlhvv.supabase.co` with user `postgres`.
- Pooler acceptance requires a recognized `*.pooler.supabase.com` endpoint with user `postgres.bkwezjxvapaeasfvlhvv`.
- Activity Catalog direct and pooler identities, other projects, generic PostgreSQL, localhost, malformed/insecure URLs, and project-ref mismatches are rejected before adapter construction or database reads.
- Exact orchestration discovers request-bound run names and independently verifies downloaded Quality and preflight evidence.
- Exact validation permissions are limited to `actions: write`, `contents: read`, and `issues: write`; `pull-requests: write` and `pull_request_target` are absent.

