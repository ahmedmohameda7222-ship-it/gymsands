name: Lockfile sync

on:
  push:
    branches:
      - codex/production-incident-remediation
    paths:
      - package.json
      - .nvmrc
      - .node-version
      - .github/workflows/lockfile-sync.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/production-incident-remediation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - name: Commit lockfile metadata when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already matches package.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(runtime): sync Node 24 lockfile metadata"
          git push origin HEAD:codex/production-incident-remediation
