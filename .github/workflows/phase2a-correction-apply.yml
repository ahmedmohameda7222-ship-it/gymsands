name: Apply Phase 2A correction payload

on:
  push:
    branches:
      - chatgpt/train-phase2a-architecture-foundation

permissions:
  contents: write

concurrency:
  group: phase2a-correction-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore locally validated correction files
        shell: bash
        run: |
          set -euo pipefail
          cat <<'PAYLOAD' | base64 -d | gzip -d > services/database/train-program-v2-rpc.integration.test.ts
          H4sIAEb+V2oC/+09aXPbRrLf-
          PAYLOAD
          cat <<'PAYLOAD' | base64 -d | gzip -d > supabase/migrations/20260715190000_train_phase2a_program_architecture.sql
          
          PAYLOAD
          cat <<'PAYLOAD' | base64 -d | gzip -d > supabase/verification/train-phase2a-program-architecture.sql
          
          PAYLOAD
          git diff --check
          git rm -- .github/workflows/phase2a-correction-apply.yml
          git add services/database/train-program-v2-rpc.integration.test.ts \
            supabase/migrations/20260715190000_train_phase2a_program_architecture.sql \
            supabase/verification/train-phase2a-program-architecture.sql
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix(train): correct Phase 2A migration security and integrity"
          git push origin HEAD:${GITHUB_REF_NAME}
