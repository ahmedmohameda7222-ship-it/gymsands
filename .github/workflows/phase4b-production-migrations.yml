name: Phase 4B Production Migrations

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: phase4b-production-migrations
  cancel-in-progress: false

jobs:
  apply-reviewed-migrations:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'feat/train-muscle-intelligence-phase4b-builder-integration'
    runs-on: ubuntu-24.04
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: bkwezjxvapaeasfvlhvv
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact authorized migration set
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            supabase/migrations/20260719210001_muscle_intelligence_phase4b_advanced_mappings_part_01.sql
            supabase/migrations/20260719210002_muscle_intelligence_phase4b_advanced_mappings_part_02.sql
            supabase/migrations/20260719210003_muscle_intelligence_phase4b_advanced_mappings_part_03.sql
            supabase/migrations/20260719210004_muscle_intelligence_phase4b_advanced_mappings_part_04.sql
            supabase/migrations/20260719210005_muscle_intelligence_phase4b_advanced_mappings_part_05.sql
            supabase/migrations/20260719210006_muscle_intelligence_phase4b_advanced_mappings_part_06.sql
          )
          for file in "${expected[@]}"; do
            test -f "$file"
          done
          mapfile -t changed_migrations < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" -- supabase/migrations | sort)
          printf '%s\n' "${changed_migrations[@]}" > /tmp/changed-migrations.txt
          printf '%s\n' "${expected[@]}" | sort > /tmp/expected-migrations.txt
          diff -u /tmp/expected-migrations.txt /tmp/changed-migrations.txt

      - name: Verify production credentials are configured
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${SUPABASE_DB_PASSWORD:-}"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Link exact production project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Dry-run exact migration push
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --include-all --dry-run

      - name: Apply exact reviewed migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --include-all --yes

      - name: Record remote migration state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p production-migration-evidence
          supabase migration list --linked | tee production-migration-evidence/migration-list.txt
          git rev-parse HEAD > production-migration-evidence/commit.txt

      - name: Upload production migration evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase4b-production-migration-evidence-${{ github.event.pull_request.head.sha }}
          path: production-migration-evidence/
          if-no-files-found: error
          retention-days: 30
