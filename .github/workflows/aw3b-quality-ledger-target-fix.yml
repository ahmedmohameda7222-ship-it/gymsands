name: AW-3B Quality ledger target fix

on:
  push:
    branches:
      - feat/active-workout-aw3b-structured-set-details

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Patch Quality validation target
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/quality.yml')
          content = path.read_text(encoding='utf-8')
          old = '''      - name: Derive release target from exact reconciled ledger
                id: release_target
                shell: bash
                run: |
                  set -euo pipefail
                  node --input-type=module - <<'NODE'
                  import { readFileSync } from "node:fs";
                  import { deriveReleaseTarget } from "./scripts/release-identity-contract.mjs";
                  const target = deriveReleaseTarget(JSON.parse(readFileSync("supabase/migration-ledger.json", "utf8")));
                  const values = {
                    PLAIVRA_EXPECTED_DATABASE_MIGRATION_VERSION: target.expectedMigration,
                    PLAIVRA_MIGRATION_LEDGER_RECONCILIATION_STATE: target.reconciliationState,
                    PLAIVRA_PENDING_MIGRATION_COUNT: String(target.pendingCount),
                    PLAIVRA_SCHEMA_APPLIED_UNTRACKED_COUNT: String(target.schemaAppliedUntrackedCount),
                    PLAIVRA_UNRESOLVED_MIGRATION_COUNT: String(target.unresolvedCount),
                  };
                  for (const [key, value] of Object.entries(values)) {
                    process.stdout.write(`${key}=${value}\\n`);
                  }
                  NODE
                  node --input-type=module - <<'NODE' >> "$GITHUB_ENV"
                  import { readFileSync } from "node:fs";
                  import { deriveReleaseTarget } from "./scripts/release-identity-contract.mjs";
                  const target = deriveReleaseTarget(JSON.parse(readFileSync("supabase/migration-ledger.json", "utf8")));
                  console.log(`PLAIVRA_EXPECTED_DATABASE_MIGRATION_VERSION=${target.expectedMigration}`);
                  console.log(`PLAIVRA_MIGRATION_LEDGER_RECONCILIATION_STATE=${target.reconciliationState}`);
                  console.log(`PLAIVRA_PENDING_MIGRATION_COUNT=${target.pendingCount}`);
                  console.log(`PLAIVRA_SCHEMA_APPLIED_UNTRACKED_COUNT=${target.schemaAppliedUntrackedCount}`);
                  console.log(`PLAIVRA_UNRESOLVED_MIGRATION_COUNT=${target.unresolvedCount}`);
                  NODE
                  expected_migration="$(grep '^PLAIVRA_EXPECTED_DATABASE_MIGRATION_VERSION=' "$GITHUB_ENV" | tail -n 1 | cut -d= -f2-)"
                  [[ "$expected_migration" =~ ^[0-9]{12,14}$ ]]
                  echo "expected_migration=$expected_migration" >> "$GITHUB_OUTPUT"
          '''
          new = '''      - name: Derive validation target from exact migration ledger
                id: release_target
                shell: bash
                run: |
                  set -euo pipefail
                  node scripts/quality-ledger-target.mjs
                  node scripts/quality-ledger-target.mjs >> "$GITHUB_ENV"
                  expected_migration="$(node scripts/quality-ledger-target.mjs --value expectedMigration)"
                  [[ "$expected_migration" =~ ^[0-9]{12,14}$ ]]
                  echo "expected_migration=$expected_migration" >> "$GITHUB_OUTPUT"
          '''
          if content.count(old) != 1:
              raise SystemExit(f'Expected one Quality ledger block, found {content.count(old)}')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/aw3b-quality-ledger-target-fix.yml
          git diff --check

      - name: Commit permanent Quality correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(ci): validate pending AW-3B migration in Quality"
          git push origin HEAD:feat/active-workout-aw3b-structured-set-details
