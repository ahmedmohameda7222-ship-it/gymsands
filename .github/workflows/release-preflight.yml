name: Release preflight

on:
  workflow_dispatch:
    inputs:
      reviewed_commit:
        description: Exact 40-character reviewed commit SHA
        required: true
        type: string
      quality_run_id:
        description: GitHub Actions run ID containing quality-reports-<run id>
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-preflight-${{ inputs.reviewed_commit }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate exact inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.reviewed_commit }}" =~ ^[0-9a-fA-F]{40}$ ]]
          [[ "${{ inputs.quality_run_id }}" =~ ^[0-9]+$ ]]

      - name: Checkout reviewed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.reviewed_commit }}
          fetch-depth: 0

      - name: Verify repository and checkout identity
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "ahmedmohameda7222-ship-it/gymsands"
          test "$(git rev-parse HEAD)" = "${{ inputs.reviewed_commit }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download exact quality evidence
        uses: actions/download-artifact@v4
        with:
          name: quality-reports-${{ inputs.quality_run_id }}
          path: quality-reports
          github-token: ${{ github.token }}
          run-id: ${{ inputs.quality_run_id }}

      - name: Verify manifest belongs to reviewed commit
        shell: bash
        run: |
          set -euo pipefail
          node -e '
            const fs = require("node:fs");
            const manifest = JSON.parse(fs.readFileSync("quality-reports/release-manifest.json", "utf8"));
            if (manifest.release?.commitSha !== process.argv[1]) throw new Error("Quality manifest commit mismatch.");
          ' "${{ inputs.reviewed_commit }}"

      - name: Validate migration ledger
        run: npm run migration:ledger:check

      - name: Run non-deploying release preflight
        run: >-
          npm run release:preflight --
          --commit "${{ inputs.reviewed_commit }}"
          --repository "${{ github.repository }}"
          --quality-reports quality-reports
          --output quality-reports/release-preflight.json

      - name: Upload preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-preflight-${{ inputs.reviewed_commit }}
          path: |
            quality-reports/release-preflight.json
            quality-reports/release-manifest.json
          if-no-files-found: error
          retention-days: 30
