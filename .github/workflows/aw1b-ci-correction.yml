name: AW-1B CI Correction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  correct:
    if: github.head_ref == 'feat/active-workout-aw1b-messages-locale-qa'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Correct locale QA persistence and tiny-screen reservation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          qa = Path("scripts/run-train-layout-qa.mjs")
          source = qa.read_text(encoding="utf-8")

          context_line = '  const context = await browser.newContext({ viewport: renderedViewport, reducedMotion: "reduce", colorScheme: theme });'
          cookie_line = context_line + '\n  await context.addCookies([{ name: "plaivra.language.v1", value: language, url: baseUrl, sameSite: "Lax" }]);'
          if cookie_line not in source:
              if context_line not in source:
                  raise SystemExit("QA context target not found")
              source = source.replace(context_line, cookie_line, 1)

          route_target = '''  await context.route(/^https:\\/\\/[^/]+\\.supabase\\.co\\//, async (requestRoute) => {
            const method = requestRoute.request().method();
            let body = {};'''
          route_replacement = '''  await context.route(/^https:\\/\\/[^/]+\\.supabase\\.co\\//, async (requestRoute) => {
            const method = requestRoute.request().method();
            const requestUrl = new URL(requestRoute.request().url());
            if (requestUrl.pathname.includes("/rest/v1/user_app_settings") && (method === "GET" || method === "HEAD")) {
              const wantsObject = (requestRoute.request().headers().accept || "").includes("application/vnd.pgrst.object");
              const now = "2026-07-20T00:00:00.000Z";
              const row = {
                id: "22222222-2222-4222-8222-222222222222",
                user_id: "00000000-0000-4000-8000-000000000001",
                theme_id: "olive",
                theme: "light",
                accent_color: "olive",
                language,
                weight_unit: "kg",
                height_unit: "cm",
                distance_unit: "km",
                liquid_unit: "ml",
                energy_unit: "kcal",
                body_measurement_unit: "cm",
                week_starts_on: "monday",
                default_start_page: "today",
                compact_mode: false,
                reduce_animations: true,
                large_text_mode: false,
                quick_log_sections: ["workout"],
                created_at: now,
                updated_at: now
              };
              await requestRoute.fulfill({
                status: 200,
                contentType: "application/json",
                headers: { "content-range": "0-0/1", "x-plaivra-qa-fixture": "localized-settings" },
                body: method === "HEAD" ? "" : JSON.stringify(wantsObject ? row : [row])
              });
              return;
            }
            let body = {};'''
          if 'x-plaivra-qa-fixture": "localized-settings"' not in source:
              if route_target not in source:
                  raise SystemExit("QA Supabase route target not found")
              source = source.replace(route_target, route_replacement, 1)

          selector_line = '  await page.waitForSelector(isSessionRoute ? "main#main-content" : "[data-app-shell]", { timeout: 20_000 });'
          language_wait = selector_line + '\n  await page.waitForFunction((expected) => document.documentElement.lang === expected, language, { timeout: 20_000 });'
          if language_wait not in source:
              if selector_line not in source:
                  raise SystemExit("QA selector target not found")
              source = source.replace(selector_line, language_wait, 1)

          qa.write_text(source, encoding="utf-8")

          train_ui = Path("components/workouts/train-ui.tsx")
          source = train_ui.read_text(encoding="utf-8")
          old = 'max-[340px]:pb-[var(--active-workout-controller-height,0px)]'
          new = 'max-[340px]:pb-[var(--active-workout-controller-height)]'
          if old not in source:
              raise SystemExit("Train tiny-screen reservation target not found")
          train_ui.write_text(source.replace(old, new, 1), encoding="utf-8")

          contract = Path("lib/product/muscle-intelligence-phase4c2.test.ts")
          source = contract.read_text(encoding="utf-8")
          if old not in source:
              raise SystemExit("Phase 4C.2 contract target not found")
          contract.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
          rm .github/workflows/aw1b-ci-correction.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/run-train-layout-qa.mjs components/workouts/train-ui.tsx lib/product/muscle-intelligence-phase4c2.test.ts .github/workflows/aw1b-ci-correction.yml
          git commit -m "test(i18n): align rendered QA with authoritative locale"
          git push origin HEAD:feat/active-workout-aw1b-messages-locale-qa
