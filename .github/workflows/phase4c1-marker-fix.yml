name: Phase 4C1 Marker Compatibility Patch

on:
  push:
    branches:
      - phase4c1-runtime-v2-cutover
    paths:
      - .github/workflows/phase4c1-marker-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: phase4c1-runtime-v2-cutover
          fetch-depth: 0

      - name: Accept both approved pre-release markers without changing either
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('supabase/migrations/20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql')
          text = path.read_text()
          old = "if v_marker is distinct from '20260717051011' then"
          new = "if v_marker not in ('20260711014500', '20260717051011') then"
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one Phase 4C.1 preflight marker predicate, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add supabase/migrations/20260719223000_muscle_intelligence_phase4c1_runtime_v2_cutover.sql
          git commit -m "fix(db): accept both approved compatibility baselines"
          git push origin HEAD:phase4c1-runtime-v2-cutover
