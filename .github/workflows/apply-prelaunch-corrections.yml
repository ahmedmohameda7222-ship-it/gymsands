name: Apply prelaunch corrections

on:
  workflow_dispatch:
  push:
    branches:
      - prelaunch-remediation-2026-07
    paths:
      - scripts/apply-prelaunch-corrections.py
      - .github/workflows/apply-prelaunch-corrections.yml
      - docs/operations/prelaunch-correction-trigger.txt

permissions:
  contents: write

concurrency:
  group: apply-prelaunch-corrections
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'fix: apply prelaunch runtime safety corrections') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: prelaunch-remediation-2026-07
          fetch-depth: 0
      - name: Apply deterministic patch
        run: python3 scripts/apply-prelaunch-corrections.py
      - name: Commit correction batch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No correction changes were produced."
            exit 0
          fi
          git commit -m "fix: apply prelaunch runtime safety corrections"
          git push origin HEAD:prelaunch-remediation-2026-07
