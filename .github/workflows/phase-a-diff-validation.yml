name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD

  prepare-aw3b-exact-validation-blobs:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply and validate exact pre-application contract
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum .aw3b-exact-preapplication.patch | cut -d' ' -f1)" = "e8a1619bfb952d367bbeae0cd166aa19659220829d832f2e6e861b865b5e6fa2"
          git apply --check .aw3b-exact-preapplication.patch
          git apply .aw3b-exact-preapplication.patch
          git diff --check
          node scripts/release-closure-stage1.test.mjs
          node scripts/release-closure-final-qa.test.mjs

      - name: Create exact Git blobs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/aw3b-exact-validation-blobs.txt
          for path in \
            .github/workflows/exact-release-quality-validation.yml \
            scripts/release-closure-final-qa.test.mjs \
            scripts/release-closure-stage1.test.mjs; do
            encoded="$(base64 -w0 "$path")"
            sha="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/blobs" -f content="$encoded" -f encoding=base64 --jq .sha)"
            printf '%s=%s\n' "$path" "$sha" | tee -a /tmp/aw3b-exact-validation-blobs.txt
          done
          grep -Fx '.github/workflows/exact-release-quality-validation.yml=0c0b6f7b4a616e639e682721a5e34bad99f56689' /tmp/aw3b-exact-validation-blobs.txt
          grep -Fx 'scripts/release-closure-final-qa.test.mjs=406307a66fe956ce24e473992fc117d79513edd7' /tmp/aw3b-exact-validation-blobs.txt
          grep -Fx 'scripts/release-closure-stage1.test.mjs=74af8c678e781650c902604523e60efcda6bc617' /tmp/aw3b-exact-validation-blobs.txt

      - name: Upload exact blob identities
        uses: actions/upload-artifact@v4
        with:
          name: aw3b-exact-validation-blobs-${{ github.event.pull_request.head.sha }}
          path: /tmp/aw3b-exact-validation-blobs.txt
          if-no-files-found: error
          retention-days: 1
