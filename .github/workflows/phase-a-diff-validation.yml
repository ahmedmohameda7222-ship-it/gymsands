name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD

  patch-aw3b-quality-ledger-target:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply permanent pending-aware Quality correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/quality.yml')
          content = path.read_text(encoding='utf-8')
          start_marker = '      - name: Derive release target from exact reconciled ledger\n'
          end_marker = '      - name: Set up Node.js\n'
          if content.count(start_marker) != 1:
              raise SystemExit(f'Expected one strict Quality target block, found {content.count(start_marker)}')
          start = content.index(start_marker)
          end = content.index(end_marker, start)
          replacement = '''      - name: Derive validation target from exact migration ledger
                id: release_target
                shell: bash
                run: |
                  set -euo pipefail
                  node scripts/quality-ledger-target.mjs
                  node scripts/quality-ledger-target.mjs >> "$GITHUB_ENV"
                  expected_migration="$(node scripts/quality-ledger-target.mjs --value expectedMigration)"
                  [[ "$expected_migration" =~ ^[0-9]{12,14}$ ]]
                  echo "expected_migration=$expected_migration" >> "$GITHUB_OUTPUT"

          '''
          path.write_text(content[:start] + replacement + content[end:], encoding='utf-8')
          PY
          rm -f .github/workflows/aw3b-quality-ledger-target-fix.yml
          git checkout origin/main -- .github/workflows/phase-a-diff-validation.yml
          git diff --check

      - name: Publish permanent correction
        id: publish
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee /tmp/aw3b-quality-publish.log) 2>&1
          set -euxo pipefail
          branch=feat/active-workout-aw3b-structured-set-details
          git fetch origin "$branch"
          test "$(git rev-parse origin/$branch)" = "${{ github.event.pull_request.head.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git status --short
          git diff --cached --stat
          git commit -m "fix(ci): validate pending AW-3B migration in Quality"
          git show --stat --oneline --decorate HEAD
          git push --verbose origin HEAD:"$branch"

      - name: Upload publication diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw3b-quality-publish-${{ github.event.pull_request.head.sha }}
          path: /tmp/aw3b-quality-publish.log
          if-no-files-found: error
          retention-days: 1

      - name: Require successful publication
        if: always()
        shell: bash
        run: test "${{ steps.publish.outcome }}" = "success"
