name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Create exact local code correction commit
        shell: bash
        run: |
          set -euo pipefail
          input_sha="${{ github.event.pull_request.head.sha }}"
          node scripts/pr59-final-corrections.mjs
          node scripts/pr59-safety-followup.mjs
          node scripts/pr59-test-followup.mjs
          git checkout "$input_sha" -- .github/workflows
          git diff --check
          git config user.name "Plaivra PR59 Correction"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(train): apply PR59 required corrections"
          test -z "$(git diff --name-only HEAD^ HEAD -- .github/workflows)"
          echo "CORRECTION_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Validate corrected branch range
        run: git diff --check origin/main...HEAD

      - name: Install dependencies
        run: npm ci

      - name: TypeScript validation
        run: npm run typecheck

      - name: Focused correction tests
        run: |
          npx vitest run --config vitest.unit.config.mjs \
            services/database/workout-session-resume.test.ts \
            lib/workouts/workout-session-history.test.ts \
            lib/activity-catalog/validation.test.ts \
            services/activity-catalog/server/activity-catalog-boundaries.test.ts \
            services/activity-catalog/server/activity-catalog-routes.test.ts \
            lib/i18n/train-workout-library.test.ts \
            lib/product/train-phase1-approved-ui.test.ts

      - name: Repository script tests
        run: npm run test:scripts

      - name: Verify exact correction commit is clean
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$CORRECTION_SHA"
          test -z "$(git status --short)"
          git diff --check origin/main...HEAD

      - name: Push validated code correction commit
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
