name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        if: github.event.pull_request.number == 59 && hashFiles('scripts/pr59-direct-corrections.mjs') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply direct PR59 corrections once
        if: github.event.pull_request.number == 59 && hashFiles('scripts/pr59-direct-corrections.mjs') != ''
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pr59-direct-corrections.mjs
          rm -f scripts/pr59-direct-corrections.mjs scripts/pr59-trigger.txt PR59_DIRECT_ERROR.txt PR59_PAYLOAD_ERROR.txt
          git config user.name "Plaivra PR59 Correction"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(train): apply PR59 required corrections"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Check working tree diff formatting
        run: git diff --check

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD
