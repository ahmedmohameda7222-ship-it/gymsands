name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD

  validate-aw3a-integration-authority:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    env:
      PLAIVRA_LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Correct permanent verification contracts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          integration = Path('supabase/verification/active-workout-aw3a-integration.sql')
          source = integration.read_text(encoding='utf-8')
          old = '''insert into public.workout_sessions(
            id,user_id,workout_name,started_at,status,source
          ) values (
            'a3000000-0000-4000-8000-000000000010',
            'a3000000-0000-4000-8000-000000000001',
            'AW-3A Verification',
            '2026-07-22T10:00:00Z',
            'started',
            'manual'
          );
          '''
          new = '''set local role authenticated;
          select pg_catalog.set_config('request.jwt.claim.sub','a3000000-0000-4000-8000-000000000001',true);
          select pg_catalog.set_config('request.jwt.claim.role','authenticated',true);
          select (public.start_or_resume_direct_workout_session_atomic(
            'a3000000-0000-4000-8000-000000000001'::uuid,
            'provider_activity',
            'aw3a-verification',
            'plaivra-verification',
            'AW-3A Verification',
            'Workout',
            '{"sets":3}'::jsonb,
            null
          )->'session'->>'id') as aw3a_session_id \\gset
          select pg_catalog.set_config('plaivra.aw3a_session_id', :'aw3a_session_id', true);
          reset role;
          '''
          if source.count(old) != 1:
              raise SystemExit(f'Expected one legacy AW-3A integration session fixture, found {source.count(old)}')
          source = source.replace(old, new)
          literal = "'a3000000-0000-4000-8000-000000000010'"
          session_expr = "pg_catalog.current_setting('plaivra.aw3a_session_id')::uuid"
          if source.count(literal) < 10:
              raise SystemExit('AW-3A integration session identity coverage is incomplete.')
          source = source.replace(literal, session_expr)

          invalid_prefix = f'''-- Representative invalid cases must roll back atomically.
          do $invalid_cases$
          declare
            v_before bigint;
          begin
            select count(*) into v_before from public.exercise_logs where workout_session_id={session_expr};
          '''
          invalid_prefix_replacement = f'''-- Representative invalid cases must roll back atomically.
          reset role;
          select pg_catalog.set_config(
            'plaivra.aw3a_invalid_log_count',
            (select count(*) from public.exercise_logs where workout_session_id={session_expr})::text,
            true
          );
          set local role service_role;
          select set_config('request.jwt.claim.role','service_role',true);
          do $invalid_cases$
          begin
          '''
          if source.count(invalid_prefix) != 1:
              raise SystemExit('AW-3A invalid-case pre-count contract was not found exactly once.')
          source = source.replace(invalid_prefix, invalid_prefix_replacement)

          invalid_suffix = f'''  if (select count(*) from public.exercise_logs where workout_session_id={session_expr})<>v_before then
              raise exception 'An invalid structured payload partially mutated exercise logs.';
            end if;
          end
          $invalid_cases$;
          
          reset role;
          '''
          invalid_suffix_replacement = f'''end
          $invalid_cases$;
          
          reset role;
          do $verify_invalid_atomicity$
          begin
            if (select count(*) from public.exercise_logs where workout_session_id={session_expr})
               <> pg_catalog.current_setting('plaivra.aw3a_invalid_log_count')::bigint then
              raise exception 'An invalid structured payload partially mutated exercise logs.';
            end if;
          end
          $verify_invalid_atomicity$;
          '''
          if source.count(invalid_suffix) != 1:
              raise SystemExit('AW-3A invalid-case post-count contract was not found exactly once.')
          source = source.replace(invalid_suffix, invalid_suffix_replacement)
          integration.write_text(source, encoding='utf-8')

          completion = Path('supabase/verification/active-workout-aw3a-final-completion.sql')
          source = completion.read_text(encoding='utf-8')
          old = '''insert into public.workout_sessions(id,user_id,workout_name,started_at,status,source)
          values (
            'a3f00000-0000-4000-8000-000000000010',
            'a3f00000-0000-4000-8000-000000000001',
            'AW-3A Final Completion',
            '2026-07-22T12:00:00Z',
            'started',
            'manual'
          );
          '''
          new = '''set local role authenticated;
          select pg_catalog.set_config('request.jwt.claim.sub','a3f00000-0000-4000-8000-000000000001',true);
          select pg_catalog.set_config('request.jwt.claim.role','authenticated',true);
          select (public.start_or_resume_direct_workout_session_atomic(
            'a3f00000-0000-4000-8000-000000000001'::uuid,
            'provider_activity',
            'aw3a-final-completion',
            'plaivra-verification',
            'AW-3A Final Completion',
            'Workout',
            '{"sets":3}'::jsonb,
            null
          )->'session'->>'id') as aw3a_final_session_id \\gset
          select pg_catalog.set_config('plaivra.aw3a_final_session_id', :'aw3a_final_session_id', true);
          reset role;
          '''
          if source.count(old) != 1:
              raise SystemExit(f'Expected one legacy AW-3A completion session fixture, found {source.count(old)}')
          source = source.replace(old, new)
          literal = "'a3f00000-0000-4000-8000-000000000010'"
          session_expr = "pg_catalog.current_setting('plaivra.aw3a_final_session_id')::uuid"
          if source.count(literal) < 10:
              raise SystemExit('AW-3A completion session identity coverage is incomplete.')
          source = source.replace(literal, session_expr)
          temp_table = f'''create temporary table aw3a_final_omitted on commit drop as
          select id as exercise_log_id
          from public.exercise_logs
          where workout_session_id={session_expr}
            and exercise_order=3 and set_number=1;
          '''
          temp_table_replacement = f'''reset role;
          create temporary table aw3a_final_omitted on commit drop as
          select id as exercise_log_id
          from public.exercise_logs
          where workout_session_id={session_expr}
            and exercise_order=3 and set_number=1;
          set local role service_role;
          select set_config('request.jwt.claim.role','service_role',true);
          '''
          if source.count(temp_table) != 1:
              raise SystemExit('AW-3A completion omitted-log fixture was not found exactly once.')
          source = source.replace(temp_table, temp_table_replacement)
          completion.write_text(source, encoding='utf-8')

          structured = Path('supabase/verification/active-workout-aw3b-structured-set-details.sql')
          source = structured.read_text(encoding='utf-8')
          bounds_start = "  if v_function_definition !~* 'pg_column_size\\s*\\(v_logs\\)\\s*>\\s*16777216'"
          bounds_end = "  if has_function_privilege('anon','public.upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')"
          start = source.index(bounds_start)
          end = source.index(bounds_end, start)
          bounds = '''  if v_function_definition !~* 'jsonb_array_length\\s*\\(v_logs\\)\\s*>\\s*500'
             or v_function_definition !~* 'pg_column_size\\s*\\(v_logs\\)\\s*>\\s*16777216'
             or v_function_definition !~* 'v_existing_count\\s*>\\s*500'
             or v_function_definition !~* 'v_final_count\\s*>\\s*500'
             or v_function_definition not like '%private.aw3b_structured_upsert_workout_set_logs_atomic%'
             or v_function_definition not like '%private.aw3b_timeline_structured_summary%'
             or v_function_definition not like '%private.aw3b_graph_revision%'
             or v_function_definition not like '%plaivra.aw3b_defer_set_timeline%'
             or v_function_definition !~* 'for\\s+update'
             or v_function_definition like '%private.aw3b_canonicalize_actor_set_payload%'
             or to_regprocedure('private.aw3b_canonicalize_actor_set_payload(jsonb,text)') is not null then
            raise exception 'AW-3B public set RPC payload/session bounds or post-apply authority are incomplete.';
          end if;
          '''
          source = source[:start] + bounds + source[end:]

          privilege_start = bounds_end
          privilege_end = "  if exists (\n    select 1 from information_schema.role_routine_grants"
          start = source.index(privilege_start)
          end = source.index(privilege_end, start)
          privileges = '''  if has_function_privilege('anon','public.upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or not has_function_privilege('authenticated','public.upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or not has_function_privilege('service_role','public.upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or has_function_privilege('anon','private.aw3b_structured_upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or has_function_privilege('authenticated','private.aw3b_structured_upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or has_function_privilege('service_role','private.aw3b_structured_upsert_workout_set_logs_atomic(uuid,uuid,jsonb)','EXECUTE')
             or has_function_privilege('anon','private.aw3b_timeline_structured_summary(uuid)','EXECUTE')
             or has_function_privilege('authenticated','private.aw3b_timeline_structured_summary(uuid)','EXECUTE')
             or has_function_privilege('service_role','private.aw3b_timeline_structured_summary(uuid)','EXECUTE')
             or has_function_privilege('anon','private.aw3b_graph_revision(uuid)','EXECUTE')
             or has_function_privilege('authenticated','private.aw3b_graph_revision(uuid)','EXECUTE')
             or has_function_privilege('service_role','private.aw3b_graph_revision(uuid)','EXECUTE') then
            raise exception 'AW-3B effective function privileges are invalid.';
          end if;
          '''
          source = source[:start] + privileges + source[end:]

          anchor = '''  if not exists (
            select 1 from supabase_migrations.schema_migrations
            where name='active_workout_aw3b_final_logic_hardening'
              and version in ('20260724013000','20260724002022')
          ) then raise exception 'AW-3B final logic hardening migration is missing.'; end if;
          '''
          addition = anchor + '''  if not exists (
            select 1 from supabase_migrations.schema_migrations
            where name='active_workout_aw3b_post_apply_logic_corrections'
          ) then raise exception 'AW-3B post-apply logic correction migration is missing.'; end if;
          '''
          if source.count(anchor) != 1:
              raise SystemExit('AW-3B migration-history verification anchor was not found exactly once.')
          source = source.replace(anchor, addition)
          structured.write_text(source, encoding='utf-8')
          PY
          git diff --check

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Replay full chronological migration chain
        run: node scripts/replay-local-migration-chain.mjs --log /tmp/aw3a-authority-replay.log --prove-future-order

      - name: Run database lint
        run: supabase db lint --local --schema public --level error --fail-on error

      - name: Run permanent database verification chain
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            set -euo pipefail
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-execution-state.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-structured-metrics.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-final-completion.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3b-structured-set-details.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3b-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql
            PLAIVRA_PREFLIGHT_TEST_DATABASE_URL="$PLAIVRA_LOCAL_DATABASE_URL" node scripts/test-database-preflight-control.mjs
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/production-release-migration-preflight.sql
          } 2>&1 | tee /tmp/aw3a-authority-verification.log

      - name: Create exact corrected verification blobs
        if: steps.verify.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/aw3a-integration-blobs.txt
          for path in \
            supabase/verification/active-workout-aw3a-integration.sql \
            supabase/verification/active-workout-aw3a-final-completion.sql \
            supabase/verification/active-workout-aw3b-structured-set-details.sql; do
            encoded="$(base64 -w0 "$path")"
            sha="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/blobs" -f content="$encoded" -f encoding=base64 --jq .sha)"
            printf '%s=%s\n' "$path" "$sha" | tee -a /tmp/aw3a-integration-blobs.txt
          done

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw3a-integration-authority-${{ github.event.pull_request.head.sha }}
          path: |
            supabase/verification/active-workout-aw3a-integration.sql
            supabase/verification/active-workout-aw3a-final-completion.sql
            supabase/verification/active-workout-aw3b-structured-set-details.sql
            /tmp/aw3a-integration-blobs.txt
            /tmp/aw3a-authority-replay.log
            /tmp/aw3a-authority-verification.log
          if-no-files-found: warn
          retention-days: 1

      - name: Require successful verification
        if: always()
        shell: bash
        run: test "${{ steps.verify.outcome }}" = "success"
