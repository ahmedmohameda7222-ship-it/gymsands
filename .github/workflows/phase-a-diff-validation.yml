name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Retain final deterministic patch exception
        shell: bash
        run: |
          set -euo pipefail
          set +e
          node scripts/pr59-final-corrections.mjs > "$RUNNER_TEMP/pr59-final.log" 2>&1
          code="$?"
          set -e
          if [ "$code" = "0" ]; then
            exit 1
          fi
          git restore .
          cp "$RUNNER_TEMP/pr59-final.log" PR59_FINAL_ERROR.txt
          git config user.name "Plaivra PR59 Diagnostic"
          git config user.email "actions@users.noreply.github.com"
          git add PR59_FINAL_ERROR.txt
          git commit -m "chore(pr59): retain final patch diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Check working tree diff formatting
        run: git diff --check

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD
