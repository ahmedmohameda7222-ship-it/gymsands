name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply deterministic PR59 corrections
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pr59-final-corrections.mjs
          node scripts/pr59-safety-followup.mjs
          git diff --check

      - name: Install dependencies
        run: npm ci

      - name: Retain focused validation failure
        shell: bash
        run: |
          set -uo pipefail
          set +e
          {
            npm run typecheck
            typecheck_code="$?"
            npx vitest run --config vitest.unit.config.mjs \
              services/database/workout-session-resume.test.ts \
              lib/workouts/workout-session-history.test.ts \
              lib/activity-catalog/validation.test.ts \
              services/activity-catalog/server/activity-catalog-boundaries.test.ts \
              services/activity-catalog/server/activity-catalog-routes.test.ts \
              lib/i18n/train-workout-library.test.ts \
              lib/product/train-phase1-approved-ui.test.ts
            tests_code="$?"
            npm run test:scripts
            scripts_code="$?"
            git diff --check
            diff_code="$?"
            printf '\nexit-codes: typecheck=%s focused-tests=%s script-tests=%s diff=%s\n' "$typecheck_code" "$tests_code" "$scripts_code" "$diff_code"
            if [ "$typecheck_code" = "0" ] && [ "$tests_code" = "0" ] && [ "$scripts_code" = "0" ] && [ "$diff_code" = "0" ]; then
              exit 0
            fi
            exit 1
          } > "$RUNNER_TEMP/pr59-validation.log" 2>&1
          code="$?"
          set -e
          if [ "$code" = "0" ]; then
            exit 1
          fi
          git restore .
          cp "$RUNNER_TEMP/pr59-validation.log" scripts/pr59-trigger.txt
          git config user.name "Plaivra PR59 Diagnostic"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/pr59-trigger.txt
          git commit -m "chore(pr59): retain focused validation diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1

      - name: Commit validated corrections
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Plaivra PR59 Correction"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(train): apply PR59 required corrections"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
