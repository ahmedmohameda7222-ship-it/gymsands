name: Phase A Diff Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - run: git diff --check origin/main...HEAD

  validate-aw3b-verification-contracts:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      PLAIVRA_LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Restore validated transformations and isolate session-limit read
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/previous
          gh run download 30078686596 \
            --repo "$GITHUB_REPOSITORY" \
            --name aw3b-verification-2203f6bd5adce680002800106963376540e67061 \
            --dir /tmp/previous
          source_root=/tmp/previous/home/runner/work/gymsands/gymsands/supabase/verification
          for name in \
            active-workout-aw3a-integration.sql \
            active-workout-aw3a-final-completion.sql \
            active-workout-aw3b-structured-set-details.sql \
            active-workout-aw3b-integration.sql; do
            cp "$source_root/$name" "supabase/verification/$name"
          done
          python - <<'PY'
          from pathlib import Path
          path = Path('supabase/verification/active-workout-aw3b-integration.sql')
          source = path.read_text(encoding='utf-8')
          old = '''do $session_log_limit$
          begin
            begin
              perform public.upsert_workout_set_logs_atomic(
                'b3000000-0000-4000-8000-000000000002',
                current_setting('plaivra.aw3b_session_limit_id')::uuid,
                jsonb_build_array(jsonb_build_object(
                  'exercise_order',1,
                  'exercise_name','AW-3B Session Limit',
                  'set_number',501,
                  'reps',1,
                  'completed_at','2026-07-22T20:03:01Z'
                ))
              );
              raise exception 'Repeated requests exceeded the AW-3B 500-log session limit.';
            exception when invalid_parameter_value then null; end;
            if (select count(*) from public.exercise_logs
                where workout_session_id=current_setting('plaivra.aw3b_session_limit_id')::uuid)<>500 then
              raise exception 'AW-3B session-limit rejection was not atomic.';
            end if;
          end
          $session_log_limit$;

          set local role authenticated;
          '''
          new = '''do $session_log_limit$
          begin
            begin
              perform public.upsert_workout_set_logs_atomic(
                'b3000000-0000-4000-8000-000000000002',
                current_setting('plaivra.aw3b_session_limit_id')::uuid,
                jsonb_build_array(jsonb_build_object(
                  'exercise_order',1,
                  'exercise_name','AW-3B Session Limit',
                  'set_number',501,
                  'reps',1,
                  'completed_at','2026-07-22T20:03:01Z'
                ))
              );
              raise exception 'Repeated requests exceeded the AW-3B 500-log session limit.';
            exception when invalid_parameter_value then null; end;
          end
          $session_log_limit$;

          reset role;
          do $verify_session_log_limit$
          begin
            if (select count(*) from public.exercise_logs
                where workout_session_id=current_setting('plaivra.aw3b_session_limit_id')::uuid)<>500 then
              raise exception 'AW-3B session-limit rejection was not atomic.';
            end if;
          end
          $verify_session_log_limit$;

          set local role authenticated;
          '''
          if source.count(old) != 1:
              raise SystemExit(f'Expected one session-limit read contract, found {source.count(old)}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY
          git diff --check -- supabase/verification

      - uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Replay full migration chain
        run: node scripts/replay-local-migration-chain.mjs --log /tmp/replay.log --prove-future-order

      - name: Lint database
        run: supabase db lint --local --schema public --level error --fail-on error

      - name: Verify permanent database chain
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          { set -euo pipefail
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-execution-state.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw2a-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-structured-metrics.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3a-final-completion.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3b-structured-set-details.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/active-workout-aw3b-integration.sql
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql
            PLAIVRA_PREFLIGHT_TEST_DATABASE_URL="$PLAIVRA_LOCAL_DATABASE_URL" node scripts/test-database-preflight-control.mjs
            PGPASSWORD=postgres psql "$PLAIVRA_LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -f supabase/verification/production-release-migration-preflight.sql
          } 2>&1 | tee /tmp/verify.log

      - name: Create exact corrected blobs
        if: steps.verify.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/blobs.txt
          for path in \
            supabase/verification/active-workout-aw3a-integration.sql \
            supabase/verification/active-workout-aw3a-final-completion.sql \
            supabase/verification/active-workout-aw3b-structured-set-details.sql \
            supabase/verification/active-workout-aw3b-integration.sql; do
            sha="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/blobs" -f content="$(base64 -w0 "$path")" -f encoding=base64 --jq .sha)"
            printf '%s=%s\n' "$path" "$sha" | tee -a /tmp/blobs.txt
          done

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aw3b-final-verification-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/blobs.txt
            /tmp/replay.log
            /tmp/verify.log
            supabase/verification/active-workout-aw3a-integration.sql
            supabase/verification/active-workout-aw3a-final-completion.sql
            supabase/verification/active-workout-aw3b-structured-set-details.sql
            supabase/verification/active-workout-aw3b-integration.sql
          if-no-files-found: warn
          retention-days: 1

      - if: always()
        run: test "${{ steps.verify.outcome }}" = success
