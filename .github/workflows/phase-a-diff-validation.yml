name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr59-correction-tree-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-diff:
    if: github.event.pull_request.number == 59
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"
      REPORT_DIR: ${{ runner.temp }}/pr59-correction-reports
      CORRECTION_PARENT_SHA: 1bb7206d5cee7fe3d7ed49fdd7daa09a145f45c2

    steps:
      - name: Checkout clean correction parent
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CORRECTION_PARENT_SHA }}
          fetch-depth: 0
          show-progress: false

      - name: Verify correction parent identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$CORRECTION_PARENT_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply and commit focused corrections
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$REPORT_DIR"
          node -e 'const fs=require("node:fs"),zlib=require("node:zlib");const input=fs.readFileSync("scripts/pr59-corrections.mjs.gz.b64","utf8").replace(/\s+/g,"");fs.writeFileSync(process.env.RUNNER_TEMP+"/apply-pr59-corrections.mjs",zlib.gunzipSync(Buffer.from(input,"base64")));'
          node "$RUNNER_TEMP/apply-pr59-corrections.mjs"
          rm -f scripts/pr59-corrections.mjs.gz.b64
          git diff --check
          git config user.name "Plaivra Correction Validator"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(train): apply PR59 required corrections"
          git diff --check origin/main...HEAD
          candidate_sha="$(git rev-parse HEAD)"
          echo "CANDIDATE_SHA=$candidate_sha" >> "$GITHUB_ENV"
          printf '%s\n' "$candidate_sha" > "$REPORT_DIR/candidate-sha.txt"
          git status --short > "$REPORT_DIR/git-status-before-validation.txt"
          test ! -s "$REPORT_DIR/git-status-before-validation.txt"
          git diff-tree --no-commit-id --name-status -r HEAD^ HEAD > "$REPORT_DIR/correction-files.tsv"
          awk -F '\t' '$1 != "D" { print $2 }' "$REPORT_DIR/correction-files.tsv" > "$REPORT_DIR/correction-files-present.txt"
          tar -czf "$REPORT_DIR/corrected-files.tar.gz" -T "$REPORT_DIR/correction-files-present.txt"
          git show --format=fuller --stat HEAD > "$REPORT_DIR/candidate-commit.txt"

      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee "$REPORT_DIR/npm-ci.log"
          code="${PIPESTATUS[0]}"
          set -e
          printf '%s\n' "$code" > "$REPORT_DIR/npm-ci.exit"
          test "$code" = "0"

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium 2>&1 | tee "$REPORT_DIR/playwright-install.log"

      - name: Run complete correction validation
        shell: bash
        run: |
          set -uo pipefail
          failed=0

          run_check() {
            local name="$1"
            shift
            set +e
            "$@" 2>&1 | tee "$REPORT_DIR/${name}.log"
            local code="${PIPESTATUS[0]}"
            set -e
            printf '%s\n' "$code" > "$REPORT_DIR/${name}.exit"
            printf '%s\t%s\n' "$name" "$code" >> "$REPORT_DIR/command-results.tsv"
            if [ "$code" != "0" ]; then failed=1; fi
          }

          run_shell() {
            local name="$1"
            local command="$2"
            run_check "$name" bash -lc "$command"
          }

          run_qa() {
            local name="$1"
            local command="$2"
            set +e
            NEXT_PUBLIC_USE_MOCK_AUTH=true npm run dev > "$REPORT_DIR/${name}-server.log" 2>&1 &
            local server_pid=$!
            local ready=1
            for attempt in $(seq 1 90); do
              if curl --fail --silent http://localhost:3000/ > /dev/null; then
                ready=0
                break
              fi
              sleep 1
            done
            local code=0
            if [ "$ready" != "0" ]; then
              echo "Development server did not become ready." | tee "$REPORT_DIR/${name}.log"
              code=1
            else
              QA_BASE_URL=http://localhost:3000 bash -lc "$command" 2>&1 | tee "$REPORT_DIR/${name}.log"
              code="${PIPESTATUS[0]}"
            fi
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
            set -e
            printf '%s\n' "$code" > "$REPORT_DIR/${name}.exit"
            printf '%s\t%s\n' "$name" "$code" >> "$REPORT_DIR/command-results.tsv"
            if [ "$code" != "0" ]; then failed=1; fi
          }

          : > "$REPORT_DIR/command-results.tsv"
          run_check git-diff-check git diff --check
          run_check git-diff-range-check git diff --check origin/main...HEAD
          run_check lint npm run lint
          run_check typecheck npm run typecheck
          run_check focused-tests npx vitest run --config vitest.unit.config.mjs services/database/workout-session-resume.test.ts lib/workouts/workout-session-history.test.ts lib/activity-catalog/validation.test.ts services/activity-catalog/server/activity-catalog-boundaries.test.ts services/activity-catalog/server/activity-catalog-routes.test.ts lib/i18n/train-workout-library.test.ts lib/product/train-phase1-approved-ui.test.ts
          run_check unit npm run test:unit
          run_check integration npm run test:integration
          run_check script-tests npm run test:scripts
          run_check migration-ledger npm run migration:ledger:check
          run_shell environment-validation 'export PLAIVRA_VALIDATE_PRODUCTION_ENV=true PLAIVRA_RELEASE_ENVIRONMENT=production NEXT_PUBLIC_APP_URL=https://app.plaivra.com NEXT_PUBLIC_USE_MOCK_AUTH=false PLAIVRA_MCP_BASE_URL=https://app.plaivra.com/api/mcp PLAIVRA_OAUTH_ISSUER=https://app.plaivra.com PLAIVRA_CIMD_ALLOWED_ORIGINS=https://chatgpt.com CRON_SECRET=ci-placeholder-cron-secret-that-is-long-enough; npm run validate:env'
          run_shell production-build 'NEXT_PUBLIC_USE_MOCK_AUTH=false npm run build'
          run_qa rendered-qa 'QA_EVIDENCE_DIR="$REPORT_DIR/rendered-qa-evidence" npm run qa:rendered'
          run_qa train-qa 'QA_TRAIN_EVIDENCE_DIR="$REPORT_DIR/train-qa-evidence" npm run qa:train'

          git status --short > "$REPORT_DIR/git-status-after-validation.txt"
          printf '%s\n' "$failed" > "$REPORT_DIR/overall.exit"
          exit 0

      - name: Upload retained correction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr59-correction-validation-${{ github.run_id }}
          path: ${{ runner.temp }}/pr59-correction-reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce correction validation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f "$REPORT_DIR/overall.exit"
          test "$(cat "$REPORT_DIR/overall.exit")" = "0"
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          test ! -s "$REPORT_DIR/git-status-after-validation.txt"
