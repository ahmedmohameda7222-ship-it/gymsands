name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD

  finalize-aw3b:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Reconstruct exact clean AW-3B commit
        run: python scripts/aw3b-phase-a-finalize.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate AW-3B targeted tests
        if: always()
        run: npm run test:active-workout:aw3b

      - name: Validate i18n tests
        if: always()
        run: npm run test:i18n

      - name: Validate script tests
        if: always()
        run: npm run test:scripts

      - name: Validate migration ledger
        if: always()
        run: npm run migration:ledger:check

      - name: Validate TypeScript
        if: always()
        run: npm run typecheck

      - name: Validate ESLint
        if: always()
        run: npm run lint

      - name: Validate diff formatting
        if: always()
        run: git diff --check

      - name: Validate clean reconstructed worktree
        if: always()
        run: test -z "$(git status --porcelain)"

      - name: Push validated clean AW-3B commit
        run: git push origin HEAD:feat/active-workout-aw3b-structured-set-details
