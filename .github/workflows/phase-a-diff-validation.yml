name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply builder review state marker
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pr59-review-marker-followup.mjs
          git diff --check
          git config user.name "Plaivra PR59 Follow-up"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(train): mark builder review state explicitly"
          test -z "$(git diff --name-only HEAD^ HEAD -- .github/workflows)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
