name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD

  validate-aw3b-migration-replay-fix:
    if: github.event.pull_request.head.ref == 'feat/active-workout-aw3b-structured-set-details'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply deterministic graph revision correction
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object .aw3b-migration-replay-fix.patch)" = "8482d991a865548d69ae8e669a380f669ad69f44"
          git apply --check .aw3b-migration-replay-fix.patch
          git apply .aw3b-migration-replay-fix.patch
          git diff --check
          test "$(git hash-object supabase/migrations/20260724023000_active_workout_aw3b_post_apply_logic_corrections.sql)" = "84bfb4a22197f56300245f693f41f91a136814dd"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Replay full chronological migration chain
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p quality-reports
          node scripts/replay-local-migration-chain.mjs --log /tmp/aw3b-migration-replay.log --prove-future-order

      - name: Create exact corrected migration blob
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          encoded="$(base64 -w0 supabase/migrations/20260724023000_active_workout_aw3b_post_apply_logic_corrections.sql)"
          sha="$(gh api --method POST "repos/$GITHUB_REPOSITORY/git/blobs" -f content="$encoded" -f encoding=base64 --jq .sha)"
          test "$sha" = "84bfb4a22197f56300245f693f41f91a136814dd"
          printf '%s\n' "$sha" > /tmp/aw3b-migration-blob.txt

      - name: Upload migration replay evidence
        uses: actions/upload-artifact@v4
        with:
          name: aw3b-migration-replay-fix-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/aw3b-migration-replay.log
            /tmp/aw3b-migration-blob.txt
          if-no-files-found: error
          retention-days: 1
