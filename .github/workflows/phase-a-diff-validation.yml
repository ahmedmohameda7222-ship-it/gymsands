name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply deterministic PR59 corrections
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pr59-final-corrections.mjs
          node scripts/pr59-safety-followup.mjs
          git diff --check

      - name: Install dependencies
        run: npm ci

      - name: TypeScript validation
        run: npm run typecheck

      - name: Direct session resume tests
        run: npx vitest run --config vitest.unit.config.mjs services/database/workout-session-resume.test.ts

      - name: Previous set identity tests
        run: npx vitest run --config vitest.unit.config.mjs lib/workouts/workout-session-history.test.ts

      - name: Activity Catalog validation tests
        run: npx vitest run --config vitest.unit.config.mjs lib/activity-catalog/validation.test.ts

      - name: Activity Catalog boundary tests
        run: npx vitest run --config vitest.unit.config.mjs services/activity-catalog/server/activity-catalog-boundaries.test.ts

      - name: Activity Catalog route tests
        run: npx vitest run --config vitest.unit.config.mjs services/activity-catalog/server/activity-catalog-routes.test.ts

      - name: Train localization tests
        run: npx vitest run --config vitest.unit.config.mjs lib/i18n/train-workout-library.test.ts

      - name: Train Phase 1 UI tests
        run: npx vitest run --config vitest.unit.config.mjs lib/product/train-phase1-approved-ui.test.ts

      - name: Repository script tests
        run: npm run test:scripts

      - name: Corrected diff formatting
        run: git diff --check

      - name: Commit validated corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Plaivra PR59 Correction"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(train): apply PR59 required corrections"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
