name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Diagnose direct PR59 correction script
        if: github.event.pull_request.number == 59 && hashFiles('scripts/pr59-direct-corrections.mjs') != ''
        shell: bash
        run: |
          set -euo pipefail
          set +e
          node scripts/pr59-direct-corrections.mjs > PR59_DIRECT_ERROR.txt 2>&1
          code="$?"
          set -e
          if [ "$code" != "0" ]; then
            git restore . ':!PR59_DIRECT_ERROR.txt'
            git config user.name "Plaivra PR59 Diagnostic"
            git config user.email "actions@users.noreply.github.com"
            git add PR59_DIRECT_ERROR.txt
            git commit -m "chore(pr59): retain direct correction diagnostic"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$code"
          fi
          rm -f PR59_DIRECT_ERROR.txt scripts/pr59-direct-corrections.mjs scripts/pr59-trigger.txt
          git config user.name "Plaivra PR59 Correction"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(train): apply PR59 required corrections"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Check working tree diff formatting
        run: git diff --check

      - name: Check branch diff formatting against main
        run: git diff --check origin/main...HEAD
