name: Phase A Diff Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: phase-a-diff-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply deterministic PR59 corrections
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pr59-final-corrections.mjs
          node scripts/pr59-safety-followup.mjs
          node scripts/pr59-test-followup.mjs
          git diff --check

      - name: Install dependencies
        run: npm ci

      - name: Identify first failing repository script test
        shell: bash
        run: |
          set -uo pipefail
          failed=""
          for test_file in scripts/*.test.mjs; do
            echo "Running $test_file"
            if ! node --test "$test_file"; then
              failed="$test_file"
              break
            fi
          done
          if [ -z "$failed" ]; then
            echo "All repository script tests passed unexpectedly during isolation."
            exit 1
          fi
          git restore .
          printf 'First failing repository script test: %s\n' "$failed" > scripts/pr59-trigger.txt
          git config user.name "Plaivra PR59 Diagnostic"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/pr59-trigger.txt
          git commit -m "chore(pr59): record failing repository script test"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1
