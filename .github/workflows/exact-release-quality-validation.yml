name: Exact Release Quality Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/quality.yml
      - .github/workflows/release-preflight.yml
      - .github/workflows/exact-release-quality-validation.yml
      - release/release-manifest.template.json
      - scripts/create-release-manifest.mjs
      - scripts/quality-evidence-contract.mjs
      - scripts/release-preflight.mjs
      - scripts/run-quality-gate.mjs
      - scripts/promote-release-schema-compatibility.mjs
      - scripts/permanent-quality-replay.test.mjs
      - scripts/release-closure-stage1.test.mjs
      - scripts/run-quality-gate.test.mjs
      - scripts/promote-release-schema-compatibility.test.mjs
      - plaivra_aw2a_post_merge_release_closure_implementation_report.md

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: exact-release-quality-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      GH_TOKEN: ${{ github.token }}
      REVIEWED_COMMIT: ${{ github.event.pull_request.head.sha }}
      COMPARISON_BASE: ${{ github.event.pull_request.base.sha }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Validate exact orchestration identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "ahmedmohameda7222-ship-it/gymsands"
          [[ "$REVIEWED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$COMPARISON_BASE" =~ ^[0-9a-f]{40}$ ]]
          test -n "$HEAD_REF"

      - name: Dispatch exact-commit full Quality
        id: quality
        shell: bash
        run: |
          set -euo pipefail
          previous_run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow quality.yml \
              --branch "$HEAD_REF" \
              --event workflow_dispatch \
              --limit 100 \
              --json databaseId \
              --jq '[.[].databaseId] | max // 0'
          )"
          [[ "$previous_run_id" =~ ^[0-9]+$ ]]

          gh workflow run quality.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$HEAD_REF" \
            -f reviewed_commit="$REVIEWED_COMMIT" \
            -f comparison_base="$COMPARISON_BASE"

          quality_run_id=""
          for attempt in $(seq 1 90); do
            quality_run_id="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow quality.yml \
                --branch "$HEAD_REF" \
                --event workflow_dispatch \
                --limit 100 \
                --json databaseId,headSha \
                --jq '[.[] | select(.headSha == "'"$REVIEWED_COMMIT"'" and .databaseId > '"$previous_run_id"') | .databaseId] | max // empty'
            )"
            if [[ "$quality_run_id" =~ ^[0-9]+$ ]]; then break; fi
            sleep 2
          done
          [[ "$quality_run_id" =~ ^[0-9]+$ ]]
          echo "run_id=$quality_run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$quality_run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10

      - name: Verify canonical Quality artifact
        id: quality_artifact
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
        run: |
          set -euo pipefail
          artifact_json="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$QUALITY_RUN_ID/artifacts" \
              --jq '[.artifacts[] | select(.name == "quality-reports-'"$QUALITY_RUN_ID"'")] | if length == 1 then .[0] else empty end'
          )"
          test -n "$artifact_json"
          artifact_id="$(jq -r '.id' <<< "$artifact_json")"
          artifact_name="$(jq -r '.name' <<< "$artifact_json")"
          artifact_digest="$(jq -r '.digest // ""' <<< "$artifact_json")"
          [[ "$artifact_id" =~ ^[0-9]+$ ]]
          test "$artifact_name" = "quality-reports-$QUALITY_RUN_ID"
          [[ "$artifact_digest" == sha256:* ]]
          {
            echo "id=$artifact_id"
            echo "name=$artifact_name"
            echo "digest=$artifact_digest"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch exact-artifact Release preflight
        id: preflight
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
        run: |
          set -euo pipefail
          previous_run_id="$(
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow release-preflight.yml \
              --branch "$HEAD_REF" \
              --event workflow_dispatch \
              --limit 100 \
              --json databaseId \
              --jq '[.[].databaseId] | max // 0'
          )"
          [[ "$previous_run_id" =~ ^[0-9]+$ ]]

          gh workflow run release-preflight.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$HEAD_REF" \
            -f reviewed_commit="$REVIEWED_COMMIT" \
            -f quality_run_id="$QUALITY_RUN_ID" \
            -f validation_context=stage1-infrastructure-validation

          preflight_run_id=""
          for attempt in $(seq 1 90); do
            preflight_run_id="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow release-preflight.yml \
                --branch "$HEAD_REF" \
                --event workflow_dispatch \
                --limit 100 \
                --json databaseId,headSha \
                --jq '[.[] | select(.headSha == "'"$REVIEWED_COMMIT"'" and .databaseId > '"$previous_run_id"') | .databaseId] | max // empty'
            )"
            if [[ "$preflight_run_id" =~ ^[0-9]+$ ]]; then break; fi
            sleep 2
          done
          [[ "$preflight_run_id" =~ ^[0-9]+$ ]]
          echo "run_id=$preflight_run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$preflight_run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10

      - name: Record Stage-1 exact validation evidence
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          QUALITY_ARTIFACT_ID: ${{ steps.quality_artifact.outputs.id }}
          QUALITY_ARTIFACT_NAME: ${{ steps.quality_artifact.outputs.name }}
          QUALITY_ARTIFACT_DIGEST: ${{ steps.quality_artifact.outputs.digest }}
          PREFLIGHT_RUN_ID: ${{ steps.preflight.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p stage1-validation
          captured_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg reviewedCommit "$REVIEWED_COMMIT" \
            --arg comparisonBase "$COMPARISON_BASE" \
            --arg qualityRunId "$QUALITY_RUN_ID" \
            --arg qualityArtifactId "$QUALITY_ARTIFACT_ID" \
            --arg qualityArtifactName "$QUALITY_ARTIFACT_NAME" \
            --arg qualityArtifactDigest "$QUALITY_ARTIFACT_DIGEST" \
            --arg preflightRunId "$PREFLIGHT_RUN_ID" \
            --arg capturedAt "$captured_at" \
            '{
              schemaVersion: 1,
              repository: $repository,
              reviewedCommit: $reviewedCommit,
              comparisonBase: $comparisonBase,
              manualQuality: { runId: $qualityRunId, status: "success" },
              canonicalArtifact: {
                id: $qualityArtifactId,
                name: $qualityArtifactName,
                digest: $qualityArtifactDigest
              },
              releasePreflight: {
                runId: $preflightRunId,
                status: "success",
                context: "stage1-infrastructure-validation",
                productionAuthorization: false
              },
              productionWritePerformed: false,
              deploymentPerformed: false,
              capturedAt: $capturedAt
            }' > stage1-validation/exact-release-validation.json

          marker='<!-- plaivra-stage1-exact-release-validation -->'
          body="$(cat <<BODY
          $marker
          ## Stage-1 exact release-quality validation

          - Reviewed commit: \`$REVIEWED_COMMIT\`
          - Comparison base: \`$COMPARISON_BASE\`
          - Manual full Quality run: \`$QUALITY_RUN_ID\` — success
          - Canonical artifact: \`$QUALITY_ARTIFACT_NAME\`
          - Artifact ID: \`$QUALITY_ARTIFACT_ID\`
          - Artifact digest: \`$QUALITY_ARTIFACT_DIGEST\`
          - Release preflight run: \`$PREFLIGHT_RUN_ID\` — success
          - Context: Stage-1 infrastructure validation only
          - Production authorization: no
          - Production write: no
          - Deployment: no
          BODY
          )"
          comment_id="$(
            gh api "repos/$GITHUB_REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" --paginate \
              --jq '.[] | select(.body | contains("'"$marker"'")) | .id' | tail -n 1
          )"
          if [[ "$comment_id" =~ ^[0-9]+$ ]]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" -f body="$body" >/dev/null
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PULL_REQUEST_NUMBER/comments" -f body="$body" >/dev/null
          fi

      - name: Upload Stage-1 exact validation summary
        uses: actions/upload-artifact@v4
        with:
          name: stage1-exact-release-validation-${{ github.event.pull_request.head.sha }}
          path: stage1-validation/exact-release-validation.json
          if-no-files-found: error
          retention-days: 30
