name: Exact Release Quality Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/quality.yml
      - .github/workflows/release-preflight.yml
      - .github/workflows/exact-release-quality-validation.yml
      - release/release-manifest.template.json
      - scripts/create-release-manifest.mjs
      - scripts/quality-evidence-contract.mjs
      - scripts/quality-ledger-target.mjs
      - scripts/release-identity-contract.mjs
      - scripts/release-preflight.mjs
      - scripts/run-quality-gate.mjs
      - scripts/promote-release-schema-compatibility.mjs
      - scripts/permanent-quality-replay.test.mjs
      - scripts/release-closure-stage1.test.mjs
      - scripts/release-closure-final-qa.test.mjs
      - scripts/run-quality-gate.test.mjs
      - scripts/promote-release-schema-compatibility.test.mjs
      - plaivra_aw2a_post_merge_release_closure_implementation_report.md
      - plaivra_aw2b_command_authority_implementation_report.md

permissions:
  actions: write # dispatch and inspect exact workflow runs/artifacts
  contents: read # checkout exact PR head and ledger

concurrency:
  group: exact-release-quality-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
      REVIEWED_COMMIT: ${{ github.event.pull_request.head.sha }}
      COMPARISON_BASE: ${{ github.event.pull_request.base.sha }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Resolve immutable orchestration identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "ahmedmohameda7222-ship-it/gymsands"
          test "$(git rev-parse HEAD)" = "$REVIEWED_COMMIT"
          [[ "$REVIEWED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$COMPARISON_BASE" =~ ^[0-9a-f]{40}$ ]]
          quality_request_id="stage1-q-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REVIEWED_COMMIT}"
          preflight_request_id="stage1-p-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REVIEWED_COMMIT}"
          expected_migration="$(node scripts/quality-ledger-target.mjs --value expectedMigration)"
          pending_count="$(node scripts/quality-ledger-target.mjs --value pendingCount)"
          schema_applied_untracked_count="$(node scripts/quality-ledger-target.mjs --value schemaAppliedUntrackedCount)"
          unresolved_count="$(node scripts/quality-ledger-target.mjs --value unresolvedCount)"
          release_ready="$(node scripts/quality-ledger-target.mjs --value releaseReady)"
          [[ "$expected_migration" =~ ^[0-9]{12,14}$ ]]
          [[ "$pending_count" =~ ^[0-9]+$ ]]
          [[ "$schema_applied_untracked_count" =~ ^[0-9]+$ ]]
          [[ "$unresolved_count" =~ ^[0-9]+$ ]]
          [[ "$release_ready" == "true" || "$release_ready" == "false" ]]
          {
            echo "quality_request_id=$quality_request_id"
            echo "preflight_request_id=$preflight_request_id"
            echo "expected_migration=$expected_migration"
            echo "pending_count=$pending_count"
            echo "schema_applied_untracked_count=$schema_applied_untracked_count"
            echo "unresolved_count=$unresolved_count"
            echo "release_ready=$release_ready"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch request-bound exact-commit full Quality
        id: quality
        shell: bash
        env:
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
        run: |
          set -euo pipefail
          gh workflow run quality.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$HEAD_REF" \
            -f reviewed_commit="$REVIEWED_COMMIT" \
            -f comparison_base="$COMPARISON_BASE" \
            -f validation_request_id="$VALIDATION_REQUEST_ID"

          quality_run_id=""
          expected_title="Quality / $VALIDATION_REQUEST_ID"
          for attempt in $(seq 1 120); do
            quality_run_id="$(
              EXPECTED_TITLE="$expected_title" gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow quality.yml \
                --branch "$HEAD_REF" \
                --event workflow_dispatch \
                --limit 100 \
                --json databaseId,headSha,displayTitle \
                --jq '[.[] | select(.headSha == env.REVIEWED_COMMIT and .displayTitle == env.EXPECTED_TITLE) | .databaseId] | if length == 1 then .[0] else empty end'
            )"
            if [[ "$quality_run_id" =~ ^[0-9]+$ ]]; then break; fi
            sleep 2
          done
          [[ "$quality_run_id" =~ ^[0-9]+$ ]]
          echo "run_id=$quality_run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$quality_run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10

      - name: Download and independently verify canonical Quality evidence
        id: quality_artifact
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
          EXPECTED_MIGRATION: ${{ steps.identity.outputs.expected_migration }}
        run: |
          set -euo pipefail
          mkdir -p exact-quality
          gh run download "$QUALITY_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "quality-reports-$QUALITY_RUN_ID" --dir exact-quality
          node --input-type=module - <<'NODE'
          import { readFileSync } from "node:fs";
          const metadata = JSON.parse(readFileSync("exact-quality/artifact-metadata.json", "utf8"));
          const index = JSON.parse(readFileSync("exact-quality/evidence-index.json", "utf8"));
          const manifest = JSON.parse(readFileSync("exact-quality/release-manifest.json", "utf8"));
          const expected = {
            repository: process.env.GITHUB_REPOSITORY,
            reviewedCommit: process.env.REVIEWED_COMMIT,
            comparisonBase: process.env.COMPARISON_BASE,
            validationRequestId: process.env.VALIDATION_REQUEST_ID,
            workflowRunId: process.env.QUALITY_RUN_ID,
            expectedMigration: process.env.EXPECTED_MIGRATION,
          };
          for (const document of [metadata, index]) {
            if (document.repository !== expected.repository) throw new Error("Artifact repository mismatch.");
            if (document.reviewedCommit !== expected.reviewedCommit) throw new Error("Artifact commit mismatch.");
            if (document.comparisonBase !== expected.comparisonBase) throw new Error("Artifact comparison base mismatch.");
            if (document.validationRequestId !== expected.validationRequestId) throw new Error("Artifact validation request mismatch.");
            if (String(document.workflowRunId) !== expected.workflowRunId) throw new Error("Artifact workflow run mismatch.");
            if (document.expectedDatabaseMigrationVersion !== expected.expectedMigration) throw new Error("Artifact migration mismatch.");
          }
          if (manifest.release.commitSha !== expected.reviewedCommit) throw new Error("Manifest commit mismatch.");
          if (manifest.release.expectedDatabaseMigrationVersion !== expected.expectedMigration) throw new Error("Manifest migration mismatch.");
          if (manifest.qualityArtifact.comparisonBase !== expected.comparisonBase) throw new Error("Manifest comparison base mismatch.");
          if (manifest.qualityArtifact.validationRequestId !== expected.validationRequestId) throw new Error("Manifest validation request mismatch.");
          if (String(manifest.qualityArtifact.workflowRunId) !== expected.workflowRunId) throw new Error("Manifest run mismatch.");
          NODE
          artifact_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$QUALITY_RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name == "quality-reports-'"$QUALITY_RUN_ID"'")] | if length == 1 then .[0] else empty end')"
          test -n "$artifact_json"
          {
            echo "id=$(jq -r '.id' <<< "$artifact_json")"
            echo "name=$(jq -r '.name' <<< "$artifact_json")"
            echo "digest=$(jq -r '.digest' <<< "$artifact_json")"
          } >> "$GITHUB_OUTPUT"

      - name: Record exact pre-application validation evidence
        if: steps.identity.outputs.release_ready != 'true'
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          QUALITY_ARTIFACT_ID: ${{ steps.quality_artifact.outputs.id }}
          QUALITY_ARTIFACT_NAME: ${{ steps.quality_artifact.outputs.name }}
          QUALITY_ARTIFACT_DIGEST: ${{ steps.quality_artifact.outputs.digest }}
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
          EXPECTED_MIGRATION: ${{ steps.identity.outputs.expected_migration }}
          PENDING_COUNT: ${{ steps.identity.outputs.pending_count }}
          SCHEMA_APPLIED_UNTRACKED_COUNT: ${{ steps.identity.outputs.schema_applied_untracked_count }}
          UNRESOLVED_COUNT: ${{ steps.identity.outputs.unresolved_count }}
        run: |
          set -euo pipefail
          [[ "$PENDING_COUNT" =~ ^[1-9][0-9]*$ ]]
          test "$SCHEMA_APPLIED_UNTRACKED_COUNT" = "0"
          test "$UNRESOLVED_COUNT" = "$PENDING_COUNT"
          mkdir -p pre-application-validation
          artifact_name="pre-application-exact-release-validation-$REVIEWED_COMMIT"
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg reviewedCommit "$REVIEWED_COMMIT" \
            --arg comparisonBase "$COMPARISON_BASE" \
            --arg validationRequestId "$VALIDATION_REQUEST_ID" \
            --arg expectedMigration "$EXPECTED_MIGRATION" \
            --arg qualityRunId "$QUALITY_RUN_ID" \
            --arg qualityArtifactId "$QUALITY_ARTIFACT_ID" \
            --arg qualityArtifactName "$QUALITY_ARTIFACT_NAME" \
            --arg qualityArtifactDigest "$QUALITY_ARTIFACT_DIGEST" \
            --arg pendingCount "$PENDING_COUNT" \
            --arg schemaAppliedUntrackedCount "$SCHEMA_APPLIED_UNTRACKED_COUNT" \
            --arg unresolvedCount "$UNRESOLVED_COUNT" \
            --arg exactValidationRunId "$GITHUB_RUN_ID" \
            --arg exactValidationRunAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg artifactName "$artifact_name" \
            '{
              schemaVersion: 1,
              validationMode: "pre-application",
              repository: $repository,
              reviewedCommit: $reviewedCommit,
              comparisonBase: $comparisonBase,
              validationRequestId: $validationRequestId,
              expectedDatabaseMigrationVersion: $expectedMigration,
              ledger: {
                pendingCount: ($pendingCount | tonumber),
                schemaAppliedUntrackedCount: ($schemaAppliedUntrackedCount | tonumber),
                unresolvedCount: ($unresolvedCount | tonumber),
                releaseReady: false
              },
              manualQuality: { runId: $qualityRunId, status: "success" },
              canonicalArtifact: { id: $qualityArtifactId, name: $qualityArtifactName, digest: $qualityArtifactDigest },
              exactValidation: { runId: $exactValidationRunId, runAttempt: $exactValidationRunAttempt, status: "success", artifactName: $artifactName },
              releasePreflightDispatched: false,
              productionAuthorization: false,
              productionWritePerformed: false,
              deploymentPerformed: false
            }' > pre-application-validation/exact-release-validation.json
          jq -e '
            .validationMode == "pre-application"
            and .ledger.pendingCount > 0
            and .ledger.schemaAppliedUntrackedCount == 0
            and .ledger.unresolvedCount == .ledger.pendingCount
            and .ledger.releaseReady == false
            and .manualQuality.status == "success"
            and .canonicalArtifact.id != ""
            and (.canonicalArtifact.digest | startswith("sha256:"))
            and .releasePreflightDispatched == false
            and .productionAuthorization == false
            and .productionWritePerformed == false
            and .deploymentPerformed == false' \
            pre-application-validation/exact-release-validation.json > /dev/null

      - name: Upload pre-application exact validation summary
        if: steps.identity.outputs.release_ready != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pre-application-exact-release-validation-${{ github.event.pull_request.head.sha }}
          path: pre-application-validation/exact-release-validation.json
          if-no-files-found: error
          retention-days: 30

      - name: Dispatch request-bound Stage-1 Release preflight
        if: steps.identity.outputs.release_ready == 'true'
        id: preflight
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
          PREFLIGHT_REQUEST_ID: ${{ steps.identity.outputs.preflight_request_id }}
          EXPECTED_MIGRATION: ${{ steps.identity.outputs.expected_migration }}
        run: |
          set -euo pipefail
          gh workflow run release-preflight.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$HEAD_REF" \
            -f reviewed_commit="$REVIEWED_COMMIT" \
            -f comparison_base="$COMPARISON_BASE" \
            -f quality_run_id="$QUALITY_RUN_ID" \
            -f validation_request_id="$VALIDATION_REQUEST_ID" \
            -f preflight_request_id="$PREFLIGHT_REQUEST_ID" \
            -f expected_migration="$EXPECTED_MIGRATION" \
            -f validation_context=stage1-infrastructure-validation

          preflight_run_id=""
          expected_title="Release preflight / $PREFLIGHT_REQUEST_ID"
          for attempt in $(seq 1 120); do
            preflight_run_id="$(
              EXPECTED_TITLE="$expected_title" gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow release-preflight.yml \
                --branch "$HEAD_REF" \
                --event workflow_dispatch \
                --limit 100 \
                --json databaseId,headSha,displayTitle \
                --jq '[.[] | select(.headSha == env.REVIEWED_COMMIT and .displayTitle == env.EXPECTED_TITLE) | .databaseId] | if length == 1 then .[0] else empty end'
            )"
            if [[ "$preflight_run_id" =~ ^[0-9]+$ ]]; then break; fi
            sleep 2
          done
          [[ "$preflight_run_id" =~ ^[0-9]+$ ]]
          echo "run_id=$preflight_run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$preflight_run_id" --repo "$GITHUB_REPOSITORY" --exit-status --interval 10

      - name: Download and independently verify preflight evidence
        if: steps.identity.outputs.release_ready == 'true'
        id: preflight_artifact
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          PREFLIGHT_RUN_ID: ${{ steps.preflight.outputs.run_id }}
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
          PREFLIGHT_REQUEST_ID: ${{ steps.identity.outputs.preflight_request_id }}
          EXPECTED_MIGRATION: ${{ steps.identity.outputs.expected_migration }}
        run: |
          set -euo pipefail
          mkdir -p exact-preflight
          preflight_artifact_name="release-preflight-$PREFLIGHT_REQUEST_ID"
          gh run download "$PREFLIGHT_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "$preflight_artifact_name" --dir exact-preflight
          node --input-type=module - <<'NODE'
          import { readFileSync } from "node:fs";
          const evidence = JSON.parse(readFileSync("exact-preflight/release-preflight.json", "utf8"));
          const expected = {
            expectedCommit: process.env.REVIEWED_COMMIT,
            comparisonBase: process.env.COMPARISON_BASE,
            qualityRunId: process.env.QUALITY_RUN_ID,
            validationRequestId: process.env.VALIDATION_REQUEST_ID,
            preflightRequestId: process.env.PREFLIGHT_REQUEST_ID,
            expectedDatabaseMigrationVersion: process.env.EXPECTED_MIGRATION,
            validationContext: "stage1-infrastructure-validation",
          };
          for (const [key, value] of Object.entries(expected)) {
            if (String(evidence[key]) !== value) throw new Error(`Preflight ${key} mismatch.`);
          }
          if (evidence.ready !== true || evidence.qualityArtifactValid !== true) throw new Error("Preflight not ready.");
          if (evidence.productionPromotionAuthorized !== false) throw new Error("Stage-1 preflight authorized promotion.");
          if (evidence.productionMutationPerformed !== false || evidence.deploymentPerformed !== false) {
            throw new Error("Stage-1 preflight was not read-only.");
          }
          NODE
          artifact_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREFLIGHT_RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name == "'"$preflight_artifact_name"'")] | if length == 1 then .[0] else empty end')"
          test -n "$artifact_json"
          {
            echo "id=$(jq -r '.id' <<< "$artifact_json")"
            echo "name=$(jq -r '.name' <<< "$artifact_json")"
            echo "digest=$(jq -r '.digest' <<< "$artifact_json")"
          } >> "$GITHUB_OUTPUT"

      - name: Record exact Stage-1 validation evidence
        if: steps.identity.outputs.release_ready == 'true'
        shell: bash
        env:
          QUALITY_RUN_ID: ${{ steps.quality.outputs.run_id }}
          QUALITY_ARTIFACT_ID: ${{ steps.quality_artifact.outputs.id }}
          QUALITY_ARTIFACT_NAME: ${{ steps.quality_artifact.outputs.name }}
          QUALITY_ARTIFACT_DIGEST: ${{ steps.quality_artifact.outputs.digest }}
          PREFLIGHT_RUN_ID: ${{ steps.preflight.outputs.run_id }}
          PREFLIGHT_ARTIFACT_ID: ${{ steps.preflight_artifact.outputs.id }}
          PREFLIGHT_ARTIFACT_NAME: ${{ steps.preflight_artifact.outputs.name }}
          PREFLIGHT_ARTIFACT_DIGEST: ${{ steps.preflight_artifact.outputs.digest }}
          VALIDATION_REQUEST_ID: ${{ steps.identity.outputs.quality_request_id }}
          PREFLIGHT_REQUEST_ID: ${{ steps.identity.outputs.preflight_request_id }}
          EXPECTED_MIGRATION: ${{ steps.identity.outputs.expected_migration }}
        run: |
          set -euo pipefail
          mkdir -p stage1-validation
          exact_artifact_name="stage1-exact-release-validation-$REVIEWED_COMMIT"
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg reviewedCommit "$REVIEWED_COMMIT" \
            --arg comparisonBase "$COMPARISON_BASE" \
            --arg validationRequestId "$VALIDATION_REQUEST_ID" \
            --arg preflightRequestId "$PREFLIGHT_REQUEST_ID" \
            --arg expectedMigration "$EXPECTED_MIGRATION" \
            --arg qualityRunId "$QUALITY_RUN_ID" \
            --arg qualityArtifactId "$QUALITY_ARTIFACT_ID" \
            --arg qualityArtifactName "$QUALITY_ARTIFACT_NAME" \
            --arg qualityArtifactDigest "$QUALITY_ARTIFACT_DIGEST" \
            --arg preflightRunId "$PREFLIGHT_RUN_ID" \
            --arg preflightArtifactId "$PREFLIGHT_ARTIFACT_ID" \
            --arg preflightArtifactName "$PREFLIGHT_ARTIFACT_NAME" \
            --arg preflightArtifactDigest "$PREFLIGHT_ARTIFACT_DIGEST" \
            --arg exactValidationRunId "$GITHUB_RUN_ID" \
            --arg exactValidationRunAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg exactValidationArtifactName "$exact_artifact_name" \
            '{
              schemaVersion: 3,
              repository: $repository,
              reviewedCommit: $reviewedCommit,
              comparisonBase: $comparisonBase,
              validationRequestId: $validationRequestId,
              preflightRequestId: $preflightRequestId,
              expectedDatabaseMigrationVersion: $expectedMigration,
              manualQuality: { runId: $qualityRunId, status: "success" },
              canonicalArtifact: { id: $qualityArtifactId, name: $qualityArtifactName, digest: $qualityArtifactDigest },
              releasePreflight: { runId: $preflightRunId, status: "success", context: "stage1-infrastructure-validation", productionAuthorization: false },
              preflightArtifact: { id: $preflightArtifactId, name: $preflightArtifactName, digest: $preflightArtifactDigest },
              exactValidation: { runId: $exactValidationRunId, runAttempt: $exactValidationRunAttempt, status: "success", artifactName: $exactValidationArtifactName },
              productionWritePerformed: false,
              deploymentPerformed: false
            }' > stage1-validation/exact-release-validation.json

          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg reviewedCommit "$REVIEWED_COMMIT" \
            --arg comparisonBase "$COMPARISON_BASE" \
            --arg validationRequestId "$VALIDATION_REQUEST_ID" \
            --arg preflightRequestId "$PREFLIGHT_REQUEST_ID" \
            --arg expectedMigration "$EXPECTED_MIGRATION" \
            --arg qualityRunId "$QUALITY_RUN_ID" \
            --arg preflightRunId "$PREFLIGHT_RUN_ID" \
            --arg exactValidationRunId "$GITHUB_RUN_ID" \
            '.repository == $repository
             and .reviewedCommit == $reviewedCommit
             and .comparisonBase == $comparisonBase
             and .validationRequestId == $validationRequestId
             and .preflightRequestId == $preflightRequestId
             and .expectedDatabaseMigrationVersion == $expectedMigration
             and .manualQuality.runId == $qualityRunId
             and .manualQuality.status == "success"
             and .canonicalArtifact.id != ""
             and (.canonicalArtifact.digest | startswith("sha256:"))
             and .releasePreflight.runId == $preflightRunId
             and .releasePreflight.status == "success"
             and .preflightArtifact.id != ""
             and (.preflightArtifact.digest | startswith("sha256:"))
             and .exactValidation.runId == $exactValidationRunId
             and .exactValidation.status == "success"
             and .productionWritePerformed == false
             and .deploymentPerformed == false' \
            stage1-validation/exact-release-validation.json > /dev/null

      - name: Upload Stage-1 exact validation summary
        if: steps.identity.outputs.release_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stage1-exact-release-validation-${{ github.event.pull_request.head.sha }}
          path: stage1-validation/exact-release-validation.json
          if-no-files-found: error
          retention-days: 30
