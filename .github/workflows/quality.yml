name: Quality

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: pr60-verification-role-boundary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-pr60-verification-fix:
    if: github.event.pull_request.head.ref == 'chatgpt/train-phase2a-architecture-foundation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Apply verification role-boundary correction
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pr60-fix-verification-role-boundary.py
          grep -n "Legacy source IDs are test-fixture setup data" supabase/verification/train-phase2a-program-architecture.sql
          git diff --check

      - name: Commit and push focused correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/verification/train-phase2a-program-architecture.sql
          git commit -m "fix(train): correct Phase 2A verification role boundary"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
