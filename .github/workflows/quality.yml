name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all quality checks
        shell: bash
        run: |
          set +e
          mkdir -p quality-reports

          integrity_status=0
          {
            required_docs=(
              docs/product/PLAIVRA_PRODUCT_CONSTITUTION.md
              docs/product/PLAIVRA_LONG_TERM_PRODUCT_AND_PLATFORM_PLAN.md
              docs/design-system/PLAIVRA_CROSS_PLATFORM_UI_CONSTITUTION.md
              docs/design-system/platforms/web.md
              docs/design-system/platforms/ios.md
              docs/design-system/platforms/android.md
              docs/chatgpt-app/README.md
              docs/chatgpt-app/cimd-authentication-architecture.md
              docs/architecture/canonical-domain-model.md
            )
            for document in "${required_docs[@]}"; do
              if [ ! -f "$document" ]; then
                echo "Missing authoritative document: $document"
                integrity_status=1
              fi
            done

            temporary_workflow="$(find .github/workflows -maxdepth 1 -type f -name 'temporary-*' -print -quit)"
            if [ -n "$temporary_workflow" ]; then
              echo "Temporary workflow remains: $temporary_workflow"
              integrity_status=1
            fi

            runtime_files=(
              lib/mcp/tools.ts
              lib/mcp/server.ts
              lib/mcp/tool-executor.ts
              lib/mcp/tool-executor-safe.ts
              services/database/execution-layer.ts
              components/profile/execution-profiles.tsx
              types/database.ts
            )
            retired_pattern='get_fitlife_status|get_ai_action_requests|create_ai_action_request|update_ai_action_request_status|get_safety_profile|update_safety_profile|save_chatgpt_workout_plan|generate_workout_plan|replace_meal_plan_item|admin_api_status|admin_search_users|get_admin_user_summary|AiActionRequestStatus|UserSafetyProfile|SafetyRiskLevel'
            if grep -n -E "$retired_pattern" "${runtime_files[@]}"; then
              echo "Retired Plaivra runtime names remain."
              integrity_status=1
            fi

            legacy_brand_pattern='FitLife|S&S Gym'
            if grep -R -n -E "$legacy_brand_pattern" app components lib services types --include='*.ts' --include='*.tsx'; then
              echo "Legacy product branding remains in active application source."
              integrity_status=1
            fi

            if find supabase/migrations_archive -type f -print -quit 2>/dev/null | grep -q .; then
              echo "Legacy migration archive still contains files."
              integrity_status=1
            fi
          } 2>&1 | tee quality-reports/integrity.log
          echo "$integrity_status" > quality-reports/integrity.exit

          npm run lint 2>&1 | tee quality-reports/lint.log
          echo "${PIPESTATUS[0]}" > quality-reports/lint.exit

          npm run typecheck 2>&1 | tee quality-reports/typecheck.log
          echo "${PIPESTATUS[0]}" > quality-reports/typecheck.exit

          npm test 2>&1 | tee quality-reports/test.log
          echo "${PIPESTATUS[0]}" > quality-reports/test.exit

          npm run build 2>&1 | tee quality-reports/build.log
          echo "${PIPESTATUS[0]}" > quality-reports/build.exit

          exit 0

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: quality-reports/
          if-no-files-found: error
          retention-days: 7

      - name: Enforce quality result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for check in integrity lint typecheck test build; do
            code="$(cat "quality-reports/${check}.exit")"
            echo "${check}: exit ${code}"
            if [ "$code" != "0" ]; then
              failed=1
            fi
          done
          exit "$failed"
