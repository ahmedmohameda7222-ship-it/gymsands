name: Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare-final-quality-blob:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_HEAD: 8ddfff10830bc910b09618390a7a3cdc52987c57
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact staging revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create final permanent Quality blob
        run: node scripts/prepare-aw2a-final-quality-blob.mjs

      - name: Upload final Quality blob identity
        uses: actions/upload-artifact@v4
        with:
          name: final-quality-blob-${{ github.event.pull_request.head.sha }}
          path: quality-reports/final-quality-blob.json
          if-no-files-found: error
          retention-days: 1
