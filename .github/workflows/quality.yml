name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plaivra_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d plaivra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/plaivra_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture build timestamp
        shell: bash
        run: echo "PLAIVRA_BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Run all quality checks
        shell: bash
        run: |
          set +e
          mkdir -p quality-reports

          (
            set -euo pipefail
            supabase db start
            supabase db reset --local --no-seed
            supabase migration list --local
          ) 2>&1 | tee quality-reports/full-migration-chain.log
          echo "${PIPESTATUS[0]}" > quality-reports/full-migration-chain.exit

          supabase db lint --local --schema public --level error --fail-on error 2>&1 | tee quality-reports/database-lint.log
          echo "${PIPESTATUS[0]}" > quality-reports/database-lint.exit

          (
            set -euo pipefail
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-section-production-preflight.sql
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-phase2a-program-architecture.sql
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/muscle-intelligence-phase1.sql
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/muscle-intelligence-phase2.sql
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/muscle-intelligence-phase3-session-snapshots.sql
            PLAIVRA_PREFLIGHT_TEST_DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres" node scripts/test-database-preflight-control.mjs
            PGPASSWORD=postgres psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -X -v ON_ERROR_STOP=1 -f supabase/verification/production-release-migration-preflight.sql
          ) 2>&1 | tee quality-reports/database-preflight.log
          echo "${PIPESTATUS[0]}" > quality-reports/database-preflight.exit

          (
            integrity_status=0
            required_docs=(
              docs/product/PLAIVRA_PRODUCT_CONSTITUTION.md
              docs/product/PLAIVRA_LONG_TERM_PRODUCT_AND_PLATFORM_PLAN.md
              docs/design-system/PLAIVRA_CROSS_PLATFORM_UI_CONSTITUTION.md
              docs/design-system/platforms/web.md
              docs/design-system/platforms/ios.md
              docs/design-system/platforms/android.md
              docs/chatgpt-app/README.md
              docs/chatgpt-app/cimd-authentication-architecture.md
              docs/architecture/canonical-domain-model.md
              docs/release/README.md
              docs/architecture/migration-ledger-reconciliation.md
              plaivra_production_migration_reconciliation_plan.md
            )
            for document in "${required_docs[@]}"; do
              if [ ! -f "$document" ]; then
                echo "Missing authoritative document: $document"
                integrity_status=1
              fi
            done
            temporary_workflow="$(find .github/workflows -maxdepth 1 -type f -name 'temporary-*' -print -quit)"
            if [ -n "$temporary_workflow" ]; then
              echo "Temporary workflow remains: $temporary_workflow"
              integrity_status=1
            fi
            if [ -e scripts/apply-clean-recheck-remediation.py ]; then
              echo "One-shot remediation script remains in the repository."
              integrity_status=1
            fi
            runtime_files=(
              lib/mcp/tools.ts
              lib/mcp/server.ts
              lib/mcp/tool-executor.ts
              lib/mcp/tool-executor-safe.ts
              services/database/execution-layer.ts
              components/profile/execution-profiles.tsx
              types/database.ts
            )
            retired_pattern='get_fitlife_status|get_ai_action_requests|create_ai_action_request|update_ai_action_request_status|get_safety_profile|update_safety_profile|save_chatgpt_workout_plan|generate_workout_plan|replace_meal_plan_item|admin_api_status|admin_search_users|get_admin_user_summary|AiActionRequestStatus|UserSafetyProfile|SafetyRiskLevel|user_safety_profiles'
            if grep -n -E "$retired_pattern" "${runtime_files[@]}"; then
              echo "Retired Plaivra runtime names remain."
              integrity_status=1
            fi
            legacy_brand_pattern='FitLife|S&S Gym'
            if grep -R -n -E "$legacy_brand_pattern" app components lib services types --include='*.ts' --include='*.tsx'; then
              echo "Legacy product branding remains in active application source."
              integrity_status=1
            fi
            archive_files="$(find supabase/migrations_archive -type f -print 2>/dev/null)"
            if [ -n "$archive_files" ]; then
              echo "Legacy migration archive still contains files:"
              printf '%s\n' "$archive_files"
              integrity_status=1
            fi
            exit "$integrity_status"
          ) > quality-reports/integrity.log 2>&1
          echo "$?" > quality-reports/integrity.exit
          cat quality-reports/integrity.log

          npm run lint 2>&1 | tee quality-reports/lint.log
          echo "${PIPESTATUS[0]}" > quality-reports/lint.exit
          npm run migration:ledger:check 2>&1 | tee quality-reports/migration-ledger.log
          migration_ledger_code="${PIPESTATUS[0]}"
          npm run registry:phase2:seed:check 2>&1 | tee -a quality-reports/migration-ledger.log
          registry_seed_code="${PIPESTATUS[0]}"
          if [ "${migration_ledger_code}" = "0" ] && [ "${registry_seed_code}" = "0" ]; then
            echo "0" > quality-reports/migration-ledger.exit
          else
            echo "1" > quality-reports/migration-ledger.exit
          fi
          npm run test:scripts 2>&1 | tee quality-reports/script-tests.log
          echo "${PIPESTATUS[0]}" > quality-reports/script-tests.exit
          npm audit --omit=dev --audit-level=moderate 2>&1 | tee quality-reports/dependency-audit.log
          echo "${PIPESTATUS[0]}" > quality-reports/dependency-audit.exit
          npm run typecheck 2>&1 | tee quality-reports/typecheck.log
          echo "${PIPESTATUS[0]}" > quality-reports/typecheck.exit
          npm run test:unit 2>&1 | tee quality-reports/unit.log
          echo "${PIPESTATUS[0]}" > quality-reports/unit.exit
          npm run test:integration 2>&1 | tee quality-reports/integration.log
          echo "${PIPESTATUS[0]}" > quality-reports/integration.exit
          npm run test:telemetry 2>&1 | tee quality-reports/telemetry-tests.log
          echo "${PIPESTATUS[0]}" > quality-reports/telemetry-tests.exit

          (
            export PLAIVRA_VALIDATE_PRODUCTION_ENV=true
            export PLAIVRA_RELEASE_ENVIRONMENT=production
            export NEXT_PUBLIC_APP_URL=https://app.plaivra.com
            export NEXT_PUBLIC_USE_MOCK_AUTH=false
            export PLAIVRA_MCP_BASE_URL=https://app.plaivra.com/api/mcp
            export PLAIVRA_OAUTH_ISSUER=https://app.plaivra.com
            export PLAIVRA_CIMD_ALLOWED_ORIGINS=https://chatgpt.com
            export CRON_SECRET=ci-placeholder-cron-secret-that-is-long-enough
            npm run validate:env
          ) 2>&1 | tee quality-reports/environment-validation.log
          echo "${PIPESTATUS[0]}" > quality-reports/environment-validation.exit

          npx vitest run --config vitest.unit.config.mjs lib/release/version.test.ts lib/release/readiness.test.ts 2>&1 | tee quality-reports/release-metadata.log
          release_metadata_unit_code="${PIPESTATUS[0]}"

          NEXT_PUBLIC_USE_MOCK_AUTH=false npm run build 2>&1 | tee quality-reports/build.log
          build_code="${PIPESTATUS[0]}"
          echo "${build_code}" > quality-reports/build.exit

          if [ "${build_code}" = "0" ]; then
            expected_migration="$(node -e 'const ledger=require("./supabase/migration-ledger.json"); console.log(ledger.entries.filter((entry) => entry.state === "applied" && entry.productionVersion).map((entry) => entry.productionVersion).sort().at(-1))')"
            npm run release:verify-built-metadata -- \
              --commit "${PLAIVRA_COMMIT_SHA}" \
              --build-timestamp "${PLAIVRA_BUILD_TIMESTAMP}" \
              --environment ci \
              --expected-migration "${expected_migration}" 2>&1 | tee -a quality-reports/release-metadata.log
            release_metadata_built_code="${PIPESTATUS[0]}"
          else
            echo "Built metadata verification skipped because the production build failed." | tee -a quality-reports/release-metadata.log
            release_metadata_built_code=1
          fi
          if [ "${release_metadata_unit_code}" = "0" ] && [ "${release_metadata_built_code}" = "0" ]; then
            echo "0" > quality-reports/release-metadata.exit
          else
            echo "1" > quality-reports/release-metadata.exit
          fi

          (
            set -euo pipefail
            NEXT_PUBLIC_USE_MOCK_AUTH=true npm run dev > quality-reports/rendered-qa-server.log 2>&1 &
            server_pid=$!
            trap 'kill "$server_pid" 2>/dev/null || true' EXIT
            for attempt in $(seq 1 60); do
              if curl --fail --silent http://localhost:3000/ > /dev/null; then break; fi
              sleep 1
            done
            curl --fail --silent http://localhost:3000/ > /dev/null
            QA_BASE_URL=http://localhost:3000 QA_EVIDENCE_DIR=quality-reports/rendered-qa-evidence npm run qa:rendered
          ) 2>&1 | tee quality-reports/rendered-qa.log
          echo "${PIPESTATUS[0]}" > quality-reports/rendered-qa.exit

          (
            set -euo pipefail
            NEXT_PUBLIC_USE_MOCK_AUTH=true npm run dev > quality-reports/train-qa-server.log 2>&1 &
            server_pid=$!
            trap 'kill "$server_pid" 2>/dev/null || true' EXIT
            for attempt in $(seq 1 90); do
              if curl --fail --silent http://localhost:3000/ > /dev/null; then break; fi
              sleep 1
            done
            curl --fail --silent http://localhost:3000/ > /dev/null
            QA_BASE_URL=http://localhost:3000 QA_TRAIN_EVIDENCE_DIR=quality-reports/train-qa-evidence npm run qa:train
          ) 2>&1 | tee quality-reports/train-qa.log
          echo "${PIPESTATUS[0]}" > quality-reports/train-qa.exit

          npm run release:manifest -- \
            --commit "${PLAIVRA_COMMIT_SHA}" \
            --build-timestamp "${PLAIVRA_BUILD_TIMESTAMP}" \
            --environment ci \
            --schema-compatibility 2 \
            --output quality-reports/release-manifest.json \
            --quality-reports quality-reports 2>&1 | tee quality-reports/manifest.log
          echo "${PIPESTATUS[0]}" > quality-reports/manifest.exit

          preflight_mode="${{ github.event_name == 'pull_request' && 'review' || 'release' }}"
          set +e
          npm run release:preflight -- \
            --mode "${preflight_mode}" \
            --commit "${PLAIVRA_COMMIT_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --quality-reports quality-reports \
            --output quality-reports/release-preflight.json 2>&1 | tee quality-reports/release-preflight.log
          preflight_code="${PIPESTATUS[0]}"
          set -e
          echo "${preflight_code}" > quality-reports/release-preflight.exit

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: quality-reports/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce quality result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for check in full-migration-chain database-lint database-preflight integrity lint migration-ledger script-tests dependency-audit typecheck unit integration telemetry-tests environment-validation release-metadata build rendered-qa train-qa manifest release-preflight; do
            code="$(cat "quality-reports/${check}.exit")"
            echo "${check}: exit ${code}"
            if [ "$code" != "0" ]; then
              failed=1
            fi
          done
          exit "$failed"
