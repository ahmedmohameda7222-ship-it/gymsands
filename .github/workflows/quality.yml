name: Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare-replay-fix-blob:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_HEAD: 5437dfadb2bab638e37a804225a3ec924fe924bd
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact staging revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create replay-fixed permanent Quality blob
        run: node scripts/prepare-aw2a-replay-fix-blob.mjs

      - name: Upload replay-fixed Quality blob identity
        uses: actions/upload-artifact@v4
        with:
          name: replay-fix-blob-${{ github.event.pull_request.head.sha }}
          path: quality-reports/replay-fix-blob.json
          if-no-files-found: error
          retention-days: 1
