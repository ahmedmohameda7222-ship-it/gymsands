name: Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_phase4b_display_correction:
    runs-on: ubuntu-latest
    outputs:
      applied: ${{ steps.apply.outputs.applied }}
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Apply approved Phase 4B display correction
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          helper=.github/workflows/phase4b-exercise-display-correction.yml
          if [ "${{ github.head_ref || github.ref_name }}" != "fix/phase4b-exercise-display" ] || [ ! -f "$helper" ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          helper = Path('.github/workflows/phase4b-exercise-display-correction.yml')
          source = helper.read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          target = Path('/tmp/apply-phase4b-display.py')
          target.write_text(script)
          subprocess.run(['python', str(target)], check=True)
          PY

          git checkout origin/main -- .github/workflows/quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(train): present exercise metadata in member language"
          git push origin HEAD:fix/phase4b-exercise-display
          echo "applied=true" >> "$GITHUB_OUTPUT"

  verify:
    needs: apply_phase4b_display_correction
    if: needs.apply_phase4b_display_correction.outputs.applied != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-public-key-long-enough
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-long-enough
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_MOCK_AUTH: "true"
      PLAIVRA_MCP_BASE_URL: http://localhost:3000/api/mcp
      PLAIVRA_MCP_TOKEN_SECRET: ci-placeholder-token-secret-that-is-long-enough
      PLAIVRA_CHATGPT_REDIRECT_URIS: https://chatgpt.com/connector_platform_oauth_redirect
      PLAIVRA_CIMD_ALLOWED_ORIGINS: https://chatgpt.com
      PLAIVRA_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PLAIVRA_RELEASE_ENVIRONMENT: ci
      PLAIVRA_SCHEMA_COMPATIBILITY_VERSION: "2"

    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Detect relevant verification scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed_files="$(git ls-files)"
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base_sha}...HEAD")"
          fi

          printf '%s\n' "$changed_files"

          code=false
          runtime=false
          dependencies=false
          database=false
          integration=false
          scripts=false
          environment=false
          ui=false
          train_ui=false

          if grep -Eq '\.(ts|tsx|js|jsx|mjs|cjs)$|^(package(-lock)?\.json|tsconfig\.json|vitest\..*\.mjs|eslint\.config\.)' <<< "$changed_files"; then
            code=true
          fi

          if grep -Eq '^(app/|components/|lib/|services/|types/|middleware\.|next\.config\.|package\.json)' <<< "$changed_files" \
            && grep -Eqv '(\.test\.|\.spec\.|^docs/)' <<< "$changed_files"; then
            runtime=true
          fi

          if grep -Eq '^package-lock\.json$' <<< "$changed_files"; then dependencies=true; fi
          if grep -Eq '^(supabase/migrations/|supabase/migration-ledger\.json|scripts/(check-migration-ledger|test-database-preflight-control)|services/database/|types/database\.ts)' <<< "$changed_files"; then database=true; fi
          if grep -Eq '^(services/database/|app/api/|supabase/migrations/|vitest\.integration\.config\.mjs)' <<< "$changed_files"; then integration=true; fi
          if grep -Eq '^scripts/' <<< "$changed_files"; then scripts=true; fi
          if grep -Eq '^(scripts/validate-production-env\.mjs|lib/integrations/env|next\.config\.|vercel\.json|package-lock\.json)' <<< "$changed_files"; then environment=true; fi
          if grep -Eq '^(app/|components/|public/|styles/|lib/i18n/|next\.config\.|postcss\.config\.|tailwind\.config\.)' <<< "$changed_files"; then ui=true; fi
          if grep -Eq '^(app/.*/train/|components/train/|components/workouts/|lib/train/|services/activity-catalog/|app/api/activity-catalog/)' <<< "$changed_files"; then train_ui=true; fi

          {
            echo "code=${code}"
            echo "runtime=${runtime}"
            echo "dependencies=${dependencies}"
            echo "database=${database}"
            echo "integration=${integration}"
            echo "scripts=${scripts}"
            echo "environment=${environment}"
            echo "ui=${ui}"
            echo "train_ui=${train_ui}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.scope.outputs.code == 'true' || steps.scope.outputs.dependencies == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.scope.outputs.code == 'true' || steps.scope.outputs.dependencies == 'true'
        run: npm ci

      - name: Lint changed source files
        if: steps.scope.outputs.code == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mapfile -d '' files < <(git ls-files -z | grep -zE '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            mapfile -d '' files < <(git diff --diff-filter=ACMRT --name-only -z "${base_sha}...HEAD" | grep -zE '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          fi
          if [ "${#files[@]}" -gt 0 ]; then
            npx eslint -- "${files[@]}"
          fi

      - name: Typecheck application
        if: steps.scope.outputs.runtime == 'true' || steps.scope.outputs.dependencies == 'true'
        run: npm run typecheck

      - name: Run tests related to changed code
        if: steps.scope.outputs.code == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm run test:unit
            exit 0
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          mapfile -d '' test_files < <(git diff --diff-filter=ACMRT --name-only -z "${base_sha}...HEAD" | grep -zE '\.(test|spec)\.(ts|tsx|js|jsx)$' || true)
          if [ "${#test_files[@]}" -gt 0 ]; then
            npx vitest run --config vitest.unit.config.mjs "${test_files[@]}"
          fi

          mapfile -d '' source_files < <(git diff --diff-filter=ACMRT --name-only -z "${base_sha}...HEAD" \
            | grep -zE '\.(ts|tsx|js|jsx)$' \
            | grep -zEv '\.(test|spec)\.(ts|tsx|js|jsx)$' || true)
          if [ "${#source_files[@]}" -gt 0 ]; then
            npx vitest related "${source_files[@]}" --run --config vitest.unit.config.mjs --passWithNoTests
          fi

      - name: Check changed production dependencies
        if: steps.scope.outputs.dependencies == 'true'
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run changed script tests
        if: steps.scope.outputs.scripts == 'true'
        run: npm run test:scripts

      - name: Run integration tests for API or database changes
        if: steps.scope.outputs.integration == 'true'
        run: npm run test:integration

      - name: Set up Supabase CLI
        if: steps.scope.outputs.database == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}

      - name: Replay and lint database migrations
        if: steps.scope.outputs.database == 'true'
        shell: bash
        run: |
          set -euo pipefail
          supabase db start
          supabase db reset --local --no-seed
          supabase db lint --local --schema public --level error --fail-on error
          npm run migration:ledger:check

      - name: Verify production database security contracts
        if: steps.scope.outputs.database == 'true'
        shell: bash
        run: |
          set -euo pipefail
          database_url="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          PGPASSWORD=postgres psql "$database_url" -X -v ON_ERROR_STOP=1 -f supabase/verification/train-atomic-rpc-security.sql
          PLAIVRA_PREFLIGHT_TEST_DATABASE_URL="$database_url" node scripts/test-database-preflight-control.mjs
          PGPASSWORD=postgres psql "$database_url" -X -v ON_ERROR_STOP=1 -f supabase/verification/production-release-migration-preflight.sql

      - name: Validate production environment contract
        if: steps.scope.outputs.environment == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PLAIVRA_VALIDATE_PRODUCTION_ENV=true
          export PLAIVRA_RELEASE_ENVIRONMENT=production
          export NEXT_PUBLIC_APP_URL=https://app.plaivra.com
          export NEXT_PUBLIC_USE_MOCK_AUTH=false
          export PLAIVRA_MCP_BASE_URL=https://app.plaivra.com/api/mcp
          export PLAIVRA_OAUTH_ISSUER=https://app.plaivra.com
          export PLAIVRA_CIMD_ALLOWED_ORIGINS=https://chatgpt.com
          export CRON_SECRET=ci-placeholder-cron-secret-that-is-long-enough
          npm run validate:env

      - name: Build production application
        if: steps.scope.outputs.runtime == 'true' || steps.scope.outputs.dependencies == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export PLAIVRA_BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          NEXT_PUBLIC_USE_MOCK_AUTH=false npm run build

      - name: Install Playwright Chromium
        if: steps.scope.outputs.ui == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run relevant browser QA
        if: steps.scope.outputs.ui == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p quality-reports
          NEXT_PUBLIC_USE_MOCK_AUTH=true npm run dev > quality-reports/qa-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://localhost:3000/ > /dev/null; then break; fi
            sleep 1
          done
          curl --fail --silent http://localhost:3000/ > /dev/null

          if [ "${{ steps.scope.outputs.train_ui }}" = "true" ]; then
            QA_BASE_URL=http://localhost:3000 QA_TRAIN_EVIDENCE_DIR=quality-reports/train-qa-evidence npm run qa:train
          else
            QA_BASE_URL=http://localhost:3000 QA_EVIDENCE_DIR=quality-reports/rendered-qa-evidence npm run qa:rendered
          fi

      - name: Upload browser evidence on failure
        if: failure() && steps.scope.outputs.ui == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quality-failure-evidence-${{ github.run_id }}
          path: quality-reports/
          if-no-files-found: ignore
          retention-days: 7
