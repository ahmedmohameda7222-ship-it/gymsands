name: Quality

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: pr60-final-rls-correction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-pr60-rls-correction:
    if: github.event.pull_request.head.ref == 'chatgpt/train-phase2a-architecture-foundation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact checkout identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Apply focused Phase 2A RLS correction
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pr60-final-rls-correction.py
          grep -n "create or replace function private.can_access_workout_plan" supabase/migrations/20260715190000_train_phase2a_program_architecture.sql
          grep -n "private.can_access_workout_plan" supabase/verification/train-phase2a-program-architecture.sql
          grep -n "revoke all on public.user_workout_plans" services/database/train-program-v2-rpc.integration.test.ts
          git diff --check

      - name: Commit and push focused correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            supabase/migrations/20260715190000_train_phase2a_program_architecture.sql \
            supabase/verification/train-phase2a-program-architecture.sql \
            services/database/train-program-v2-rpc.integration.test.ts \
            lib/product/train-phase2a-architecture.test.ts
          git commit -m "fix(train): harden Phase 2A RLS ownership checks"
          git push origin HEAD:chatgpt/train-phase2a-architecture-foundation
