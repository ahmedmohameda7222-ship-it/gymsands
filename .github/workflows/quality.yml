name: Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare-replay-order-blob:
    if: github.head_ref == 'feat/active-workout-aw2a-persisted-execution-state'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_HEAD: 35c8d64adeb51b2a71e74a99350ca9ec67e2e1e9
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact staging revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create replay-ordered permanent Quality blob
        run: node scripts/prepare-aw2a-replay-order-blob.mjs

      - name: Upload replay-ordered Quality blob identity
        uses: actions/upload-artifact@v4
        with:
          name: replay-order-blob-${{ github.event.pull_request.head.sha }}
          path: quality-reports/replay-order-blob.json
          if-no-files-found: error
          retention-days: 1
